<!-- orderfilters and Search Container -->
<div class="flex flex-wrap items-center gap-3">
    <!-- Receipt Status Filter -->
    <div class="min-w-[140px]">
        <div x-data="{ isOptionSelected: orderfilters.receipt_status !== '' }" class="relative z-20 bg-transparent">
            <select x-model="orderfilters.receipt_status"
                @change="isOptionSelected = ($event.target.value !== ''); applyorderfilters()"
                class="dark:bg-dark-900 shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 h-10 w-full appearance-none rounded-lg border border-gray-300 bg-transparent bg-none px-3 py-2 pr-8 text-sm text-gray-800 placeholder:text-gray-400 focus:ring-2 focus:outline-hidden dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30"
                :class="isOptionSelected && 'text-gray-800 dark:text-white/90'">
                <option value="" class="text-gray-700 dark:bg-gray-900 dark:text-gray-400" x-text="trans.all_receipt_status"></option>
                <option value="approved" class="text-gray-700 dark:bg-gray-900 dark:text-gray-400" x-text="trans.approved"></option>
           
                <option value="rejected" class="text-gray-700 dark:bg-gray-900 dark:text-gray-400" x-text="trans.rejected"></option>
                <option value="pending" class="text-gray-700 dark:bg-gray-900 dark:text-gray-400" x-text="trans.pending"></option>
            </select>
            <span
                class="pointer-events-none absolute top-1/2 right-3 z-30 -translate-y-1/2 text-gray-500 dark:text-gray-400">
                <svg class="stroke-current" width="14" height="14" viewBox="0 0 20 20" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <path d="M4.79175 7.396L10.0001 12.6043L15.2084 7.396" stroke="" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
            </span>
        </div>
    </div>

    <!-- Delivery Status Filter -->
    <div class="min-w-[120px]">
        <div x-data="{ isOptionSelected: orderfilters.delivery_status !== '' }" class="relative z-20 bg-transparent">
            <select x-model="orderfilters.delivery_status"
                @change="isOptionSelected = ($event.target.value !== ''); applyorderfilters()"
                class="dark:bg-dark-900 shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 h-10 w-full appearance-none rounded-lg border border-gray-300 bg-transparent bg-none px-3 py-2 pr-8 text-sm text-gray-800 placeholder:text-gray-400 focus:ring-2 focus:outline-hidden dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30"
                :class="isOptionSelected && 'text-gray-800 dark:text-white/90'">
                <option value="" class="text-gray-700 dark:bg-gray-900 dark:text-gray-400" x-text="trans.all_delivery_status"></option>
                <option value="pending" class="text-gray-700 dark:bg-gray-900 dark:text-gray-400" x-text="trans.pending"></option>
                <option value="processing" class="text-gray-700 dark:bg-gray-900 dark:text-gray-400" x-text="trans.processing"></option>
                <option value="delivered" class="text-gray-700 dark:bg-gray-900 dark:text-gray-400" x-text="trans.delivered"></option>
                <option value="cancelled" class="text-gray-700 dark:bg-gray-900 dark:text-gray-400" x-text="trans.cancelled"></option>
            </select>
            <span
                class="pointer-events-none absolute top-1/2 right-3 z-30 -translate-y-1/2 text-gray-500 dark:text-gray-400">
                <svg class="stroke-current" width="14" height="14" viewBox="0 0 20 20" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <path d="M4.79175 7.396L10.0001 12.6043L15.2084 7.396" stroke="" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
            </span>
        </div>
    </div>

    <!-- Sort By Filter -->
    <div class="min-w-[140px]">
        <div x-data="{ isOptionSelected: true }" class="relative z-20 bg-transparent">
            <select x-model="orderfilters.sort_by" @change="applyorderfilters()"
                class="dark:bg-dark-900 shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 h-10 w-full appearance-none rounded-lg border border-gray-300 bg-transparent bg-none px-3 py-2 pr-8 text-sm text-gray-800 placeholder:text-gray-400 focus:ring-2 focus:outline-hidden dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30"
                :class="isOptionSelected && 'text-gray-800 dark:text-white/90'">
                <option value="placed_at" class="text-gray-700 dark:bg-gray-900 dark:text-gray-400" x-text="trans.date_placed"></option>
                <option value="order_no" class="text-gray-700 dark:bg-gray-900 dark:text-gray-400" x-text="trans.order_number"></option>
                <option value="basket_total" class="text-gray-700 dark:bg-gray-900 dark:text-gray-400" x-text="trans.basket_total"></option>
                <option value="id" class="text-gray-700 dark:bg-gray-900 dark:text-gray-400">
                    ID
                </option>
            </select>
            <span
                class="pointer-events-none absolute top-1/2 right-3 z-30 -translate-y-1/2 text-gray-500 dark:text-gray-400">
                <svg class="stroke-current" width="14" height="14" viewBox="0 0 20 20" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <path d="M4.79175 7.396L10.0001 12.6043L15.2084 7.396" stroke="" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
            </span>
        </div>
    </div>

    <!-- Sort Order Filter -->
    <div class="min-w-[100px]">
        <div x-data="{ isOptionSelected: true }" class="relative z-20 bg-transparent">
            <select x-model="orderfilters.sort_order" @change="applyorderfilters()"
                class="dark:bg-dark-900 shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 h-10 w-full appearance-none rounded-lg border border-gray-300 bg-transparent bg-none px-3 py-2 pr-8 text-sm text-gray-800 placeholder:text-gray-400 focus:ring-2 focus:outline-hidden dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30"
                :class="isOptionSelected && 'text-gray-800 dark:text-white/90'">
                <option value="desc" class="text-gray-700 dark:bg-gray-900 dark:text-gray-400" x-text="trans.decending"></option>
                <option value="asc" class="text-gray-700 dark:bg-gray-900 dark:text-gray-400" x-text="trans.ascending"></option>
            </select>
            <span
                class="pointer-events-none absolute top-1/2 right-3 z-30 -translate-y-1/2 text-gray-500 dark:text-gray-400">
                <svg class="stroke-current" width="14" height="14" viewBox="0 0 20 20" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <path d="M4.79175 7.396L10.0001 12.6043L15.2084 7.396" stroke="" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
            </span>
        </div>
    </div>

    <!-- Items per page -->
    <div class="min-w-[110px]">
        <div x-data="{ isOptionSelected: true }" class="relative z-20 bg-transparent">
            <select x-model="orderpagination.limit" @change="applyorderfilters()"
                class="dark:bg-dark-900 shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 h-10 w-full appearance-none rounded-lg border border-gray-300 bg-transparent bg-none px-3 py-2 pr-8 text-sm text-gray-800 placeholder:text-gray-400 focus:ring-2 focus:outline-hidden dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30"
                :class="isOptionSelected && 'text-gray-800 dark:text-white/90'">
                <option value="10" class="text-gray-700 dark:bg-gray-900 dark:text-gray-400" x-text="trans.ten_page"></option>
                <option value="25" class="text-gray-700 dark:bg-gray-900 dark:text-gray-400" x-text="trans.tf_page"></option>
                <option value="50" class="text-gray-700 dark:bg-gray-900 dark:text-gray-400" x-text="trans.fifity_page"></option>
                <option value="100" class="text-gray-700 dark:bg-gray-900 dark:text-gray-400" x-text="trans.hun_page"></option>
            </select>
            <span
                class="pointer-events-none absolute top-1/2 right-3 z-30 -translate-y-1/2 text-gray-500 dark:text-gray-400">
                <svg class="stroke-current" width="14" height="14" viewBox="0 0 20 20" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <path d="M4.79175 7.396L10.0001 12.6043L15.2084 7.396" stroke="" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
            </span>
        </div>
    </div>

    <!-- Date Range Picker -->
    <div class="min-w-[200px]">
        <div class="relative">
            <input x-model="orderfilters.date_range" @input.debounce.500ms="applyorderfilters()"
                class="orderdatepicker dark:bg-dark-900 shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 h-10 w-full appearance-none rounded-lg border border-gray-300 bg-transparent bg-none px-4 py-2.5 pr-11 pl-4 text-sm text-gray-800 placeholder:text-gray-400 focus:ring-2 focus:outline-hidden dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30"
                placeholder="Select date range" readonly />
            <span
                class="pointer-events-none absolute top-1/2 right-3 -translate-y-1/2 text-gray-500 dark:text-gray-400">
                <svg class="fill-current" width="20" height="20" viewBox="0 0 20 20" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd"
                        d="M6.66659 1.5415C7.0808 1.5415 7.41658 1.87729 7.41658 2.2915V2.99984H12.5833V2.2915C12.5833 1.87729 12.919 1.5415 13.3333 1.5415C13.7475 1.5415 14.0833 1.87729 14.0833 2.2915V2.99984L15.4166 2.99984C16.5212 2.99984 17.4166 3.89527 17.4166 4.99984V7.49984V15.8332C17.4166 16.9377 16.5212 17.8332 15.4166 17.8332H4.58325C3.47868 17.8332 2.58325 16.9377 2.58325 15.8332V7.49984V4.99984C2.58325 3.89527 3.47868 2.99984 4.58325 2.99984L5.91659 2.99984V2.2915C5.91659 1.87729 6.25237 1.5415 6.66659 1.5415ZM6.66659 4.49984H4.58325C4.30711 4.49984 4.08325 4.7237 4.08325 4.99984V6.74984H15.9166V4.99984C15.9166 4.7237 15.6927 4.49984 15.4166 4.49984H13.3333H6.66659ZM15.9166 8.24984H4.08325V15.8332C4.08325 16.1093 4.30711 16.3332 4.58325 16.3332H15.4166C15.6927 16.3332 15.9166 16.1093 15.9166 15.8332V8.24984Z"
                        fill=""></path>
                </svg>
            </span>
        </div>
    </div>

    <!-- Reset orderfilters Button -->
    <button @click="resetorderfilters()"
        class="h-10 px-3 text-sm font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 dark:bg-gray-800 dark:text-gray-400 dark:hover:bg-gray-700 rounded-lg transition-colors duration-200 flex items-center gap-1.5">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 4L16 16M16 4L4 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg x-text="trans.reset"></button>

    <!-- Search Form - Last item -->
    <div class="min-w-[250px]">
        <div class="relative">
            <span class="absolute -translate-y-1/2 pointer-events-none top-1/2 right-4">
                <svg class="fill-gray-500 dark:fill-gray-400" width="16" height="16" viewBox="0 0 20 20" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd"
                        d="M3.04199 9.37381C3.04199 5.87712 5.87735 3.04218 9.37533 3.04218C12.8733 3.04218 15.7087 5.87712 15.7087 9.37381C15.7087 12.8705 12.8733 15.7055 9.37533 15.7055C5.87735 15.7055 3.04199 12.8705 3.04199 9.37381ZM9.37533 1.54218C5.04926 1.54218 1.54199 5.04835 1.54199 9.37381C1.54199 13.6993 5.04926 17.2055 9.37533 17.2055C11.2676 17.2055 13.0032 16.5346 14.3572 15.4178L17.1773 18.2381C17.4702 18.531 17.945 18.5311 18.2379 18.2382C18.5308 17.9453 18.5309 17.4704 18.238 17.1775L15.4182 14.3575C16.5367 13.0035 17.2087 11.2671 17.2087 9.37381C17.2087 5.04835 13.7014 1.54218 9.37533 1.54218Z"
                        fill=""></path>
                </svg>
            </span>
            <input type="text" x-model="orderfilters.search" @input.debounce.500ms="applyorderfilters()"
                placeholder="Search with basket_id order_no shopping_trip_id user_id ..."
                class="dark:bg-dark-900 shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 h-10 w-full rounded-lg border border-gray-300 bg-transparent py-2.5 pl-4 pr-[42px] text-sm text-gray-800 placeholder:text-gray-400 focus:ring-2 focus:outline-hidden dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30" />
        </div>
    </div>
</div>
