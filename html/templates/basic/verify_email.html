<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="icon" type="image/png" href="/static/favicon.ico" />

    <title >Verify Email </title>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://unpkg.com/htmx.org@1.9.5"></script>
    <link rel="stylesheet" href="/static/src/output.css" />
  </head>
  <body
    x-data="{ page: 'VerifyEmail', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false,
  
      trans:{{.trans}},
  }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    {{template "superadmin/partials/preloader" }}

    <!-- ===== Page Wrapper Start ===== -->
    <div class="z-1 bg-white p-6 sm:p-0 dark:bg-gray-900">
       
        <div
        class="absolute right-5 top-5 z-2  sm:p-0 "
      >{{template "basic/lang"   }}

      </div>
        <div
        class="relative flex h-screen w-full flex-col justify-center sm:p-0 lg:flex-row dark:bg-gray-900"
      >
        <!-- Form -->
        <div class="flex w-full flex-1 flex-col lg:w-1/2">
          <div
            class="mx-auto flex w-full max-w-md flex-1 flex-col justify-center"
          >
            <div class="mb-5 sm:mb-8">
              <h1
                class="text-title-sm sm:text-title-md mb-2 font-semibold text-gray-800 dark:text-white/90"
               x-text="trans.verify_your_email"></h1>
              <p class="text-sm text-gray-500 dark:text-gray-400" x-text="trans.a_verification_code_has_been_sent_to_your_email_pl"></p>
            </div>
            <div>
              <form
                hx-indicator="#verify-htmx-indicator"
                hx-post="/auth/user/verify-account/"
                hx-swap="none"
                id="verifyEmailForm"
                method="post"
                onsubmit="combineOTP()"
              >
                <input name="_csrf" type="hidden" value="{{ .csrfToken }}" />
                <input id="otp" name="otp" type="hidden" />
                <div class="space-y-5">
                  <div>
                    <label
                      class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400"
                     x-text="trans.type_your_6_digits_security_code"></label>
                    <div class="flex gap-2 sm:gap-4" id="otp-container">
                      <input
                        type="text"
                        maxlength="1"
                        required=""
                        id="one"
                        class="dark:bg-dark-900 otp-input shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-center text-xl font-semibold text-gray-800 placeholder:text-gray-400 focus:ring-3 focus:outline-hidden dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30"
                      />
                      <input
                        type="text"
                        maxlength="1"
                        required=""
                        id="two"
                        class="dark:bg-dark-900 otp-input shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-center text-xl font-semibold text-gray-800 placeholder:text-gray-400 focus:ring-3 focus:outline-hidden dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30"
                      />
                      <input
                        type="text"
                        maxlength="1"
                        required=""
                        id="three"
                        class="dark:bg-dark-900 otp-input shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-center text-xl font-semibold text-gray-800 placeholder:text-gray-400 focus:ring-3 focus:outline-hidden dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30"
                      />
                      <input
                        type="text"
                        maxlength="1"
                        required=""
                        id="four"
                        class="dark:bg-dark-900 otp-input shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-center text-xl font-semibold text-gray-800 placeholder:text-gray-400 focus:ring-3 focus:outline-hidden dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30"
                      />
                      <input
                        type="text"
                        maxlength="1"
                        required=""
                        id="five"
                        class="dark:bg-dark-900 otp-input shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-center text-xl font-semibold text-gray-800 placeholder:text-gray-400 focus:ring-3 focus:outline-hidden dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30"
                      />
                      <input
                        type="text"
                        maxlength="1"
                        required=""
                        id="six"
                        class="dark:bg-dark-900 otp-input shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-center text-xl font-semibold text-gray-800 placeholder:text-gray-400 focus:ring-3 focus:outline-hidden dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30"
                      />
                    </div>
                  </div>

                  <div>
                    <button
                      type="submit"
                      class="flex items-center w-full justify-center gap-2 rounded-lg bg-brand-500 px-5 py-3.5 text-sm font-medium text-white shadow-theme-xs hover:bg-brand-600"
                    >
                      <span
                        class="animate-spin htmx-indicator"
                        id="verify-htmx-indicator"
                      >
                        <svg
                          width="20"
                          height="20"
                          viewBox="0 0 20 20"
                          fill="none"
                          xmlns="http://www.w3.org/2000/svg"
                        >
                          <circle
                            opacity="0.5"
                            cx="10"
                            cy="10"
                            r="8.75"
                            stroke="white"
                            stroke-width="2.5"
                          ></circle>
                          <mask id="path-2-inside-1_3755_26472" fill="white">

                            stroke="white"
                            stroke-width="4"
                            mask="url(#path-2-inside-1_3755_26472)"
                          ></path>
                        </svg>
                      </span > <span x-text="trans.verify_email"></span></button>
                  </div>
                </div>
              </form>
              <div class="mt-5">
                <p
                  class="text-center text-sm font-normal text-gray-700 sm:text-start dark:text-gray-400"
                >
                  Didn't get the code?
                  <a
                    class="text-brand-500 hover:text-brand-600 dark:text-brand-400"
                    href="javascript:void(0);"
                    hx-patch="/auth/user/resend-verify-email/"
                    hx-swap="none"
                    hx-headers='{"X-CSRFToken": "{{ .csrfToken }}","Content-Type": "application/json"}'
                    hx-trigger="click"
                    hx-indicator="#resend-htmx-indicator"
                    hx-on::after-request="
                              const xhr = event.detail.xhr;
                              const redirectURL = xhr.getResponseHeader('HX-Redirect');

                              if (redirectURL) {
                                window.location.href = redirectURL;
                              }
                                const response = JSON.parse(xhr.responseText);
                                if (xhr.status === 200) { 
                                  startCountdown();
                                }
                                else { 
                                } "
                    id="resend"
                  >
                    <span
                      class="animate-spin htmx-indicator"
                      id="resend-htmx-indicator"
                    >
                      <svg
                        width="20"
                        height="20"
                        viewBox="0 0 20 20"
                        fill="none"
                        xmlns="http://www.w3.org/2000/svg"
                      >
                        <circle
                          opacity="0.5"
                          cx="10"
                          cy="10"
                          r="8.75"
                          stroke="white"
                          stroke-width="2.5"

                          ></path>
                        </mask>
                        <path
                          d="M18.2372 12.9506C18.8873 13.1835 19.6113 12.846 19.7613 12.1719C20.0138 11.0369 20.0672 9.86319 19.9156 8.70384C19.7099 7.12996 19.1325 5.62766 18.2311 4.32117C17.3297 3.01467 16.1303 1.94151 14.7319 1.19042C13.7019 0.637155 12.5858 0.270357 11.435 0.103491C10.7516 0.00440265 10.179 0.561473 10.1659 1.25187V1.25187C10.1528 1.94226 10.7059 2.50202 11.3845 2.6295C12.1384 2.77112 12.8686 3.02803 13.5487 3.39333C14.5973 3.95661 15.4968 4.76141 16.1728 5.74121C16.8488 6.721 17.2819 7.84764 17.4361 9.02796C17.5362 9.79345 17.5172 10.5673 17.3819 11.3223C17.2602 12.002 17.5871 12.7178 18.2372 12.9506V12.9506Z"
                          stroke="white"
                          stroke-width="4"
                          mask="url(#path-2-inside-1_3755_26472)"
                        ></path>
                      </svg>
                    </span > <span x-text="trans.resend"></span></a
                  >

                  <span
                    class="text-brand-500 hover:text-brand-600 dark:text-brand-400"
                    id="countdown"
                    style="display: none"
                  ></span>
                </p>
              </div>
              
              <!-- Sign Out Link -->
              <div class="mt-5 text-center sm:text-start">
                
                  <a href="/auth/user/logout"
                  class="inline-flex items-center gap-2 text-sm font-medium text-gray-600 hover:text-gray-800 dark:text-gray-400 dark:hover:text-gray-200"
                >
                  <svg 
                    width="16" 
                    height="16" 
                    viewBox="0 0 16 16" 
                    fill="none"

                  </svg> <span  x-text="trans.sign_out"></span></a>
              </div>
            </div>
          </div>
        </div>

        <!-- Toggler -->

          <button
