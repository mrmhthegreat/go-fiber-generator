<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>User Chat Test</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gray-100 p-8" x-data="userChat()">

    <div class="max-w-md mx-auto bg-white rounded-lg shadow-lg overflow-hidden">
        <div class="bg-blue-600 p-4 text-white flex justify-between items-center">
            <h1 class="font-bold">User Support Chat</h1>
            <div x-show="token" @click="logout" class="text-xs cursor-pointer hover:underline">Logout</div>
        </div>

        <!-- Login Section -->
        <div x-show="!token" class="p-6 space-y-4">
            <h2 class="text-xl font-semibold text-gray-800">Login to Chat</h2>
            <input type="email" x-model="email" placeholder="Email" class="w-full border p-2 rounded">
            <input type="password" x-model="password" placeholder="Password" class="w-full border p-2 rounded">
            <button @click="login" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Login</button>
            <p x-show="error" class="text-red-500 text-sm" x-text="error"></p>
        </div>

        <!-- Chat Section -->
        <div x-show="token" class="flex flex-col h-[500px]">
            <div class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50" id="user-chat-box">
                <template x-for="msg in messages" :key="msg.id">
                    <div class="flex" :class="msg.sender_type === 'user' ? 'justify-end' : 'justify-start'">
                        <div class="max-w-[80%] px-4 py-2 rounded-lg text-sm"
                            :class="msg.sender_type === 'user' ? 'bg-blue-500 text-white rounded-br-none' : 'bg-white border text-gray-800 rounded-bl-none'">
                            <p x-text="msg.content"></p>
                        </div>
                    </div>
                </template>
                <div x-show="messages.length === 0" class="text-center text-gray-400 text-sm mt-10">No messages yet
                </div>
            </div>

            <div class="p-4 border-t bg-white">
                <form @submit.prevent="sendMessage" class="flex gap-2">
                    <input type="text" x-model="inputMsg" placeholder="Type a message..."
                        class="flex-1 border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">Send</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function userChat() {
            return {
                email: '',
                password: '',
                token: localStorage.getItem('user_token') || '',
                messages: [],
                inputMsg: '',
                error: '',
                socket: null,

                init() {
                    if (this.token) {
                        this.fetchHistory();
                        this.connectWS();
                    }
                },

                async login() {
                    try {
                        const res = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email: this.email, password: this.password })
                        });
                        const data = await res.json();
                        if (res.ok) {
                            this.token = data.token;
                            localStorage.setItem('user_token', this.token);
                            this.fetchHistory();
                            this.connectWS();
                        } else {
                            this.error = data.error || 'Login failed';
                        }
                    } catch (e) {
                        this.error = 'Network error';
                    }
                },

                logout() {
                    this.token = '';
                    localStorage.removeItem('user_token');
                    if (this.socket) this.socket.close();
                },

                async fetchHistory() {
                    const res = await fetch('/api/user/chat/history', {
                        headers: { 'Authorization': 'Bearer ' + this.token }
                    });
                    if (res.ok) {
                        this.messages = await res.json();
                        this.scrollToBottom();
                    }
                },

                connectWS() {
                    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                    // Note: user ws endpoint requires authentication. 
                    // Since native WS doesn't support custom headers easily, 
                    // we might need to pass token in query param or rely on Cookie if set.
                    // Fiber JWT middleware usually checks Header 'Authorization: Bearer ...' or Cookie 'jwt'.
                    // If the app uses Cookies for session, this works. 
                    // If not, we need to pass ?token=... and middleware needs to handle it.
                    // Let's assume for this test page we pass it in query if the backend supports it, 
                    // OR we hope the cookie is set.
                    // But wait, the backend `middleware.CombinedAuthMiddleware` usually checks Header.
                    // We might need to adjust the WS route to accept Query Token or switch to Cookie.

                    // Let's try passing token in query string, but we need to ensure Middleware checks it.
                    // Standard Fiber JWT middleware allows TokenLookup: "header:Authorization,query:token,cookie:jwt".

                    const wsUrl = `${protocol}//${window.location.host}/api/user/chat/ws?token=${this.token}`;

                    this.socket = new WebSocket(wsUrl);

                    this.socket.onmessage = (e) => {
                        const msg = JSON.parse(e.data);
                        this.messages.push(msg);
                        this.scrollToBottom();
                    };
                },

                async sendMessage() {
                    if (!this.inputMsg.trim()) return;

                    const content = this.inputMsg;
                    this.inputMsg = '';

                    // Hybrid: Send via POST, Receive via WS (Echo)
                    // If backend echoes the message back to sender via WS, we might get duplicates if we push locally.
                    // Let's just push locally and dedupe if needed, or rely on WS echo if implemented.
                    // Our backend chat_controller sends NotifyAdmins but does NOT NotifyUser (echo) for own message.
                    // So we push locally.

                    const res = await fetch('/api/user/chat/message', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + this.token
                        },
                        body: JSON.stringify({ content })
                    });

                    if (res.ok) {
                        const msg = await res.json();
                        this.messages.push(msg);
                        this.scrollToBottom();
                    }
                },

                scrollToBottom() {
                    this.$nextTick(() => {
                        const box = document.getElementById('user-chat-box');
                        if (box) box.scrollTop = box.scrollHeight;
                    });
                }
            }
        }
    </script>
</body>

</html>
