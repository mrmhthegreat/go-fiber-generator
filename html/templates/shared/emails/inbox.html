<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{if eq .inboxType "inbound"}}Inbox{{else}}Sent{{end}} | Superadmin</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/static/src/output.css" />
    <meta name="csrf-token" content="{{.csrfToken}}">
    <script>window.DASH_BASE = '{{.dashBase}}';</script>
    <style>
        [x-cloak] {
            display: none !important;
        }

        .ck-editor__editable {
            min-height: 400px;
        }
    </style>
</head>

<body x-data="{
    page: 'Inbox', 
    'loaded': true, 
    'darkMode': false, 
    'stickyMenu': false, 
    'sidebarToggle': false, 
    'scrollTop': false, 
    selected: 'Inbox',
    loadingStats: false,
    inboxType: 'inbound', 
    totalCount: {{.totalCount }},
    unreadCount: {{.unreadCount }},
    offset: {{.offset }},
    limit: {{.limit }},
    selectedEmail: null,
    currentEmailIndex: 0,
    showCompose: false,
    loading: false,
    loadingEmails: false,
    search: '',
    composeData: { to: '', subject: '', message: '' },
    selectedEmails: [],
    allChecked: false,
    trans:{{.trans}},
    perms:{{.perms}},
       get filteredEmails() {
            // Make sure emails is an array
            if (!Array.isArray(this.emails)) {
                this.emails = [];
                return [];
            }
            
            if (!this.search || this.search.trim() === '') {
                return this.emails;
            }
            
            const s = this.search.toLowerCase().trim();
            return this.emails.filter(e => {
                const subject = (e.subject || '').toLowerCase();
                const from = (e.from || '').toLowerCase();
                const body = (e.body || '').toLowerCase();
                return subject.includes(s) || from.includes(s) || body.includes(s);
            });
        },

    ...mailApp()
}" x-init="
    darkMode = JSON.parse(localStorage.getItem('darkMode'));
    $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}">
    {{template "superadmin/partials/preloader" }}

    <div class="flex h-screen overflow-hidden">
        {{template "superadmin/partials/sidebar" . }}
        <div class="relative flex flex-1 flex-col overflow-hidden">
            {{template "superadmin/partials/overlay" }}
            {{template "superadmin/partials/header" .}}

            <main>
                <div class="mx-auto max-w-(--breakpoint-2xl) p-4 pb-20 md:p-6 md:pb-6">

                    <div x-data="{ pageName: `Inbox`}">
                        <div class="flex flex-wrap items-center justify-between gap-3 pb-6">
                            <h2 class="text-xl font-semibold text-gray-800 dark:text-white/90"
                                x-text="inboxType === 'inbound' ? 'Inbox' : 'Sent'">
                            </h2>
                            <nav>
                                <ol class="flex items-center gap-1.5">
                                    <li>
                                        <a class="inline-flex items-center gap-1.5 text-sm text-gray-500 dark:text-gray-400"
                                            href="{{.dashBase}}/">
                                            Home
                                            <svg class="stroke-current" width="17" height="16" viewBox="0 0 17 16"
                                                fill="none" xmlns="http://www.w3.org/2000/svg">
                                                <path d="M6.0765 12.667L10.2432 8.50033L6.0765 4.33366" stroke=""
                                                    stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                                                </path>
                                            </svg>
                                        </a>
                                    </li>
                                    <li class="text-sm text-gray-800 dark:text-white/90"
                                        x-text="inboxType === 'inbound' ? 'Inbox' : 'Sent'"></li>
                                </ol>
                            </nav>
                        </div>
                    </div>



                    <div class="overflow-hidden sm:h-[calc(100vh-174px)] xl:h-[calc(100vh-186px)]">
                        <div class="flex h-full flex-col gap-6 sm:gap-5 xl:flex-row">
                            <!-- Sidebar -->
                            <div
                                class="flex flex-col rounded-2xl border border-gray-200 bg-white p-4 dark:border-gray-800 dark:bg-white/[0.03] xl:w-1/5">


                                <div class="pb-5" x-show="perms['mail.manage']">
                                    <button @click="showCompose = true"
                                        class="flex w-full items-center justify-center gap-2 rounded-lg bg-brand-500 p-3 text-sm font-medium text-white shadow-theme-xs hover:bg-brand-600">
                                        <svg class="fill-current" width="21" height="20" viewBox="0 0 21 20" fill="none"
                                            xmlns="http://www.w3.org/2000/svg">
                                            <path fill-rule="evenodd" clip-rule="evenodd"
                                                d="M17.0911 3.03206C16.2124 2.15338 14.7878 2.15338 13.9091 3.03206L5.6074 11.3337C5.29899 11.6421 5.08687 12.0335 4.99684 12.4603L4.26177 15.945C4.20943 16.1931 4.286 16.4508 4.46529 16.6301C4.64458 16.8094 4.90232 16.8859 5.15042 16.8336L8.63507 16.0985C9.06184 16.0085 9.45324 15.7964 9.76165 15.488L18.0633 7.18631C18.942 6.30763 18.942 4.88301 18.0633 4.00433L17.0911 3.03206ZM14.9697 4.09272C15.2626 3.79982 15.7375 3.79982 16.0304 4.09272L17.0027 5.06499C17.2956 5.35788 17.2956 5.83276 17.0027 6.12565L16.1043 7.02402L14.0714 4.99109L14.9697 4.09272ZM13.0107 6.05175L6.66806 12.3944C6.56526 12.4972 6.49455 12.6277 6.46454 12.7699L5.96704 15.1283L8.32547 14.6308C8.46772 14.6008 8.59819 14.5301 8.70099 14.4273L15.0436 8.08468L13.0107 6.05175Z"
                                                fill=""></path>
                                        </svg>

                                        Compose
                                    </button>
                                </div>
                                <div class="no-scrollbar max-h-full overflow-auto py-6">

                                    <nav class="space-y-5">
                                        <!-- MAILBOX -->
                                        <div>
                                            <h3
                                                class="mb-3 text-xs font-medium uppercase leading-[18px] text-gray-700 dark:text-gray-400">
                                                MAILBOX
                                            </h3>
                                            <ul class="flex flex-col gap-1">

                                                <li>
                                                    <a href="#" @click.prevent="setInboxType('inbound')"
                                                        class="group flex items-center justify-between gap-2 rounded-lg px-3 py-2.5 text-sm font-medium hover:bg-brand-50 hover:text-brand-500 dark:hover:bg-brand-500/[0.12] dark:hover:text-brand-400  "
                                                        :class="inboxType === 'inbound' ? 'text-brand-500 bg-brand-50 dark:text-brand-400 dark:bg-brand-500/[0.12]' : 'text-gray-500 dark:text-gray-400'">
                                                        <span class="flex items-center gap-3">
                                                            <svg class="fill-current" width="20" height="20"
                                                                viewBox="0 0 20 20" fill="none"
                                                                xmlns="http://www.w3.org/2000/svg">
                                                                <path fill-rule="evenodd" clip-rule="evenodd"
                                                                    d="M12.2996 1.12891C11.4713 1.12891 10.7998 1.80033 10.7996 2.62867L10.7996 3.1264V3.12659L10.7997 4.87507H6.14591C3.6031 4.87507 1.54175 6.93642 1.54175 9.47923V14.3207C1.54175 15.4553 2.46151 16.3751 3.5961 16.3751H6.14591H10.0001H16.2084C17.4511 16.3751 18.4584 15.3677 18.4584 14.1251V10.1251C18.4584 7.22557 16.1079 4.87507 13.2084 4.87507H12.2997L12.2996 3.87651H13.7511C14.5097 3.87651 15.1248 3.26157 15.1249 2.50293C15.125 1.74411 14.5099 1.12891 13.7511 1.12891H12.2996ZM3.04175 9.47923C3.04175 7.76485 4.43153 6.37507 6.14591 6.37507C7.8603 6.37507 9.25008 7.76485 9.25008 9.47923V14.8751H6.14591H3.5961C3.28994 14.8751 3.04175 14.6269 3.04175 14.3207V9.47923ZM10.7501 9.47923V14.8751H16.2084C16.6226 14.8751 16.9584 14.5393 16.9584 14.1251V10.1251C16.9584 8.054 15.2795 6.37507 13.2084 6.37507H9.54632C10.294 7.19366 10.7501 8.28319 10.7501 9.47923Z"
                                                                    fill=""></path>
                                                            </svg>

                                                            Inbox
                                                        </span>

                                                        <span
                                                            :class="inboxType === 'inbound' ? 'text-brand-500 dark:text-brand-400' : 'text-gray-700 dark:text-gray-300 group-hover:text-brand-500 dark:group-hover:text-brand-400'"
                                                            x-text="unreadCount" x-show="unreadCount > 0">

                                                        </span>
                                                    </a>
                                                </li>



                                                <li>
                                                    <a href="#" @click.prevent="setInboxType('outbound')"
                                                        class="flex items-center justify-between gap-2 rounded-lg px-3 py-2.5 text-sm font-medium hover:bg-brand-50 hover:text-brand-500 dark:hover:bg-brand-500/[0.12] dark:hover:text-brand-400"
                                                        :class="inboxType === 'outbound' ? 'text-brand-500 bg-brand-50 dark:text-brand-400 dark:bg-brand-500/[0.12]' : 'text-gray-500 dark:text-gray-400'">
                                                        <span class="flex items-center gap-3">
                                                            <svg class="fill-current" width="20" height="20"
                                                                viewBox="0 0 20 20" fill="none"
                                                                xmlns="http://www.w3.org/2000/svg">
                                                                <path fill-rule="evenodd" clip-rule="evenodd"
                                                                    d="M4.98481 2.44399C3.11333 1.57147 1.15325 3.46979 1.96543 5.36824L3.82086 9.70527C3.90146 9.89367 3.90146 10.1069 3.82086 10.2953L1.96543 14.6323C1.15326 16.5307 3.11332 18.4291 4.98481 17.5565L16.8184 12.0395C18.5508 11.2319 18.5508 8.76865 16.8184 7.961L4.98481 2.44399ZM3.34453 4.77824C3.0738 4.14543 3.72716 3.51266 4.35099 3.80349L16.1846 9.32051C16.762 9.58973 16.762 10.4108 16.1846 10.68L4.35098 16.197C3.72716 16.4879 3.0738 15.8551 3.34453 15.2223L5.19996 10.8853C5.21944 10.8397 5.23735 10.7937 5.2537 10.7473L9.11784 10.7473C9.53206 10.7473 9.86784 10.4115 9.86784 9.99726C9.86784 9.58304 9.53206 9.24726 9.11784 9.24726L5.25157 9.24726C5.2358 9.20287 5.2186 9.15885 5.19996 9.11528L3.34453 4.77824Z"
                                                                    fill=""></path>
                                                            </svg>

                                                            Sent
                                                        </span>
                                                    </a>
                                                </li>

                                            </ul>
                                        </div>

                                        <!-- FILTER -->
                                        <div>
                                            <h3
                                                class="mb-3 text-xs font-medium uppercase leading-[18px] text-gray-700 dark:text-gray-400">
                                                FILTER
                                            </h3>

                                            <ul class="flex flex-col gap-1">

                                                <li>
                                                    <a @click.prevent="filterStarred();" href="#"
                                                        class="flex items-center justify-between gap-2 rounded-lg px-3 py-2.5 text-sm font-medium hover:bg-brand-50 hover:text-brand-500 dark:hover:bg-brand-500/[0.12] dark:hover:text-brand-400  "
                                                        :class="inboxType === 'starred' ? 'text-brand-500 bg-brand-50 dark:text-brand-400 dark:bg-brand-500/[0.12]' : 'text-gray-500 dark:text-gray-400'">
                                                        <span class="flex items-center gap-3">
                                                            <svg class="fill-current" width="20" height="20"
                                                                viewBox="0 0 20 20" fill="none"
                                                                xmlns="http://www.w3.org/2000/svg">
                                                                <path fill-rule="evenodd" clip-rule="evenodd"
                                                                    d="M9.99993 2.375C10.2854 2.375 10.5461 2.53707 10.6725 2.79308L12.7318 6.96563L17.3365 7.63473C17.619 7.67578 17.8537 7.87367 17.9419 8.14517C18.0301 8.41668 17.9565 8.71473 17.7521 8.914L14.4201 12.1619L15.2067 16.748C15.255 17.0293 15.1393 17.3137 14.9083 17.4815C14.6774 17.6493 14.3712 17.6714 14.1185 17.5386L9.99993 15.3733L5.88137 17.5386C5.62869 17.6714 5.32249 17.6493 5.09153 17.4815C4.86057 17.3137 4.7449 17.0293 4.79316 16.748L5.57974 12.1619L2.24775 8.914C2.04332 8.71473 1.96975 8.41668 2.05797 8.14517C2.14619 7.87367 2.3809 7.67578 2.66341 7.63473L7.2681 6.96563L9.32738 2.79308C9.45373 2.53707 9.71445 2.375 9.99993 2.375ZM9.99993 4.81966L8.4387 7.98306C8.32946 8.20442 8.11828 8.35785 7.874 8.39334L4.38298 8.90062L6.90911 11.363C7.08587 11.5353 7.16653 11.7835 7.1248 12.0268L6.52847 15.5037L9.65093 13.8622C9.86942 13.7473 10.1304 13.7473 10.3489 13.8622L13.4714 15.5037L12.8751 12.0268C12.8333 11.7835 12.914 11.5353 13.0908 11.363L15.6169 8.90062L12.1259 8.39334C11.8816 8.35785 11.6704 8.20442 11.5612 7.98306L9.99993 4.81966Z"
                                                                    fill=""></path>
                                                            </svg>

                                                            Starred
                                                        </span>
                                                    </a>
                                                </li>

                                                <li>
                                                    <a @click.prevent="filterImportant();" href="#"
                                                        class="flex items-center justify-between gap-2 rounded-lg px-3 py-2.5 text-sm font-medium hover:bg-brand-50 hover:text-brand-500 dark:hover:bg-brand-500/[0.12] dark:hover:text-brand-400  "
                                                        :class="inboxType === 'important' ? 'text-brand-500 bg-brand-50 dark:text-brand-400 dark:bg-brand-500/[0.12]' : 'text-gray-500 dark:text-gray-400'">
                                                        <span class="flex items-center gap-3">
                                                            <svg class="fill-current" width="20" height="20"
                                                                viewBox="0 0 20 20" fill="none"
                                                                xmlns="http://www.w3.org/2000/svg">
                                                                <path fill-rule="evenodd" clip-rule="evenodd"
                                                                    d="M12.2996 1.12891C11.4713 1.12891 10.7998 1.80033 10.7996 2.62867L10.7996 3.1264V3.12659L10.7997 4.87507H6.14591C3.6031 4.87507 1.54175 6.93642 1.54175 9.47923V14.3207C1.54175 15.4553 2.46151 16.3751 3.5961 16.3751H6.14591H10.0001H16.2084C17.4511 16.3751 18.4584 15.3677 18.4584 14.1251V10.1251C18.4584 7.22557 16.1079 4.87507 13.2084 4.87507H12.2997L12.2996 3.87651H13.7511C14.5097 3.87651 15.1248 3.26157 15.1249 2.50293C15.125 1.74411 14.5099 1.12891 13.7511 1.12891H12.2996ZM3.04175 9.47923C3.04175 7.76485 4.43153 6.37507 6.14591 6.37507C7.8603 6.37507 9.25008 7.76485 9.25008 9.47923V14.8751H6.14591H3.5961C3.28994 14.8751 3.04175 14.6269 3.04175 14.3207V9.47923ZM10.7501 9.47923V14.8751H16.2084C16.6226 14.8751 16.9584 14.5393 16.9584 14.1251V10.1251C16.9584 8.054 15.2795 6.37507 13.2084 6.37507H9.54632C10.294 7.19366 10.7501 8.28319 10.7501 9.47923Z"
                                                                    fill=""></path>
                                                            </svg>

                                                            Important
                                                        </span>
                                                    </a>
                                                </li>

                                            </ul>
                                        </div>
                                    </nav>
                                </div>
                            </div>

                            <!-- Main content -->
                            <div
                                class="flex h-screen flex-col overflow-hidden rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03] xl:h-full xl:w-4/5">
                                <!-- Toolbar -->
                                <div
                                    class="flex flex-col justify-between gap-3 border-b border-gray-200 p-4 dark:border-gray-800 sm:flex-row">
                                    <div x-show="!selectedEmail" class="flex w-full items-center gap-2">
                                        <!-- Select all checkbox -->
                                        <div x-data="{openDropDown: false}" class="relative w-full sm:w-auto">
                                            <button @click="openDropDown = !openDropDown"
                                                class="flex w-full items-center justify-between gap-3 rounded-lg border border-gray-200 p-3 dark:border-gray-800 sm:justify-center text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-white"
                                                :class="openDropDown ? 'text-gray-700 dark:text-white' : 'text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-white'">
                                                <label for="checkboxAll"
                                                    class="flex cursor-pointer select-none items-center font-medium">
                                                    <span class="relative">
                                                        <input type="checkbox" id="checkboxAll"
                                                            class="tableCheckbox sr-only" @change="toggleAll"
                                                            :checked="allChecked">
                                                        <span
                                                            class="box flex h-4 w-4 items-center justify-center rounded-sm border border-gray-300 bg-transparent text-white dark:border-gray-700">
                                                            <span :class="allChecked ? 'opacity-100' : 'opacity-0'"
                                                                class="opacity-0">
                                                                <svg width="12" height="12" viewBox="0 0 12 12"
                                                                    fill="none" xmlns="http://www.w3.org/2000/svg">
                                                                    <path d="M10 3L4.5 8.5L2 6" stroke="white"
                                                                        stroke-width="1.6666" stroke-linecap="round"
                                                                        stroke-linejoin="round"></path>
                                                                </svg>
                                                            </span>
                                                        </span>
                                                    </span>
                                                </label>

                                                <span :class="openDropDown &amp;&amp; 'rotate-180'"
                                                    class="text-gray-500 duration-300 ease-linear dark:text-gray-400">
                                                    <svg class="stroke-current" width="16" height="16"
                                                        viewBox="0 0 16 16" fill="none"
                                                        xmlns="http://www.w3.org/2000/svg">
                                                        <path d="M3.83325 5.91699L7.99992 10.0837L12.1666 5.91699"
                                                            stroke="" stroke-width="1.5" stroke-linecap="round"
                                                            stroke-linejoin="round"></path>
                                                    </svg>
                                                </span>
                                            </button>
                                            <div x-show="openDropDown" @click.outside="openDropDown = false"
                                                class="absolute left-0 top-full z-40 mt-1 w-40 space-y-1 rounded-2xl border border-gray-200 bg-white p-2 shadow-theme-lg dark:border-gray-800 dark:bg-gray-dark"
                                                style="display: none;">
                                                <button @click="selectAll(); openDropDown=false"
                                                    class="flex w-full rounded-lg px-3 py-2 text-left text-theme-xs font-medium text-gray-500 hover:bg-gray-100 hover:text-gray-700 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-gray-300">
                                                    All
                                                </button>
                                                <button @click="selectRead(); openDropDown=false"
                                                    class="flex w-full rounded-lg px-3 py-2 text-left text-theme-xs font-medium text-gray-500 hover:bg-gray-100 hover:text-gray-700 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-gray-300">
                                                    Read
                                                </button>
                                                <button @click="selectUnread(); openDropDown=false"
                                                    class="flex w-full rounded-lg px-3 py-2 text-left text-theme-xs font-medium text-gray-500 hover:bg-gray-100 hover:text-gray-700 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-gray-300">
                                                    Unread
                                                </button>
                                            </div>
                                        </div>

                                        <!-- Refresh -->

                                        <button  x-show="perms['mail.manage']" @click="refreshEmails()" :disabled="loading"
                                            class="flex h-10 w-full max-w-10 items-center justify-center rounded-lg border border-gray-200 text-gray-500 transition-colors hover:bg-gray-100 hover:text-gray-700 dark:border-gray-800 dark:text-gray-400 dark:hover:bg-gray-800 dark:hover:text-white">
                                            <svg :class="loading ? 'animate-spin' : ''" width="20" height="20"
                                                viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                                <path fill-rule="evenodd" clip-rule="evenodd"
                                                    d="M6.72763 4.33443C7.92401 3.6437 9.30836 3.34945 10.6823 3.49385C12.0562 3.63826 13.3491 4.2139 14.3757 5.13828C15.0468 5.74252 15.5815 6.4755 15.9517 7.28815L13.6069 6.49282C13.2147 6.35977 12.7888 6.5699 12.6557 6.96216C12.5227 7.35443 12.7328 7.78028 13.1251 7.91333L16.8227 9.16752C16.8668 9.18743 16.9129 9.20314 16.9605 9.21426L17.0868 9.25712C17.2752 9.32101 17.4813 9.30746 17.6597 9.21943C17.838 9.1314 17.9741 8.97611 18.038 8.78772L19.3816 4.82561C19.5147 4.43334 19.3045 4.0075 18.9122 3.87447C18.52 3.74145 18.0941 3.95161 17.9611 4.34388L17.2335 6.48938C16.783 5.5609 16.1553 4.72223 15.3794 4.02356C14.1174 2.88722 12.528 2.17958 10.839 2.00207C9.15012 1.82455 7.44834 2.18628 5.97763 3.03539C4.50692 3.88451 3.34277 5.17743 2.65203 6.72884C1.9613 8.28025 1.77944 10.0105 2.13252 11.6716C2.4856 13.3328 3.3555 14.8395 4.61753 15.9758C5.87957 17.1121 7.46894 17.8198 9.15788 17.9973C10.8468 18.1748 12.5486 17.8131 14.0193 16.964C14.378 16.7569 14.5009 16.2982 14.2938 15.9395C14.0867 15.5807 13.628 15.4578 13.2693 15.6649C12.0729 16.3557 10.6886 16.6499 9.31467 16.5055C7.94077 16.3611 6.64786 15.7855 5.62123 14.8611C4.5946 13.9367 3.88697 12.711 3.59974 11.3598C3.31252 10.0085 3.46046 8.60098 4.02235 7.33894C4.58424 6.07691 5.53125 5.02516 6.72763 4.33443Z"
                                                    fill="currentColor"></path>
                                            </svg>
                                        </button>


                                        <button  x-show="perms['mail.manage']" @click="bulkDelete()" :disabled="selectedEmails.length === 0"
                                            class="flex h-10 w-full max-w-10 items-center justify-center rounded-lg border border-gray-200 text-gray-500 transition-colors hover:bg-gray-100 hover:text-error-700 dark:border-gray-800 dark:text-gray-400 dark:hover:bg-gray-800 dark:hover:text-error-500">
                                            <svg class="fill-current" width="20" height="20" viewBox="0 0 20 20"

                                                        d="M11.875 2.2915L17.7083 8.12484L11.875 13.9582V10.1467C7.2759 10.1467 3.43348 13.3864 2.50533 17.7082C2.36535 17.0564 2.29166 16.3799 2.29166 15.6863C2.29166 10.3936 6.58227 6.10295 11.875 6.10295V2.2915Z"

                        class="relative w-full  max-w-2xl bg-white rounded-3xl p-6 lg:p-10 dark:bg-gray-900">

                        <button @click="showCompose = false"
                            class="absolute top-3 right-3 z-999 flex h-9.5 w-9.5 items-center justify-center rounded-full bg-gray-100 text-gray-400 transition-colors hover:bg-gray-200 hover:text-gray-700 sm:top-6 sm:right-6 sm:h-11 sm:w-11 dark:bg-gray-800 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-white">
                            <svg class="fill-current" width="24" height="24" viewBox="0 0 24 24" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path fill-rule="evenodd" clip-rule="evenodd"
                                    d="M6.04289 16.5413C5.65237 16.9318 5.65237 17.565 6.04289 17.9555C6.43342 18.346 7.06658 18.346 7.45711 17.9555L11.9987 13.4139L16.5408 17.956C16.9313 18.3466 17.5645 18.3466 17.955 17.956C18.3455 17.5655 18.3455 16.9323 17.955 16.5418L13.4129 11.9997L17.955 7.4576C18.3455 7.06707 18.3455 6.43391 17.955 6.04338C17.5645 5.65286 16.9313 5.65286 16.5408 6.04338L11.9987 10.5855L7.45711 6.0439C7.06658 5.65338 6.43342 5.65338 6.04289 6.0439C5.65237 6.43442 5.65237 7.06759 6.04289 7.45811L10.5845 11.9997L6.04289 16.5413Z"

                                                toolbar: ['heading', '|', 'bold', 'italic', 'link', 'bulletedList', 'numberedList', 'blockQuote', 'undo', 'redo']
                                            })
                                            .then(editor => {
                                                editorInstance = editor; // Store global instance reference
                                                editor.model.document.on('change:data', () => {
                                                    composeData.message = editor.getData();
                                                });
                                                
                                                // Sync initial data if any (though usually empty on load)
                                                if(composeData.message) editor.setData(composeData.message);

                                                // Watch for external reset
                                                 $watch('composeData.message', (value) => {
                                                    if (value !== editor.getData()) {
                                                        editor.setData(value || '');
                                                    }
                                                });
                                            })

                                            });

    <script src="/static/superadmin/js/base.js"></script>
    <script src="https://cdn.ckeditor.com/ckeditor5/40.0.0/classic/ckeditor.js"></script>
    <script>
        // Replace the mailApp() function in the HTML template with this fixed version
        function mailApp() {
            return {
                emails: [],


                // User Search
                searchQuery: '',
                searchResults: [],
                editorInstance: null,

                emailCache: {},
                detailCache: {},
                loadingDetail: false,

                async init() {
                    // Initial load based on URL params or defaults
                    await this.loadEmails();
                },
                getNameOrEmail(str) {
                    if (!str) return '';
                    // Handle "Name <email>" case
                    const nameMatch = str.match(/^(.*?)\s*</);
                    if (nameMatch && nameMatch[1] && nameMatch[1].trim().length > 0) {
                        return nameMatch[1].trim();
                    }
                    // Handle "<email>" or "email" case, just strip brackets
                    return str.replace(/[<>]/g, '').trim();
                },

                setInboxType(type) {
                    if (this.inboxType === type) return;
                    this.inboxType = type;
                    this.offset = 0;
                    this.selectedEmail = null;
                    this.search = '';

                    // Update URL
                    let newPath = window.DASH_BASE + '/emails/' + (type === 'outbound' ? 'sent' : 'inbox');
                    window.history.pushState({ type: type }, '', newPath);

                    this.loadEmails();
                },

                async loadEmails() {
                    this.loadingEmails = true;

                    // Create Cache Key
                    const cacheKey = `${this.inboxType}_${this.offset}_${this.search || ''}_${this.limit}`;

                    // Check Cache
                    if (this.emailCache[cacheKey]) {
                        const cached = this.emailCache[cacheKey];
                        this.emails = cached.emails;
                        this.totalCount = cached.totalCount;
                        this.loadingEmails = false;
                        return;
                    }

                    try {
                        let url = window.DASH_BASE + `/emails/list?offset=${this.offset}&limit=${this.limit}`;

                        if (this.inboxType === 'important') {
                            url += `&type=important`;
                        } else if (this.inboxType === 'starred') {
                            url += `&type=starred`;
                        } else {
                            const direction = this.inboxType === 'outbound' ? 'outbound' : 'inbound';
                            url += `&direction=${direction}`;
                        }

                        if (this.search) {
                            url += `&search=${encodeURIComponent(this.search)}`;
                        }

                        const res = await fetch(url);
                        if (res.ok) {
                            const data = await res.json();
                            this.emails = Array.isArray(data.emails) ? data.emails : [];

                            if ((data.totalCount && data.totalCount > 0) || this.offset === 0) {
                                this.totalCount = data.totalCount || 0;
                            }

                            // Store in Cache
                            this.emailCache[cacheKey] = {
                                emails: this.emails,
                                totalCount: this.totalCount
                            };
                        } else {
                            showNotification('Failed to load emails', 'error');
                            this.emails = [];
                        }
                    } catch (_) {
                        showNotification('Failed to load emails', 'error');
                        this.emails = [];
                    } finally {
                        this.loadingEmails = false;
                    }
                },

                async selectEmail(email) {
                    if (this.detailCache[email.id]) {
                        this.selectedEmail = this.detailCache[email.id];
                        this.currentEmailIndex = this.emails.findIndex(e => e.id === email.id);
                        return;
                    }

                    this.selectedEmail = email;
                    this.loadingDetail = true;

                    try {
                        const res = await fetch(u(`/emails/${email.id}/detail`));
                        if (res.ok) {
                            const fullEmail = await res.json();
                            this.selectedEmail = fullEmail;
                            this.detailCache[email.id] = fullEmail;

                            this.currentEmailIndex = this.emails.findIndex(e => e.id === email.id);
                            if (email.status === 'unread') {
                                email.status = 'read';
                                if (this.unreadCount > 0) this.unreadCount--;
                            }
                        }
                    } catch (_) {
                        showNotification('Failed to fetch email', 'error');
                    } finally {
                        this.loadingDetail = false;
                    }
                },

                async navigateEmail(direction) {
                    const newIndex = direction === 'prev' ? this.currentEmailIndex - 1 : this.currentEmailIndex + 1;
                    if (newIndex >= 0 && newIndex < this.emails.length) {
                        await this.selectEmail(this.emails[newIndex]);
                    }
                },

                async refreshEmails() {
                    this.loading = true;
                    this.emailCache = {}; // Clear List Cache
                    this.detailCache = {}; // Clear Detail Cache

                    try {
                        await fetch(u('/emails/refresh'), {
                            method: 'POST',
                            headers: { "X-CSRFToken": document.querySelector('meta[name="csrf-token"]').getAttribute("content"), }
                        });
                        await this.loadEmails();
                    } catch (_) {
                        showNotification('Refresh failed', 'error');
                    } finally {
                        this.loading = false;
                    }
                },

                async toggleStar(email) {
                    try {
                        const res = await fetch(u(`/emails/${email.id}/toggle-star`), {
                            method: 'POST',
                            headers: { "X-CSRFToken": document.querySelector('meta[name="csrf-token"]').getAttribute("content"), }
                        });
                        if (res.ok) {
                            const data = await res.json();
                            email.is_starred = data.is_starred || data.starred;
                            // If we are in 'starred' view and it's unstarred, maybe remove it?
                            if (this.inboxType === 'starred' && !email.is_starred) {
                                this.emails = this.emails.filter(e => e.id !== email.id);
                            }
                        }
                    } catch (_) {
                        showNotification('Toggle star failed', 'error');
                    }
                },

                async toggleImportant(email) {
                    try {
                        const res = await fetch(u(`/emails/${email.id}/toggle-important`), {
                            method: 'POST',
                            headers: { "X-CSRFToken": document.querySelector('meta[name="csrf-token"]').getAttribute("content"), }
                        });
                        if (res.ok) {
                            const data = await res.json();
                            email.is_important = data.is_important || data.important;
                            // If we are in 'important' view and it's unimportant, maybe remove it?
                            if (this.inboxType === 'important' && !email.is_important) {
                                this.emails = this.emails.filter(e => e.id !== email.id);
                            }
                        }
                    } catch (_) {
                        showNotification('Toggle important failed', 'error');
                    }
                },

                async deleteEmail(email) {
                    if (!confirm('Delete this email?')) return;
                    try {
                        await fetch(u(`/emails/${email.id}`), {
                            method: 'DELETE',
                            headers: { "X-CSRFToken": document.querySelector('meta[name="csrf-token"]').getAttribute("content"), }
                        });
                        this.emails = this.emails.filter(e => e.id !== email.id);
                        this.selectedEmail = null;
                        this.totalCount--;
                    } catch (_) {
                        showNotification('Delete failed', 'error');
                    }
                },

                async bulkDelete() {
                    if (!confirm(`Delete ${this.selectedEmails.length} emails?`)) return;
                    try {
                        await fetch(u('/emails/bulk'), {
                            method: 'DELETE',
                            headers: {
                                'Content-Type': 'application/json',
                                "X-CSRFToken": document.querySelector('meta[name="csrf-token"]').getAttribute("content"),
                            },
                            body: JSON.stringify({ ids: this.selectedEmails })
                        });
                        this.emails = this.emails.filter(e => !this.selectedEmails.includes(e.id));
                        this.selectedEmails = [];
                        this.allChecked = false;
                    } catch (_) {
                        showNotification('Bulk delete failed', 'error');
                    }
                },

                async sendEmail() {
                    this.loading = true;
                    try {
                        const res = await fetch(u('/emails/compose'), {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                "X-CSRFToken": document.querySelector('meta[name="csrf-token"]').getAttribute("content"),
                            },
                            body: JSON.stringify(this.composeData)
                        });
                        if (res.ok) {
                            const data = await res.json();
                            this.showCompose = false;
                            this.composeData = { to: '', subject: '', message: '' };
                            if (this.editorInstance) Alpine.raw(this.editorInstance).setData('');

                            // If we are in 'Sent' box, add the new email to the top
                            if (this.inboxType === 'outbound' && data.data) {
                                this.emails.unshift(data.data);
                                this.totalCount++;
                                // Optimistically update cache for current view if it exists
                                const currentCacheKey = `${this.inboxType}_${this.offset}_${this.search || ''}_${this.limit}`;
                                if (this.emailCache[currentCacheKey]) {
                                    this.emailCache[currentCacheKey].emails = this.emails;
                                    this.emailCache[currentCacheKey].totalCount = this.totalCount;
                                }
                            } else {
                                // If not in Sent box (e.g. Inbox), try to push to the 'outbound' cache if it exists (for page 1)
                                const outboundCacheKey = `outbound_0__${this.limit}`;
                                if (this.emailCache[outboundCacheKey]) {
                                    this.emailCache[outboundCacheKey].emails.unshift(data.data);
                                    this.emailCache[outboundCacheKey].totalCount++;
                                }
                                // No clean-up needed since we either updated the cache or it doesn't exist (so will load fresh)
                            }

                            showNotification('Email sent successfully', 'success');

                        }
                    } catch (e) {
                        showNotification('Send failed: ' + e.message, 'error');
                    } finally {
                        this.loading = false;
                    }
                },

                reply() {
                    if (!this.selectedEmail) return;
                    this.composeData.to = this.selectedEmail.from;
                    this.composeData.subject = 'Re: ' + this.selectedEmail.subject;
                    this.composeData.message = '<p><br/></p><blockquote><p><strong>Original Message</strong><br/>' + (this.selectedEmail.body || '') + '</p></blockquote>';
                    this.showCompose = true;
                    // Ensure editor updates
                    if (this.editorInstance) Alpine.raw(this.editorInstance).setData(this.composeData.message);
                },

                forward() {
                    if (!this.selectedEmail) return;
                    this.composeData.to = ''; // Clear recipient
                    this.composeData.subject = 'Fwd: ' + this.selectedEmail.subject;
                    this.composeData.message = '<p><br/></p><blockquote><p><strong>Forwarded Message</strong><br/>' + (this.selectedEmail.body || '') + '</p></blockquote>';
                    this.showCompose = true;
                    // Ensure editor updates
                    if (this.editorInstance) Alpine.raw(this.editorInstance).setData(this.composeData.message);
                },

                // User Search Functionality
                async searchUsers() {
                    if (this.searchQuery.length < 2) {
                        this.searchResults = [];
                        return;
                    }
                    try {
                        const response = await fetch(u(`/emails/users/search?q=${encodeURIComponent(this.searchQuery)}&limit=10`));
                        const data = await response.json();
                        this.searchResults = data.users || [];
                    } catch (_) {
                    }
                },

                selectUser(user) {
                    this.composeData.to = user.email; // Assuming user object has email
                    this.searchQuery = '';
                    this.searchResults = [];
                },

                formatDate(dateStr) {
                    if (!dateStr) return '';
                    const d = new Date(dateStr);
                    const now = new Date();
                    const diff = now - d;
                    const days = Math.floor(diff / 86400000);

                    if (days === 0) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    if (days < 7) return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
                    return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
                },

                calculateUnreadCount() {
                    // Logic moved to page load or server side mostly
                },

                toggleAll() {
                    this.allChecked = !this.allChecked;
                    this.selectedEmails = this.allChecked ? this.emails.map(e => e.id) : [];
                },

                toggleItem(email) {
                    const index = this.selectedEmails.indexOf(email.id);
                    if (index > -1) {
                        this.selectedEmails.splice(index, 1);
                    } else {
                        this.selectedEmails.push(email.id);
                    }
                    this.allChecked = this.selectedEmails.length === this.emails.length;
                },

                selectAll() {
                    this.selectedEmails = this.emails.map(e => e.id);
                    this.allChecked = true;
                },

                selectRead() {
                    this.selectedEmails = this.emails.filter(e => e.status === 'read').map(e => e.id);
                    this.allChecked = false;
                },

                selectUnread() {
                    this.selectedEmails = this.emails.filter(e => e.status === 'unread').map(e => e.id);
                    this.allChecked = false;
                },

                async filterStarred() {
                    this.inboxType = 'starred';
                    this.offset = 0;
                    this.selectedEmail = null;
                    await this.loadEmails();
                },

                async filterImportant() {
                    this.inboxType = 'important';
                    this.offset = 0;
                    this.selectedEmail = null;
                    await this.loadEmails();
                },

                searchEmails() {
                    this.offset = 0;
                    this.loadEmails();
                },

                prevPage() {
                    this.offset = Math.max(0, this.offset - this.limit);
                    this.loadEmails();
                },

                nextPage() {
                    this.offset = this.offset + this.limit;
                    this.loadEmails();
                }
            };
