<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <link rel="icon" type="image/png" href="/static/favicon.ico" />

  <title>notifications | Superadmin</title>
  
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <link rel="stylesheet" href="/static/src/output.css" />
  <script>
  window.DASH_BASE='{{.dashBase}}';
</script>

  <style>
    /* Custom multi-select styling */
    select[multiple] option {
      padding: 0.75rem;
      margin: 0.25rem 0;
      border-radius: 0.5rem;
      cursor: pointer;
      background: white;
    }
    
    .dark select[multiple] option {
      background: #374151;
    }
    
    select[multiple] option:checked {
      background: linear-gradient(to right, #3b82f6, #2563eb) !important;
      color: white !important;
      font-weight: 500;
    }
    
    select[multiple]:focus {
      outline: none;
    }

    /* FCM select specific styling */
    select[multiple].fcm-select option:checked {
      background: linear-gradient(to right, #3b82f6, #2563eb) !important;
      color: white !important;
    }

    /* Email select specific styling */
    select[multiple].email-select option:checked {
      background: linear-gradient(to right, #10b981, #059669) !important;
      color: white !important;
    }

    /* Remove browser default highlight */
    select[multiple] option:focus {
      outline: none;
      background: transparent;
    }
    
    select[multiple] option:hover:not(:checked) {
      background: #f3f4f6;
    }
    
    .dark select[multiple] option:hover:not(:checked) {
      background: #4b5563;
    }

    .card-hover {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card-hover:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }

    .gradient-border {
      position: relative;
      background: linear-gradient(white, white) padding-box,
                  linear-gradient(135deg, #667eea 0%, #764ba2 100%) border-box;
      border: 2px solid transparent;
    }

    .dark .gradient-border {
      background: linear-gradient(#1e293b, #1e293b) padding-box,
                  linear-gradient(135deg, #667eea 0%, #764ba2 100%) border-box;
    }
  </style>

</head>

<body x-data="{ 
        page: 'Notifications', 
        loaded: true, 
      perms:{{.perms}},
        darkMode: false, 
        stickyMenu: false, 
        sidebarToggle: false, 
      trans:{{.trans}},
        scrollTop: false, 
        selected: 'System',
        
        // FCM Data
        fcmType: 'single',
        selectedTokens: [],
        fcmTopic: '',
        fcmTitle: '',
        fcmBody: '',
        fcmLoading: false,
        
        // Email Data
        selectedEmails: [],
        emailSubject: '',
        emailTemplate: 'templates/promotional_email_template.html',
        emailMessage: '',
        emailLoading: false,
        
        // Dynamic email fields based on template
        notificationActionUrl: 'https://yourapp.com/superadmin',
        notificationActionText: 'View Account',
        notificationInfoMessage: '',
        
        promoDiscount: '50',
        promoCode: 'SPECIAL50',
        promoExpiry: 'December 31, 2024',
        promoActionUrl: 'https://yourapp.com/shop',
        promoActionText: 'Shop Now & Save',
        promoFeatures: true,
        promoTerms: true,
        
        users: {{.users}},
        ...notificationData()
    }" x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
  :class="{'dark bg-gray-900': darkMode === true}">
  <!-- ===== Preloader Start ===== -->
  {{template "superadmin/partials/preloader" }}
  <!-- ===== Preloader End ===== -->

  <!-- ===== Page Wrapper Start ===== -->
  <div class="flex h-screen overflow-hidden">
    <!-- ===== Sidebar Start ===== -->
    {{template "superadmin/partials/sidebar" . }}
    <!-- ===== Sidebar End ===== -->

    <!-- ===== Content Area Start ===== -->
    <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto">
      <!-- Small Device Overlay Start -->
      {{template "superadmin/partials/overlay" }}
      <!-- Small Device Overlay End -->

      <!-- ===== Header Start ===== -->
      {{template "superadmin/partials/header" . }}
      <!-- ===== Header End ===== -->

      <!-- ===== Main Content Start ===== -->
      <main class="bg-gradient-to-br from-gray-50 to-gray-100 dark:from-gray-900 dark:to-gray-800 min-h-screen">
        <div class="p-4 mx-auto max-w-7xl md:p-6 2xl:p-8">
          <div class="space-y-8">
            <!-- Enhanced Header -->
            <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
              <div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent" x-text="trans.notifications_center"></h1>
                <p class="text-gray-600 dark:text-gray-400 mt-2 flex items-center gap-2">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                  </svg x-text="trans.send_push_notifications_and_emails_to_your_users"></p>
              </div>
              <div class="flex items-center gap-3 text-sm">
                <div class="px-4 py-2 bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700">
                  <span class="text-gray-500 dark:text-gray-400">Total Users:</span>
                  <span class="ml-2 font-bold text-blue-600 dark:text-blue-400" x-text="users.length"></span>
                </div>
              </div>
            </div>

            <input type="hidden" name="csrf_token" value="{{.csrfToken}}">

            <!-- Notification Tabs -->
            <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">

              <!-- FCM Notifications Card -->
              <div class="rounded-3xl border-2 border-gray-200 bg-white p-8 dark:border-gray-700 dark:bg-gray-800 shadow-xl card-hover">
                <div class="flex items-center gap-4 mb-6 pb-6 border-b border-gray-200 dark:border-gray-700">
                  <div class="p-3 bg-gradient-to-br from-blue-500 to-blue-600 rounded-xl shadow-lg">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                    </svg>
                  </div>
                  <div>
                    <h3 class="text-xl font-bold text-gray-900 dark:text-white" x-text="trans.push_notifications"></h3>
                    <p class="text-sm text-gray-500 dark:text-gray-400" x-text="trans.firebase_cloud_messaging"></p>
                  </div>
                </div>

                <div class="space-y-5">
                  <!-- Notification Type -->
                  <div>
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3" x-text="trans.notification_type"></label>
                    <div class="grid grid-cols-3 gap-2 p-1 bg-gray-100 dark:bg-gray-700 rounded-xl">
                      <button @click="fcmType = 'single'" :class="fcmType === 'single' ? 'bg-white dark:bg-gray-600 shadow-md' : ''" class="px-4 py-2.5 rounded-lg text-sm font-medium transition-all duration-200" x-text="trans.single"></button>
                      <button @click="fcmType = 'multiple'" :class="fcmType === 'multiple' ? 'bg-white dark:bg-gray-600 shadow-md' : ''" class="px-4 py-2.5 rounded-lg text-sm font-medium transition-all duration-200" x-text="trans.multiple"></button>
                      <button @click="fcmType = 'topic'" :class="fcmType === 'topic' ? 'bg-white dark:bg-gray-600 shadow-md' : ''" class="px-4 py-2.5 rounded-lg text-sm font-medium transition-all duration-200" x-text="trans.topic"></button>
                    </div>
                  </div>

                  <!-- Single/Multiple Users -->
                  <div x-show="fcmType === 'single' || fcmType === 'multiple'" class="animate-slide-in">
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3">
                      <span x-show="fcmType === 'single'" x-text="trans.select_user"></span>
                      <span x-show="fcmType === 'multiple'" x-text="trans.select_users"></span>
                    </label>
                    <select x-model="selectedTokens" 
                      :multiple="fcmType === 'multiple'"
                      :size="fcmType === 'multiple' ? '6' : '1'"
                      class="w-full fcm-select rounded-xl border-2 border-gray-300 bg-white px-4 py-3 text-sm text-gray-900 focus:border-blue-500 focus:ring-4 focus:ring-blue-200 focus:outline-none dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:focus:border-blue-400 dark:focus:ring-blue-900 transition-all duration-200">
                      <template x-for="user in users" :key="user.id">
                        <option :value="user.token" x-text="user.fullname + ' (' + user.email + ')'"></option>
                      </template>
                    </select>
                    <div class="flex items-center justify-between mt-2">
                      <p class="text-xs text-gray-500 dark:text-gray-400" x-show="fcmType === 'multiple'" x-text="trans.hold_ctrlcmd_to_select_multiple"></p>
                      <p class="text-xs font-semibold text-blue-600 dark:text-blue-400" x-show="Array.isArray(selectedTokens) && selectedTokens.length > 0">
                        <span x-text="selectedTokens.length"></span x-text="trans.selected"></p>
                    </div>
                  </div>

                  <!-- Topic -->
                  <div x-show="fcmType === 'topic'" class="animate-slide-in">
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3" x-text="trans.topic_name"></label>
                    <input type="text" x-model="fcmTopic" placeholder="e.g., news, updates, promotions"
                      class="w-full rounded-xl border-2 border-gray-300 bg-white px-4 py-3 text-sm text-gray-900 focus:border-blue-500 focus:ring-4 focus:ring-blue-200 focus:outline-none dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:focus:border-blue-400 dark:focus:ring-blue-900 transition-all duration-200">
                  </div>

                  <!-- Title -->
                  <div>
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3" x-text="trans.title"></label>
                    <input type="text" x-model="fcmTitle" placeholder="Enter notification title"
                      class="w-full rounded-xl border-2 border-gray-300 bg-white px-4 py-3 text-sm text-gray-900 focus:border-blue-500 focus:ring-4 focus:ring-blue-200 focus:outline-none dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:focus:border-blue-400 dark:focus:ring-blue-900 transition-all duration-200">
                  </div>

                  <!-- Body -->
                  <div>
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3" x-text="trans.message"></label>
                    <textarea x-model="fcmBody" rows="4" placeholder="Enter notification message"
                      class="w-full rounded-xl border-2 border-gray-300 bg-white px-4 py-3 text-sm text-gray-900 focus:border-blue-500 focus:ring-4 focus:ring-blue-200 focus:outline-none dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:focus:border-blue-400 dark:focus:ring-blue-900 transition-all duration-200 resize-none"></textarea>
                  </div>

                  <!-- Send Button -->
                  <button @click="sendFCM()" :disabled="fcmLoading"
                    class="w-full bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white py-4 px-6 rounded-xl font-semibold transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-3 shadow-lg hover:shadow-xl transform hover:-translate-y-1">
                    <span x-show="fcmLoading" class="animate-spin">
                      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" stroke-dasharray="32" stroke-dashoffset="32">
                          <animate attributeName="stroke-dashoffset" dur="1s" values="32;0" repeatCount="indefinite" />
                        </circle>
                      </svg>
                    </span>
                    <svg x-show="!fcmLoading" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                    </svg>
                    <span x-text="fcmLoading ? 'Sending...' : 'Send Notification'"></span>
                  </button>
                </div>
              </div>

              <!-- Email Notifications Card -->
              <div class="rounded-3xl border-2 border-gray-200 bg-white p-8 dark:border-gray-700 dark:bg-gray-800 shadow-xl card-hover">
                <div class="flex items-center gap-4 mb-6 pb-6 border-b border-gray-200 dark:border-gray-700">
                  <div class="p-3 bg-gradient-to-br from-green-500 to-green-600 rounded-xl shadow-lg">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                    </svg>
                  </div>
                  <div>
                    <h3 class="text-xl font-bold text-gray-900 dark:text-white" x-text="trans.email_notifications"></h3>
                    <p class="text-sm text-gray-500 dark:text-gray-400" x-text="trans.send_templated_emails"></p>
                  </div>
                </div>

                <div class="space-y-5">
                  <!-- Select Users -->
                  <div>
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3" x-text="trans.select_recipients"></label>
                    <select x-model="selectedEmails" multiple size="6"
                      class="w-full email-select rounded-xl border-2 border-gray-300 bg-white px-4 py-3 text-sm text-gray-900 focus:border-green-500 focus:ring-4 focus:ring-green-200 focus:outline-none dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:focus:border-green-400 dark:focus:ring-green-900 transition-all duration-200">
                      <template x-for="user in users" :key="user.id">
                        <option :value="user.email" x-text="user.fullname + ' (' + user.email + ')'"></option>
                      </template>
                    </select>
                    <div class="flex items-center justify-between mt-2">
                      <p class="text-xs text-gray-500 dark:text-gray-400" x-text="trans.hold_ctrlcmd_to_select_multiple"></p>
                      <p class="text-xs font-semibold text-green-600 dark:text-green-400" x-show="selectedEmails.length > 0">
                        <span x-text="selectedEmails.length"></span x-text="trans.selected"></p>
                    </div>
                  </div>

                  <!-- Subject -->
                  <div>
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3" x-text="trans.subject"></label>
                    <input type="text" x-model="emailSubject" placeholder="Enter email subject"
                      class="w-full rounded-xl border-2 border-gray-300 bg-white px-4 py-3 text-sm text-gray-900 focus:border-green-500 focus:ring-4 focus:ring-green-200 focus:outline-none dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:focus:border-green-400 dark:focus:ring-green-900 transition-all duration-200">
                  </div>

                  <!-- Template Selection -->
                  <div>
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3" x-text="trans.email_template"></label>
                    <div class="grid grid-cols-2 gap-2 p-1 bg-gray-100 dark:bg-gray-700 rounded-xl">
                      <button @click="emailTemplate = 'templates/notification_email_template.html'" 
                        :class="emailTemplate === 'templates/notification_email_template.html' ? 'bg-white dark:bg-gray-600 shadow-md' : ''" 
                        class="px-4 py-2.5 rounded-lg text-sm font-medium transition-all duration-200" x-text="trans.notification"></button>
                      <button @click="emailTemplate = 'templates/promotional_email_template.html'" 
                        :class="emailTemplate === 'templates/promotional_email_template.html' ? 'bg-white dark:bg-gray-600 shadow-md' : ''" 
                        class="px-4 py-2.5 rounded-lg text-sm font-medium transition-all duration-200" x-text="trans.promotional"></button>
                    </div>
                  </div>

                  <!-- Dynamic Fields for Notification Template -->
                  <div x-show="emailTemplate === 'templates/notification_email_template.html'" class="animate-slide-in">
                    <div class="space-y-4 p-5 bg-gradient-to-br from-blue-50 to-blue-100 rounded-2xl dark:from-blue-900/20 dark:to-blue-800/20 border-2 border-blue-200 dark:border-blue-800">
                      <h4 class="font-bold text-blue-900 dark:text-blue-100 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg x-text="trans.notification_settings"></h4>

                      <div>
                        <label class="block text-sm font-medium text-blue-900 dark:text-blue-200 mb-2" x-text="trans.action_url"></label>
                        <input type="text" x-model="notificationActionUrl" placeholder="https://yourapp.com/action"
                          class="w-full rounded-lg border-2 border-blue-300 bg-white px-3 py-2.5 text-sm text-gray-900 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none dark:border-blue-700 dark:bg-gray-800 dark:text-white">
                      </div>

                      <div>
                        <label class="block text-sm font-medium text-blue-900 dark:text-blue-200 mb-2" x-text="trans.action_button_text"></label>
                        <input type="text" x-model="notificationActionText" placeholder="Take Action"
                          class="w-full rounded-lg border-2 border-blue-300 bg-white px-3 py-2.5 text-sm text-gray-900 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none dark:border-blue-700 dark:bg-gray-800 dark:text-white">
                      </div>

                      <div>
                        <label class="block text-sm font-medium text-blue-900 dark:text-blue-200 mb-2" x-text="trans.additional_info"></label>
                        <textarea x-model="notificationInfoMessage" rows="2"
                          placeholder="Important information or instructions..."
                          class="w-full rounded-lg border-2 border-blue-300 bg-white px-3 py-2.5 text-sm text-gray-900 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none dark:border-blue-700 dark:bg-gray-800 dark:text-white resize-none"></textarea>
                      </div>
                    </div>
                  </div>

                  <!-- Dynamic Fields for Promotional Template -->
                  <div x-show="emailTemplate === 'templates/promotional_email_template.html'" class="animate-slide-in">
                    <div class="space-y-4 p-5 bg-gradient-to-br from-green-50 to-green-100 rounded-2xl dark:from-green-900/20 dark:to-green-800/20 border-2 border-green-200 dark:border-green-800">
                      <h4 class="font-bold text-green-900 dark:text-green-100 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg x-text="trans.promotional_settings"></h4>

                      <div class="grid grid-cols-2 gap-3">
                        <div>
                          <label class="block text-sm font-medium text-green-900 dark:text-green-200 mb-2" x-text="trans.discount"></label>
                          <input type="text" x-model="promoDiscount" placeholder="50"
                            class="w-full rounded-lg border-2 border-green-300 bg-white px-3 py-2.5 text-sm text-gray-900 focus:border-green-500 focus:ring-2 focus:ring-green-200 focus:outline-none dark:border-green-700 dark:bg-gray-800 dark:text-white">
                        </div>

                        <div>
                          <label class="block text-sm font-medium text-green-900 dark:text-green-200 mb-2" x-text="trans.promo_code"></label>
                          <input type="text" x-model="promoCode" placeholder="SPECIAL50"
                            class="w-full rounded-lg border-2 border-green-300 bg-white px-3 py-2.5 text-sm text-gray-900 focus:border-green-500 focus:ring-2 focus:ring-green-200 focus:outline-none dark:border-green-700 dark:bg-gray-800 dark:text-white">
                        </div>
                      </div>

                      <div>
                        <label class="block text-sm font-medium text-green-900 dark:text-green-200 mb-2" x-text="trans.expiry_date"></label>
                        <input type="text" x-model="promoExpiry" placeholder="December 31, 2024"
                          class="w-full rounded-lg border-2 border-green-300 bg-white px-3 py-2.5 text-sm text-gray-900 focus:border-green-500 focus:ring-2 focus:ring-green-200 focus:outline-none dark:border-green-700 dark:bg-gray-800 dark:text-white">
                      </div>

                      <div>
                        <label class="block text-sm font-medium text-green-900 dark:text-green-200 mb-2" x-text="trans.action_url"></label>
                        <input type="text" x-model="promoActionUrl" placeholder="https://yourapp.com/shop"
                          class="w-full rounded-lg border-2 border-green-300 bg-white px-3 py-2.5 text-sm text-gray-900 focus:border-green-500 focus:ring-2 focus:ring-green-200 focus:outline-none dark:border-green-700 dark:bg-gray-800 dark:text-white">
                      </div>

                      <div>
                        <label class="block text-sm font-medium text-green-900 dark:text-green-200 mb-2" x-text="trans.action_button_text"></label>
                        <input type="text" x-model="promoActionText" placeholder="Shop Now & Save"
                          class="w-full rounded-lg border-2 border-green-300 bg-white px-3 py-2.5 text-sm text-gray-900 focus:border-green-500 focus:ring-2 focus:ring-green-200 focus:outline-none dark:border-green-700 dark:bg-gray-800 dark:text-white">
                      </div>

                      <div class="flex items-center gap-4 pt-2">
                        <label class="flex items-center cursor-pointer">
                          <input type="checkbox" x-model="promoFeatures"
                            class="w-4 h-4 rounded border-green-400 text-green-600 focus:ring-green-500 focus:ring-2">
                          <span class="ml-2 text-sm font-medium text-green-900 dark:text-green-200" x-text="trans.show_features"></span>
                        </label>
                        <label class="flex items-center cursor-pointer">
                          <input type="checkbox" x-model="promoTerms"

  <script>
    // Send FCM Notification
    
      async function sendFCM(tabledata) {
      const csrfToken = document.querySelector('input[name="csrf_token"]')?.value;

      // Validation
      if (!tabledata.fcmTitle || !tabledata.fcmBody) {
        showNotification('Title and message are required', 'error');
        return;
      }

      if (tabledata.fcmType === 'single' && (!tabledata.selectedTokens || (Array.isArray(tabledata.selectedTokens) && tabledata.selectedTokens.length === 0))) {
        showNotification('Please select a user', 'error');
        return;
      }

      if (tabledata.fcmType === 'multiple' && (!Array.isArray(tabledata.selectedTokens) || tabledata.selectedTokens.length === 0)) {
        showNotification('Please select at least one user', 'error');
        return;
      }

      if (tabledata.fcmType === 'topic' && !tabledata.fcmTopic) {
        showNotification('Topic name is required', 'error');
        return;
      }

      tabledata.fcmLoading = true;

      // Handle single token case - ensure it's an array
      const tokens = tabledata.fcmType === 'single' ?
        (Array.isArray(tabledata.selectedTokens) ? tabledata.selectedTokens : [tabledata.selectedTokens]) :
        tabledata.selectedTokens;

      const payload = {
        type: tabledata.fcmType,
        tokens: tokens,
        topic: tabledata.fcmTopic,
        title: tabledata.fcmTitle,
        body: tabledata.fcmBody
      };

      fetch(u('/notifications/fcm'), {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': csrfToken
        },
        body: JSON.stringify(payload)
      })
        .then(response => {
          tabledata.fcmLoading = false;
          if (response.ok) {
            showNotification('Notification sent successfully', 'success');
            // Reset form
            tabledata.fcmTitle = '';
            tabledata.fcmBody = '';
            tabledata.selectedTokens = [];
            tabledata.fcmTopic = '';
          } else {
            showNotification('Failed to send notification', 'error');
          }
        })
        .catch(error => {
          tabledata.fcmLoading = false;
          console.error('Error:', error);
          showNotification('Failed to send notification', 'error');
        });
    }

    // Send Email

    async function sendEmail(tabledata)  {
      const csrfToken = document.querySelector('input[name="csrf_token"]')?.value;

      // Validation
      if (tabledata.selectedEmails.length === 0) {
        showNotification('Please select at least one user', 'error');
        return;
      }

      if (!tabledata.emailSubject) {
        showNotification('Subject is required', 'error');
        return;
      }

      if (!tabledata.emailMessage) {
        showNotification('Message is required', 'error');
        return;
      }

      tabledata.emailLoading = true;

      // Prepare template-specific data dynamically
      let templateData = {};

      if (tabledata.emailTemplate === 'templates/notification_email_template.html') {
        templateData = {
          subject: tabledata.emailSubject,
          user_name: "User", // This would be dynamically set per user in backend
          message: tabledata.emailMessage,
          info_message: tabledata.notificationInfoMessage || "Important information regarding your account.",
          action_url: tabledata.notificationActionUrl,
          action_text: tabledata.notificationActionText
        };
      } else if (tabledata.emailTemplate === 'templates/promotional_email_template.html') {
        templateData = {
          subject: tabledata.emailSubject,
          user_name: "Valued Customer", // This would be dynamically set per user in backend
          message: tabledata.emailMessage,
          discount_percentage: tabledata.promoDiscount,
          promo_code: tabledata.promoCode,
          expiry_date: tabledata.promoExpiry,
          action_url: tabledata.promoActionUrl,
          action_text: tabledata.promoActionText,
          features: tabledata.promoFeatures,
          terms: tabledata.promoTerms
        };
      }

      const payload = {
        emails: tabledata.selectedEmails,
        subject: tabledata.emailSubject,
        template: tabledata.emailTemplate,
        data: templateData
      };

      fetch(u('/notifications/email'), {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': csrfToken
        },
        body: JSON.stringify(payload)
      })
        .then(response => {
          tabledata.emailLoading = false;
          if (response.ok) {
            showNotification('Emails are being sent', 'success');
            // Reset form
            tabledata.emailSubject = '';
            tabledata.emailMessage = '';
            tabledata.selectedEmails = [];
          } else {
            showNotification('Failed to send emails', 'error');
          }
        })
        .catch(error => {
          tabledata.emailLoading = false;
          console.error('Error:', error);
          showNotification('Failed to send emails', 'error');
        });
    }

    function notificationData() {
      return {

        sendEmail() {
          window.sendEmail(this);

        },

        sendFCM() {
          window.sendFCM(this);
        },
      }
    };
  </script>
