<!DOCTYPE html>
<html lang="en">

    <title >System Config | Superadmin</title>
    <link rel="icon" type="image/png" href="/static/favicon.ico" />

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/static/src/output.css" />
<script>
  window.DASH_BASE='{{.dashBase}}';
</script>

</head>

<body

      perms:{{.perms}},
      trans:{{.trans}},
}"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}">
    {{template "superadmin/partials/preloader" }}

        <!-- ===== Sidebar Start ===== -->
        <!-- ===== Sidebar End ===== -->
        {{template "superadmin/partials/sidebar" . }}

            <!-- Small Device Overlay End -->
            {{template "superadmin/partials/overlay" }}

            <!-- ===== Header Start ===== -->
            <!-- ===== Header End ===== -->
            {{template "superadmin/partials/header" . }}

                            <p class="text-gray-600 mt-2" x-text="trans.update_system_settings_and_environment_variables"></p>
                        </div>

                        <div id="alertBox" class="hidden mb-6 p-4 rounded-lg"></div>

                                        <input type="checkbox" name="MaintenanceMode" {{if
                                            .config.MaintenanceMode}}checked{{end}} class="sr-only peer">
                                        <div
                                            class="w-14 h-7 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-yellow-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-yellow-600">
                                        </div>
                                        <span class="ml-3 text-sm font-medium text-gray-900">{{if.config.MaintenanceMode}}ON{{else}}OFF{{end}}</span>
                                    </label>

            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+=_-';
            let key = '';
            // Create a typed array to hold secure random values
            const array = new Uint8Array(length);
            // Fill the array with cryptographically strong random numbers
            crypto.getRandomValues(array);

            // Iterate over the array and map random values to characters
            for (let i = 0; i < length; i++) {
                key += chars[array[i] % chars.length];
            }

            // Set the input value and change the input type
            input.value = key;
            input.type = 'text';

            // Visual feedback for the button (example using your original class names)
            button.classList.add('text-green-600');
            setTimeout(() => {
                button.classList.remove('text-green-600');
                button.classList.add('text-green-500');
            }, 300);
        }

        function togglePassword(button) {
            const input = button.closest('.relative').querySelector('input');
            if (input.type === 'password') {
                input.type = 'text';
                button.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path></svg>`;
            } else {
                input.type = 'password';
                button.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>`;
            }
        }

        function copyToClipboard(button) {
            const input = button.closest('.relative').querySelector('input');
            const value = input.value;

            navigator.clipboard.writeText(value).then(() => {
                const originalHTML = button.innerHTML;
                button.innerHTML = `<svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;

                setTimeout(() => {
                    button.innerHTML = originalHTML;
                }, 1500);
            }).catch(err => {
                showAlert('Failed to copy to clipboard', 'error');
            });
        }

        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.className = `mb-6 p-4 rounded-lg ${type === 'success' ? 'bg-green-100 text-green-800 border border-green-200' : 'bg-red-100 text-red-800 border border-red-200'}`;
            alertBox.innerHTML = `
                <div class="flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                        ${type === 'success'
                    ? '<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>'
                    : '<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>'
                }
                    </svg>
                    <span class="font-medium">${message}</span>

            `;
            alertBox.classList.remove('hidden');

            setTimeout(() => {

   async function updateConfig(method) {
    const form = document.getElementById('configForm');
    
    // Create data object
    const data = {};
    
    // Manually collect each field by name
    const fieldNames = [
        'DATABASE_URL', 'REDIS_ADDR', 'STROAGE_URL', 'STROAGE_TOKEN',
        'JWT_SECRET', 'SMTP_EMAIL', 'SMTP_PASSWORD', 'SMTP_HOST', 'SMTP_PORT',
        'SESSION_SECRET_KEY', 'COKIES_SECRET_KEY', 'APP_SECRET', 'SIGN_SECRET',
        'GOOGLE_CLIENT_ID', 'GOOGLE_CLIENT_SECRET', 'GOOGLE_REDIRECT_URL',
        'FACEBOOK_CLIENT_ID', 'FACEBOOK_CLIENT_SECRET', 'FACEBOOK_REDIRECT_URL',
        'FACEBOOK_APP_ID', 'FACEBOOK_APP_SECRET',
        'STRIPE_SECRET_KEY', 'STRIPE_PUBLIC_KEY', 'STRIPE_WEBHOOK_SECRET',
        'GROQ_API_KEY', 'CLIENT_ID', 'CLIENT_SECRET','Maintenance_end_time',
        'VIVA_Merchant_ID', 'VIVA_API_KEY', 'VIVA_API_URL',
        'STROAGE_URL', 'STROAGE_TOKEN',
        'APP_ID', 'GUEST_API_KEY', 'COINFLOW_API_KEY', 'BASE_URL'
    ];
    
    // Get text/password fields
    fieldNames.forEach(name => {
        const input = form.querySelector(`input[name="${name}"]`);
        if (input) {
            data[name] = input.value || '';
        }
    });
    
    // Get numeric fields
    const bufferSizeInput = form.querySelector('input[name="broadcast_buffer_size"]');
    if (bufferSizeInput) {
        data['broadcast_buffer_size'] = parseInt(bufferSizeInput.value) || 100;
    }
    
    const commissionInput = form.querySelector('input[name="PLATFR_OMCOMMISION"]');
    if (commissionInput) {
        data['PLATFR_OMCOMMISION'] = parseFloat(commissionInput.value) || 3.0;
    }
    
    // Get checkbox fields
    const maintenanceCheckbox = form.querySelector('input[name="MaintenanceMode"]');
    if (maintenanceCheckbox) {
        data['MaintenanceMode'] = maintenanceCheckbox.checked;
    }
    
    const migrationsCheckbox = form.querySelector('input[name="RUN_MIGRATIONS"]');
    if (migrationsCheckbox) {
        data['RUN_MIGRATIONS'] = migrationsCheckbox.checked;
    }
    
    const storeCheckbox = form.querySelector('input[name="STORE_PRODCUT_ENABLE"]');
    if (storeCheckbox) {
        data['STORE_PRODCUT_ENABLE'] = storeCheckbox.checked;
    }
    
    const inviteCheckbox = form.querySelector('input[name="INVITE_ONLY"]');
    if (inviteCheckbox) {
        data['INVITE_ONLY'] = inviteCheckbox.checked;
    }

  

    // Determine endpoint
    let endpoint;
    if (method === 'restart') {
        endpoint = '/superadmin/config/update-restart';
    } else if (method === 'systemd') {
        endpoint = '/superadmin/config/update-systemd';
    }

    // Disable buttons
    const buttons = document.querySelectorAll('button[type="button"]');
    buttons.forEach(btn => {
        btn.disabled = true;
        btn.classList.add('opacity-50', 'cursor-not-allowed');
    });

    try {
        // Get CSRF token
        const csrfToken = form.querySelector('input[name="_csrf"]').value;
        
        const response = await fetch(endpoint, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrfToken
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok && result.success) {
            showAlert(result.message, 'success');

            if (method === 'restart' || method === 'systemd') {
                setTimeout(() => {
                    showAlert('Server is restarting. This page will reload in 10 seconds...', 'success');
                    setTimeout(() => {
                        window.location.reload();
                    }, 10000);
                }, 2000);
            }
        } else {
            showAlert(result.error || 'Failed to update configuration', 'error');
            buttons.forEach(btn => {
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            });
        }
    } catch (error) {
        showAlert('Network error: ' + error.message, 'error');
        buttons.forEach(btn => {
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
        });
    }
}
