        <button id="delete-confirm-btn" hx-delete="" hx-target="#orders-table-container" hx-swap="none"
          hx-include="form[name='filters']"
          hx-on::before-request="document.getElementById('orders-table-load').style.display = 'block'; document.getElementById('orders-table-container').style.display = 'none';"
          hx-on::after-request="
         const xhr = event.detail.xhr;
          const redirectURL = xhr.getResponseHeader('HX-Redirect');

         if (redirectURL) {
        window.location.href = redirectURL;
        }
        else 
          if (event.detail.xhr.status === 200) {
              document.getElementById('orders-table-load').style.display = 'none';
              document.getElementById('orders-table-container').style.display = 'block';
                const tableData = Alpine.$data(document.body);
                const orderId = tableData.currentOrderID;
              tableData.isOrderDeleteModalOpen=false;

                const row = document.getElementById('row-' + orderId);
                  if (row) row.remove();
              showNotification('Order Update', 'success');

          } else {
              const message = event.detail.xhr.responseText ? JSON.parse(event.detail.xhr.responseText).error : 'Failed to update status';
              showNotification(message, 'error');
          }
     
    " type="button"
          class="shadow-theme-xs flex justify-center rounded-lg bg-red-500 px-4 py-3 text-sm font-medium text-white hover:bg-red-600" x-text="trans.yes_im_sure"></button>
