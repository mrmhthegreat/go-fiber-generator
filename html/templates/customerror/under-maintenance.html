<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>{{.trans.maintenance}}</title>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <link rel="stylesheet" href="/static/src/output.css" />
    <style>
      .countdown-container {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      .countdown-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        min-width: 70px;
      }
      .countdown-value {
        font-size: 2.5rem;
        font-weight: bold;
        line-height: 1;
        padding: 0.75rem 1rem;
        background: rgba(59, 130, 246, 0.1);
        border-radius: 0.5rem;
        min-width: 70px;
        text-align: center;
      }
      .countdown-label {
        font-size: 0.875rem;
        margin-top: 0.5rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .dark .countdown-value {
        background: rgba(59, 130, 246, 0.2);
      }
    </style>
  </head>
  <body
    x-data="maintenanceTimer()"
    x-init="init()"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <!-- ===== Preloader Start ===== -->
    {{template "superadmin/partials/preloader" }}
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div
      class="relative z-1 flex min-h-screen flex-col items-center justify-center overflow-hidden p-6"
    >
      <!-- Centered Content -->
      <div class="mx-auto w-full max-w-md text-center sm:max-w-sm">
        <h1
          class="mb-8 text-title-md font-bold text-gray-800 dark:text-white/90 xl:text-title-2xl"
        >{{.trans.error}}</h1>

        <img
          src="/static/image/503.svg"
          alt="maintenance"
          class="dark:hidden"
        />
        <img
          src="/static/image/503-dark.svg"
          alt="maintenance"
          class="hidden dark:block"
        />

        <p
          class="mb-6 mt-10 text-base text-gray-700 dark:text-gray-400 sm:text-lg"
        >{{.trans.our_site_is_currently_under_maintenance_we_will_be}}</p>

        <!-- Countdown Timer -->
        <div class="mt-8 mb-6" x-show="!isComplete">
          <p class="text-sm text-gray-600 dark:text-gray-400 mb-4">
            {{.trans.time_remaining}}:
          </p>
          <div class="countdown-container">
            <div class="countdown-item">
              <div class="countdown-value text-blue-600 dark:text-blue-400" x-text="days"></div>
              <div class="countdown-label text-gray-600 dark:text-gray-400">{{.trans.days}}</div>
            </div>
            <div class="countdown-item">
              <div class="countdown-value text-blue-600 dark:text-blue-400" x-text="hours"></div>
              <div class="countdown-label text-gray-600 dark:text-gray-400">{{.trans.hours}}</div>
            </div>
            <div class="countdown-item">
              <div class="countdown-value text-blue-600 dark:text-blue-400" x-text="minutes"></div>
              <div class="countdown-label text-gray-600 dark:text-gray-400">{{.trans.minutes}}</div>
            </div>
            <div class="countdown-item">
              <div class="countdown-value text-blue-600 dark:text-blue-400" x-text="seconds"></div>
              <div class="countdown-label text-gray-600 dark:text-gray-400">{{.trans.seconds}}</div>
            </div>
          </div>
        </div>

        <!-- Maintenance Complete Message -->
        <div x-show="isComplete" class="mt-8 mb-6">
          <p class="text-lg font-semibold text-green-600 dark:text-green-400">
            {{.trans.maintenance_completed}}
          </p>
          <button 
            @click="window.location.reload()"
            class="mt-4 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors"
          >
            {{.trans.refresh}}
          </button>
        </div>
      </div>

      <!-- Footer -->
      <p
        class="absolute bottom-6 left-1/2 -translate-x-1/2 text-center text-sm text-gray-maintenance dark:text-gray-400"
      >
        © <span id="year">2025</span> - {{.trans.lemly}}
      </p>
    </div>
    <!-- ===== Page Wrapper End ===== -->

    <script>
      function maintenanceTimer() {
        return {
          darkMode: false,
          loaded: true,
          days: '00',
          hours: '00',
          minutes: '00',
          seconds: '00',
          isComplete: false,
          endTime: null,
          interval: null,

          init() {
            // Get maintenance end time from server
            const maintenanceEndTime = '{{.maintenance_end_time}}';
            
            if (!maintenanceEndTime) {
              console.error('No maintenance end time provided');
              return;
            }

            // Parse the end time
            this.endTime = new Date(maintenanceEndTime);
            
            // Check if valid date
            if (isNaN(this.endTime.getTime())) {
              console.error('Invalid maintenance end time');
              return;
            }

            // Initialize dark mode
            this.darkMode = JSON.parse(localStorage.getItem('darkMode') || 'false');
            this.$watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)));

            // Start countdown
            this.updateCountdown();
            this.interval = setInterval(() => this.updateCountdown(), 1000);
          },

          updateCountdown() {
            const now = new Date().getTime();
            const distance = this.endTime - now;

            if (distance < 0) {
              this.isComplete = true;
              this.days = '00';
              this.hours = '00';
              this.minutes = '00';
              this.seconds = '00';
              
              if (this.interval) {
                clearInterval(this.interval);
              }
              
              // Optional: Auto-refresh after 5 seconds
              setTimeout(() => {
                window.location.reload();
              }, 5000);
              
              return;
            }

            // Calculate time units
            this.days = this.pad(Math.floor(distance / (1000 * 60 * 60 * 24)));
            this.hours = this.pad(Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)));
            this.minutes = this.pad(Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)));
            this.seconds = this.pad(Math.floor((distance % (1000 * 60)) / 1000));
          },

          pad(num) {
            return num.toString().padStart(2, '0');
          }
        }
      }
    </script>

    <script
      defer
      src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.13.3/dist/cdn.min.js"
    ></script>
  </body>
</html>
