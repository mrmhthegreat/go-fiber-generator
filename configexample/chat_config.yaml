# ============================================================================
# CHAT CONFIGURATION - Fully Dynamic
# ============================================================================
rbac:
  enabled: true
# ============================================================================
# WEBSOCKET CONFIGURATION - Fully Dynamic
# ============================================================================
websocket:
  enabled: true
  handler_type: dedicated  # unified | dedicated
  path: /ws  # WebSocket endpoint path
  
  # ──────────────────────────────────────────────────────────────────────────
  # Authentication Configuration - FULLY DYNAMIC
  # ──────────────────────────────────────────────────────────────────────────
  authentication:
    method: jwt  # jwt | session | custom | none
    
    # JWT Configuration - All Dynamic!
    jwt:
      secret_key_env: JWT_SECRET  # If source=env
      algorithm: HS256  # HS256 | HS384 | HS512 | RS256 | RS384 | RS512 | ES256 | ES384 | ES512
      
      # Claims configuration - Define which claims to extract
      claims:
        user_id:
          claim_name: user_id  # Name of claim in JWT
          type: float64  # float64 | string | int
          required: true
        
        role:
          claim_name: role
          type: string
          required: false
        
        email:
          claim_name: email
          type: string
          required: false
      
      # Token extraction
      extraction:
        header: Authorization  # Header name
        header_prefix: "Bearer "  # Prefix to strip
        query_param: token  # Alternative: query parameter
        cookie_name: ""  # Alternative: cookie name
    
    # App Token Configuration - DYNAMIC!
    app_token:
      enabled: true
      secret_key: APP_TOKEN  # If source=env
      header_name: X-App-Token  # Header to check
      query_param: app_token  # Alternative: query parameter
      required: false  # If true, both JWT and app token required
    
    # Session-based authentication (if method=session)
    session:
      cookie_name: session_id
      validation_function: ValidateSession  # Custom function name
    
    # Custom authentication (if method=custom)
    custom:
      function_name: CustomAuthHandler  # Your custom auth function
  
  # ──────────────────────────────────────────────────────────────────────────
  # Connection Configuration
  # ──────────────────────────────────────────────────────────────────────────
  connection:
    read_buffer_size: 1024
    write_buffer_size: 1024
    handshake_timeout: 10  # seconds
    read_deadline: 60  # seconds, 0 = no deadline
    write_deadline: 10  # seconds
    pong_wait: 60  # seconds
    ping_period: 54  # seconds (must be less than pong_wait)
    max_message_size: 512  # KB
  
  # ──────────────────────────────────────────────────────────────────────────
  # Presence Tracking - OPTIONAL
  # ──────────────────────────────────────────────────────────────────────────
  presence:
    enabled: true
    broadcast_on_connect: true
    broadcast_on_disconnect: true
    visibility: all  # all | admins | friends | custom
    
    # Custom visibility function (if visibility=custom)
    custom_visibility_function: CheckPresenceVisibility
    
    # Presence events
    events:
      - name: user_online
        broadcast_to: [admins, friends]  # admins | users | friends | all | custom
        persist: false  # Save to database?
      
      - name: user_offline
        broadcast_to: [admins]
        persist: false
  
  # ──────────────────────────────────────────────────────────────────────────
  # Hub Configuration - Connection Pools
  # ──────────────────────────────────────────────────────────────────────────
  hub:
    pools:
      - name: admins
        enabled: true
        key_by: connection  # connection | user_id | room_id
        auto_register: false  # Auto-register on connect?
        description: "Admin connections for support chat"
      
      - name: users
        enabled: true
        key_by: user_id
        auto_register: true
        description: "Regular user connections"
      
      - name: game_rooms
        enabled: false
        key_by: room_id
        auto_register: false
        description: "Game room connections"
    
    # Broadcast Channels
    channels:
      - name: broadcastAdmin
        enabled: true
        buffer_size: 100
        drop_on_full: true  # Drop messages if buffer full?
        description: "Broadcast to all admins"
      
      - name: broadcastUser
        enabled: true
        buffer_size: 100
        drop_on_full: true
        description: "Broadcast to specific users"
      
      - name: broadcastStatus
        enabled: true
        buffer_size: 50
        drop_on_full: false
        description: "Presence status updates"
      
      - name: broadcastNotify
        enabled: true
        buffer_size: 200
        drop_on_full: true
        description: "Notification broadcasts"
  
  # ──────────────────────────────────────────────────────────────────────────
  # Events Configuration - Define ANY Events
  # ──────────────────────────────────────────────────────────────────────────
  events:
    # Chat message event
    - name: message_sent
      enabled: true
      handler_type: chat_message  # chat_message | custom | generic
      broadcast_to: [conversation]  # conversation | user | room | all | admins | custom
      persist: true  # Save to database
      requires_auth: true
      rate_limit:
        enabled: false
        max_per_minute: 60
      throttle:
        enabled: false
        delay_ms: 100
    
    # Custom game event example
    - name: game_move
      enabled: true
      handler_type: custom
      custom_handler: handleGameMove  # Function name
      broadcast_to: [room]
      persist: false
      requires_auth: true
      rate_limit:
        enabled: true
        max_per_minute: 120
    
    # Dashboard metric update example
    - name: metric_update
      enabled: true
      handler_type: custom
      custom_handler: handleMetricUpdate
      broadcast_to: [all]
      persist: false  # Ephemeral
      requires_auth: true
    
    # Location tracking example
    - name: location_update
      enabled: true
      handler_type: custom
      custom_handler: handleLocationUpdate
      broadcast_to: [custom]
      custom_broadcast_function: BroadcastToNearby
      persist: false
      requires_auth: true
      throttle:
        enabled: true
        delay_ms: 500  # Max 2 updates per second
  
  # ──────────────────────────────────────────────────────────────────────────
  # Rooms/Channels Support (Optional)
  # ──────────────────────────────────────────────────────────────────────────
  rooms:
    enabled: false
    auto_join:
      enabled: false
      pattern: "user_{user_id}"  # Auto-join pattern
    
    custom_rooms:
      - name: lobby
        auto_join: true
      - name: game_{game_id}
        auto_join: false


chat:
  enabled: true
  
  # ──────────────────────────────────────────────────────────────────────────
  # Chat Modes - Enable/Disable Features
  # ──────────────────────────────────────────────────────────────────────────
  modes:
    support: false  # Admin-to-user support chat
    user_to_user: true  # User-to-user messaging (OPTIONAL!)
    group: false  # Group chat (future feature)
  
  # ──────────────────────────────────────────────────────────────────────────
  # Models Configuration - Define ANY Fields
  # ──────────────────────────────────────────────────────────────────────────
  models:
    conversation:
      enabled: true
      timestamps: true  # Add CreatedAt, UpdatedAt
      soft_delete: true  # Add DeletedAt
      
      fields:
        - name: id
          type: uint
          primary_key: true
          auto_increment: true
          json_tag: id
        
        - name: user_id
          type: uint
          required: true
          index: true
          json_tag: user_id
          description: "Primary user in conversation"
        
        - name: receiver_id
          type: "*uint"  # Pointer = optional
          index: true
          json_tag: receiver_id
          description: "For user-to-user chat (optional)"
        
        - name: status
          type: string
          gorm_type: varchar(20)
          default: open
          json_tag: status
          validation:
            enum: [open, closed, archived]
        
        - name: conv_type
          type: string
          gorm_type: varchar(20)
          default: chat
          json_tag: conv_type
          validation:
            enum: [chat, support, group]
        
        - name: is_read_only
          type: bool
          default: false
          json_tag: is_read_only
        
        - name: last_message
          type: string
          gorm_type: text
          json_tag: last_message
          required: false
        
        - name: priority
          type: string
          gorm_type: varchar(10)
          default: normal
          json_tag: priority
          validation:
            enum: [low, normal, high, urgent]
        
        # Custom fields - Add ANY fields you need!
        - name: metadata
          type: "*string"
          gorm_type: json
          json_tag: metadata
          description: "Custom JSON metadata"
        
        - name: tags
          type: "*string"
          gorm_type: json
          json_tag: tags
          description: "Tags for categorization"
      
      # Relations
      relations:
        - name: User
          model: User
          foreign_key: UserID
          preload: true
          has_many: false
        
        - name: Receiver
          model: User
          foreign_key: ReceiverID
          preload: true
          has_many: false
        
        - name: Messages
          model: Message
          foreign_key: ConversationID
          preload: false
          has_many: true
      
      # Indexes
      indexes:
        - name: idx_user_receiver
          fields: [user_id, receiver_id]
          unique: false
        
        - name: idx_status_type
          fields: [status, conv_type]
          unique: false
    
    message:
      enabled: true
      timestamps: true
      soft_delete: true
      
      fields:
        - name: id
          type: uint
          primary_key: true
          auto_increment: true
        
        - name: conversation_id
          type: uint
          required: true
          index: true
        
        - name: sender_id
          type: uint
          required: true
          index: true
        
        - name: sender_type
          type: string
          gorm_type: varchar(20)
          default: user
          validation:
            enum: [user, admin, system]
        
        - name: content
          type: string
          gorm_type: text
          required: true
        
        - name: is_read
          type: bool
          default: false
        
        - name: search_data
          type: "*string"
          gorm_type: json
          description: "Search/location data for support"
        
        # Custom fields
        - name: attachments
          type: "*string"
          gorm_type: json
          description: "File attachments metadata"
        
        - name: reply_to_id
          type: "*uint"
          index: true
          description: "For threaded replies"
      
      relations:
        - name: Conversation
          model: Conversation
          foreign_key: ConversationID
          preload: false
        
        - name: Sender
          model: User
          foreign_key: SenderID
          preload: true
  
  # ──────────────────────────────────────────────────────────────────────────
  # Repository Configuration
  # ──────────────────────────────────────────────────────────────────────────
  repository:
    # Search fields for conversations
    search_fields:
      conversation: [status, conv_type, last_message]
      message: [content]
    
    # Default sorting
    default_sort:
      conversation:
        field: updated_at
        order: desc
      message:
        field: created_at
        order: asc
    
    # Pagination
    pagination:
      default_limit: 20
      max_limit: 100
    
    # Custom methods (optional)
    custom_methods:
      - name: FindActiveConversations
        description: "Find all active conversations"
      - name: FindUnreadMessages
        description: "Find unread messages for user"
  
  # ──────────────────────────────────────────────────────────────────────────
  # Controller Configuration
  # ──────────────────────────────────────────────────────────────────────────
  controller:
    enabled: true
    base_path: /api/v1/chat
    
    # Endpoints - Enable/Disable
    endpoints:
      list_conversations:
        enabled: true
        path: /conversations
        method: GET
        middleware: ["auth"]
      
      list_messages:
        enabled: true
        path: /conversations/:id/messages
        method: GET
        middleware: ["auth"]
      
      send_message:
        enabled: true
        path: /conversations/:id/messages
        method: POST
        middleware: ["auth"]
      
      mark_as_read:
        enabled: true
        path: /conversations/:id/read
        method: POST
        middleware: ["auth"]
    
    # Validation rules
    validation:
      message:
        content:
          required: true
          min_length: 1
          max_length: 5000
      
      conversation:
        receiver_id:
          required_if: conv_type=chat
  
  # ──────────────────────────────────────────────────────────────────────────
  # Web Handler Configuration (for server-side rendering)
  # ──────────────────────────────────────────────────────────────────────────
  web_handler:
    enabled: true
    base_path: /chat
    template_dir: views/chat
    permission: chat.view
    middleware: ["auth"]
    context:
      needs_user: true
      needs_csrf: true
      needs_perms: true
      needs_dashbase: true
      needs_translations: true
      user_config:
        use_repo: true
        repo_name: userRepo
        method: GetByID
    send_message:
      enabled: true
      path: /send-message
      method: POST
      permission: [chat.send]
      middleware: ["auth"]
    list_conversations:
      enabled: true
      path: /conversations
      method: GET
      permission: [chat.view]
      middleware: ["auth"]
    list_messages:
      enabled: true
      path: /conversations/:id/messages
      method: GET
      permission: [chat.view]
      middleware: ["auth"]
    mark_as_read:
      enabled: true
      path: /conversations/:id/read
      method: POST
      permission: [chat.view]
      middleware: ["auth"]
    close_conversation:
      enabled: true
      path: /conversations/:id/close
      method: POST
      permission: [chat.view]
      middleware: ["auth"]
    serach_user:
      enabled: true
      path: /search-user
      method: GET
      permission: [chat.view]
      middleware: ["auth"]
      
  # ──────────────────────────────────────────────────────────────────────────
  # WebSocket Integration
  # ──────────────────────────────────────────────────────────────────────────
  websocket:
    enabled: false
    path: /ws/chat
    admin_path: /ws/admin/chat
