  # ==========================================
  # COMMENT MODEL
  # ==========================================
  - name: Comment
    table_name: comments
    soft_delete: true
    timestamps: true
    
    pagination: true
    filters: [post_id, user_id, status, parent_id]
    sort_by: [created_at, like_count]
    
    fields:
      - name: ID
        type: uint
        gorm: "primaryKey;autoIncrement"
        json: "id"
      
      - name: PostID
        type: uint
        gorm: "not null;index"
        json: "post_id"
      
      - name: UserID
        type: uint
        gorm: "not null;index"
        json: "user_id"
      
      - name: ParentID
        type: "*uint"
        gorm: "null;index"
        json: "parent_id"
      
      - name: Content
        type: string
        gorm: "type:text;not null"
        json: "content"
        validate: "required,min=1"
      
      - name: Status
        type: string
        gorm: "type:varchar(20);default:'pending'"
        json: "status"
        validate: "oneof=pending approved rejected spam"
      
      - name: LikeCount
        type: int
        gorm: "default:0"
        json: "like_count"
    
    relations:
      - name: Post
        type: belongs_to
        model: Post
        foreign_key: PostID
      
      - name: User
        type: belongs_to
        model: User
        foreign_key: UserID
      
      - name: Parent
        type: belongs_to
        model: Comment
        foreign_key: ParentID
      
      - name: Replies
        type: has_many
        model: Comment
        foreign_key: ParentID
    
    create_dto:
      enabled: true
      fields: [PostID, ParentID, Content]
    
    update_dto:
      enabled: true
      partial: true
      fields: [Content, Status]
    
    list_response:
      enabled: true
      fields:
        - name: ID
          type: uint
          json_name: id
          from_field: ID
        - name: Content
          type: string
          json_name: content
          from_field: Content
        - name: Status
          type: string
          json_name: status
          from_field: Status
        - name: LikeCount
          type: int
          json_name: like_count
          from_field: LikeCount
        - name: CreatedAt
          type: time.Time
          json_name: created_at
          from_field: CreatedAt
      include_relations:
        - name: User
          response_type: nested_detail
          response_struct: UserListItem
          json_name: user
          foreign_key: UserID
    
    detail_response:
      enabled: true
      fields:
        - name: ID
          type: uint
          json_name: id
          from_field: ID
        - name: PostID
          type: uint
          json_name: post_id
          from_field: PostID
        - name: Content
          type: string
          json_name: content
          from_field: Content
        - name: Status
          type: string
          json_name: status
          from_field: Status
        - name: LikeCount
          type: int
          json_name: like_count
          from_field: LikeCount
        - name: CreatedAt
          type: time.Time
          json_name: created_at
          from_field: CreatedAt
        - name: UpdatedAt
          type: time.Time
          json_name: updated_at
          from_field: UpdatedAt
      include_relations:
        - name: User
          response_type: nested_detail
          response_struct: UserListItem
          json_name: user
          foreign_key: UserID
        - name: Replies
          response_type: nested_list
          response_struct: CommentListItem
          json_name: replies

   # ==========================================
 
  # ==========================================
  # MEDIA MODEL - File upload heavy model
  # ==========================================
  - name: Media
    table_name: media
    timestamps: true
    
    fields:
      - name: ID
        type: uint
        gorm: "primaryKey"
        json: "id"
      
      - name: Filename
        type: string
        gorm: "not null"
        json: "filename"
      
      - name: FilePath
        type: string
        gorm: "not null"
        json: "file_path"
      
      - name: MimeType
        type: string
        gorm: "not null"
        json: "mime_type"
      
      - name: Size
        type: int64
        gorm: "not null"
        json: "size"
      
      - name: AltText
        type: "*string"
        json: "alt_text"
      
      - name: UserID
        type: uint
        gorm: "not null"
        json: "user_id"
    
    dtos:
      # Upload media file
      - name: UploadMediaRequest
        type: create
        fields:
          - Filename  # Will be file upload
          - AltText
        file_fields:
          Filename: file  # This is the actual file
        custom_fields:
          - name: File
            type: "*multipart.FileHeader"
            json: "-"  # Use form:"file" in actual struct
      
      # Update metadata (no file)
      - name: UpdateMediaMetadataRequest
        type: update
        partial: true
        fields:
          - AltText
          - FilePath  # Could update the path
        file_fields:
          FilePath: string  # String, not file


  # PRODUCT MODEL - Images array example
  # ==========================================
  - name: Product
    table_name: products
    timestamps: true
    
    fields:
      - name: ID
        type: uint
        gorm: "primaryKey"
        json: "id"
      
      - name: Name
        type: string
        gorm: "not null"
        json: "name"
        validate: "required"
      
      - name: Description
        type: string
        gorm: "type:text"
        json: "description"
      
      - name: MainImage
        type: string
        json: "main_image"
      
      - name: Price
        type: float64
        gorm: "not null"
        json: "price"
        validate: "required,gt=0"
    
    dtos:
      # Create with main image file
      - name: CreateProductRequest
        type: create
        fields:
          - Name
          - Description
          - MainImage
          - Price
        file_fields:
          MainImage: file
      
      # Create with image URL
      - name: CreateProductWithURLRequest
        type: create
        fields:
          - Name
          - Description
          - MainImage
          - Price
        file_fields:
          MainImage: string
      
      # Update main image only
      - name: UpdateProductImageRequest
        type: update
        partial: false
        fields:
          - MainImage
        file_fields:
          MainImage: file
      
      # Complex update with multiple images
      - name: UpdateProductImagesRequest
        type: update
        partial: true
        fields:
          - MainImage
        file_fields:
          MainImage: file
        custom_fields:
          # For handling JSON array of images
          - name: AdditionalImages
            type: "[]UpdateProductImageInput"
            json: additional_images