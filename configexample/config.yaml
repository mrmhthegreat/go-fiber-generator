# [OPTIONAL] Role-Based Access Control configuration.
# Codebase Default: {}
rbac:
  # [OPTIONAL] Feature toggle.
  # Choices: true, false
  # Codebase Default: False
  enabled: true
  # [OPTIONAL] Configuration setting.
  service_name: RBACService
  # [OPTIONAL] Configuration setting.
  default_role: user
  # [OPTIONAL] Master role bypass string (super admin).
  all_privileges: super_admin
  # [OPTIONAL] Configuration setting.
  model_field: Role
  # [OPTIONAL] Array of role objects (e.g. {name: admin, dashboard_path: /admin}).
  # Codebase Default: []
  roles:
  # [OPTIONAL] Configuration setting.
  # Codebase Default: ""
  - name: admin
    # [OPTIONAL] Configuration setting.
    dashboard_path: /admin
  # [OPTIONAL] Configuration setting.
  # Codebase Default: ""
  - name: user
    # [OPTIONAL] Configuration setting.
    dashboard_path: /dashboard
  # [OPTIONAL] Configuration setting.
  # Codebase Default: ""
  - name: super_admin
    # [OPTIONAL] Configuration setting.
    dashboard_path: /super-admin
  # Codebase Default: {}
  controller:
    # [OPTIONAL] Feature toggle.
    # Choices: true, false
    # Codebase Default: False
    enabled: true
    # [OPTIONAL] Configuration setting.
    # Codebase Default: "/api/chat"
    base_path: /api/rbac
    # [OPTIONAL] Configuration setting.
    # Codebase Default: model_name
    tag: RBAC Management
    # Codebase Default: ['auth']
    middleware: []
    # Codebase Default: {}
    ListRoles:
      # [OPTIONAL] Feature toggle.
      # Choices: true, false
      # Codebase Default: False
      enabled: true
      # [OPTIONAL] Configuration setting.
      # Codebase Default: ''
      path: /roles
      # Codebase Default: ['auth']
