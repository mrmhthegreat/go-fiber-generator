project:
  # [REQUIRED] The Go module path for your backend.
  # Codebase Default: "github.com/user/project"
  module: github.com/username/my_api
  # [OPTIONAL] The central user entity for authentication.
  # Codebase Default: 'User'
  user_model_name: User
  # [OPTIONAL] Configuration setting.
  repository_name: UserRepository
  # Codebase Default: {}
  structure:
    # [OPTIONAL] Directory structure toggles (Clean Architecture).
    # Choices: true, false
    use_internal: true
    # [OPTIONAL] Directory structure toggles (Clean Architecture).
    # Choices: true, false
    use_pkg: true
    # [OPTIONAL] Directory structure toggles (Clean Architecture).
    # Choices: true, false
    use_cmd: true
    # [OPTIONAL] Configuration setting.
    # Codebase Default: 'server'
    cmd_name: server
i18n:
  # [OPTIONAL] Feature toggle.
  # Choices: true, false
  # Codebase Default: False
  enabled: true
  # [OPTIONAL] List of activated language codes.
  # Choices: en, ar, fr, ...
  languages:
  - en
  - fr
  - ar
template_engine:
  # [OPTIONAL] Feature toggle.
  # Choices: true, false
  # Codebase Default: False
  enabled: true
  # [OPTIONAL] Configuration setting.
  extension: .html
  # [OPTIONAL] Configuration setting.
  reload: true
  # [OPTIONAL] Configuration setting.
  time_format: 02 Jan 15:04
static_files:
  # [OPTIONAL] Feature toggle.
  # Choices: true, false
  # Codebase Default: False
  enabled: true
  # [OPTIONAL] Configuration setting.
  route: /static
# [REQUIRED] HTTP Server constraints.
# Codebase Default: {}
server:
  # [OPTIONAL] Configuration setting.
  # Codebase Default: "3000"
  port: '3000'
  # [OPTIONAL] Configuration setting.
  default_port: '3000'
  # [OPTIONAL] Max upload chunk size limit in bytes.
  body_limit: 50 * 1024 * 1024
  # [OPTIONAL] Configuration setting.
  body_limit_description: 50MB
  # [OPTIONAL] Pass context state to templates automatically.
  # Choices: true, false
  pass_locals_to_views: false
  # [OPTIONAL] Configuration setting.
  read_timeout: 10 * time.Second
  # [OPTIONAL] Configuration setting.
  write_timeout: 10 * time.Second
features:
  # [OPTIONAL] Configuration setting.
  cron_jobs: true
# Codebase Default: {}
database:
  # [REQUIRED] Database driver engine.
  # Choices: postgres, mysql, sqlite
  # Codebase Default: ""
  driver: postgres
  # [OPTIONAL] Environment variable lookup key.
  url_env: DATABASE_URL
  # [OPTIONAL] Environment variable lookup key.
  host_env: DATABASE_HOST
  # [OPTIONAL] Environment variable lookup key.
  port_env: DATABASE_PORT
  # [OPTIONAL] Environment variable lookup key.
  name_env: DATABASE_NAME
  # [OPTIONAL] Environment variable lookup key.
  user_env: DATABASE_USER
  # [OPTIONAL] Environment variable lookup key.
  password_env: DATABASE_PASSWORD
  # [OPTIONAL] Environment variable lookup key.
  ssl_mode_env: DATABASE_SSL_MODE
  # [OPTIONAL] Configuration setting.
  max_open_conns: 25
  # [OPTIONAL] Configuration setting.
  max_idle_conns: 5
  # [OPTIONAL] Configuration setting.
  conn_max_lifetime: 5 * time.Minute
  # [OPTIONAL] Automatically sync GORM schema on boot.
  # Choices: true, false
  auto_migrate: true
  # [OPTIONAL] Configuration setting.
  run_migrations: true
redis:
  # [OPTIONAL] Feature toggle.
  # Choices: true, false
  # Codebase Default: False
  enabled: true
  # [REQUIRED if redis enabled] Redis Server address env var.
  host_env: REDIS_ADDR
  # [OPTIONAL] Configuration setting.
  password_env: REDIS_PASSWORD
  # [OPTIONAL] Configuration setting.
  db_env: REDIS_DB
  # [OPTIONAL] Configuration setting.
  min_idle_conns: 5
  # [OPTIONAL] Configuration setting.
  max_retries: 3
  # [OPTIONAL] Configuration setting.
  retry_delay: 2 * time.Second
  # [OPTIONAL] Connection pooling constraint.
  pool_size: 20
  # [OPTIONAL] Configuration setting.
  session_addr_env: REDIS_ADDR
# Codebase Default: {}
swagger:
  # [OPTIONAL] Feature toggle.
  # Choices: true, false
  # Codebase Default: False
  enabled: true
  # [OPTIONAL] Configuration setting.
  title: My API
  # [OPTIONAL] Configuration setting.
  # Codebase Default: "No description provided"
  description: Professional Go Fiber API
  # [OPTIONAL] Configuration setting.
  version: 1.0.0
  # [OPTIONAL] Configuration setting.
  # Codebase Default: ""
  host: localhost:3000
  # [OPTIONAL] Configuration setting.
  # Codebase Default: "/api/chat"
  base_path: /api
  schemes:
  - http
  - https
  contact:
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    name: API Support
    # [OPTIONAL] Configuration setting.
    # Codebase Default: {}
    email: support@example.com
  license:
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    name: MIT
    # [OPTIONAL] Configuration setting.
    url: https://opensource.org/licenses/MIT
# Codebase Default: {}
email:
  # [OPTIONAL] Feature toggle.
  # Choices: true, false
  # Codebase Default: False
  enabled: true
  # [OPTIONAL] Configuration setting.
  provider: smtp
  # [OPTIONAL] Configuration setting.
  smtp_host_env: SMTP_HOST
  # [OPTIONAL] Configuration setting.
  smtp_port_env: SMTP_PORT
  # [OPTIONAL] Configuration setting.
  smtp_user_env: SMTP_EMAIL
  # [OPTIONAL] Configuration setting.
  smtp_password_env: SMTP_EMAIL_PASSWORD
# Codebase Default: {}
imap:
  # [OPTIONAL] Feature toggle.
  # Choices: true, false
  # Codebase Default: False
  enabled: true
  # [OPTIONAL] Configuration setting.
  host_env: IMAP_HOST
  # [OPTIONAL] Configuration setting.
  port_env: IMAP_PORT
  # [OPTIONAL] Configuration setting.
  user_env: IMAP_EMAIL
  # [OPTIONAL] Configuration setting.
  password_env: IMAP_PASSWORD
  # [OPTIONAL] Configuration setting.
  use_ssl: true
  # [OPTIONAL] Configuration setting.
  mailbox: INBOX
  # [OPTIONAL] Configuration setting.
  fetch_interval: 5 * time.Minute
  # [OPTIONAL] Configuration setting.
  # Codebase Default: {}
  mark_as_read: true
  # [OPTIONAL] Configuration setting.
  max_emails_per_fetch: 50
  # [OPTIONAL] Configuration setting.
  fetch_sent: true
  # Codebase Default: {}
  controller:
    # [OPTIONAL] Feature toggle.
    # Choices: true, false
    # Codebase Default: False
    enabled: true
    # Codebase Default: ['auth']
    middleware: []
    # [OPTIONAL] Configuration setting.
    # Codebase Default: "/api/chat"
    base_path: /api
    # Codebase Default: {}
    GetEmailsList:
      # [OPTIONAL] Feature toggle.
      # Choices: true, false
      # Codebase Default: False
      enabled: true
