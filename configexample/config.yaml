# Codebase Default: {}
websocket:
  # [OPTIONAL] Feature toggle.
  # Choices: true, false
  # Codebase Default: False
  enabled: true
  # [OPTIONAL] Connection routing strategy.
  # Choices: unified, dedicated
  # Codebase Default: 'action'
  handler_type: dedicated
  # [OPTIONAL] Configuration setting.
  # Codebase Default: ''
  path: /ws
  # Codebase Default: {}
  authentication:
    # [OPTIONAL] WebSocket secure auth.
    # Choices: jwt, session, none
    # Codebase Default: "GET"
    method: jwt
    jwt:
      # [OPTIONAL] Configuration setting.
      secret_key_env: JWT_SECRET
      # [OPTIONAL] Configuration setting.
      # Codebase Default: "HS256"
      algorithm: HS256
      claims:
        user_id:
          # [OPTIONAL] Configuration setting.
          claim_name: user_id
          # [OPTIONAL] Configuration setting.
          # Codebase Default: ""
          type: float64
          # [OPTIONAL] Configuration setting.
          # Codebase Default: False
          required: true
        role:
          # [OPTIONAL] Configuration setting.
          claim_name: role
          # [OPTIONAL] Configuration setting.
          # Codebase Default: ""
          type: string
          # [OPTIONAL] Configuration setting.
          # Codebase Default: False
          required: false
        # Codebase Default: {}
        email:
          # [OPTIONAL] Configuration setting.
          claim_name: email
          # [OPTIONAL] Configuration setting.
          # Codebase Default: ""
          type: string
          # [OPTIONAL] Configuration setting.
          # Codebase Default: False
          required: false
      extraction:
        # [OPTIONAL] Configuration setting.
        header: Authorization
        # [OPTIONAL] Configuration setting.
        header_prefix: 'Bearer '
        # [OPTIONAL] Configuration setting.
        query_param: token
        # [OPTIONAL] Configuration setting.
        cookie_name: ''
    # Codebase Default: ""
    app_token:
      # [OPTIONAL] Feature toggle.
      # Choices: true, false
      # Codebase Default: False
      enabled: true
      # [OPTIONAL] Configuration setting.
      secret_key: APP_TOKEN
      # [OPTIONAL] Configuration setting.
      header_name: X-App-Token
      # [OPTIONAL] Configuration setting.
      query_param: app_token
      # [OPTIONAL] Configuration setting.
      # Codebase Default: False
      required: false
    # Codebase Default: {}
    session:
      # [OPTIONAL] Configuration setting.
      cookie_name: session_id
      # [OPTIONAL] Configuration setting.
      validation_function: ValidateSession
    custom:
      # [OPTIONAL] Configuration setting.
      function_name: CustomAuthHandler
  connection:
    # [OPTIONAL] Configuration setting.
    read_buffer_size: 1024
    # [OPTIONAL] Configuration setting.
    write_buffer_size: 1024
    # [OPTIONAL] Configuration setting.
    handshake_timeout: 10
    # [OPTIONAL] Configuration setting.
    read_deadline: 60
    # [OPTIONAL] Configuration setting.
    write_deadline: 10
    # [OPTIONAL] Configuration setting.
    pong_wait: 60
    # [OPTIONAL] Configuration setting.
    ping_period: 54
    # [OPTIONAL] Configuration setting.
    max_message_size: 512
  # Codebase Default: {}
  presence:
    # [OPTIONAL] Feature toggle.
    # Choices: true, false
    # Codebase Default: False
    enabled: true
    # [OPTIONAL] Configuration setting.
    broadcast_on_connect: true
    # [OPTIONAL] Configuration setting.
    broadcast_on_disconnect: true
    # [OPTIONAL] Configuration setting.
    visibility: all
    # [OPTIONAL] Configuration setting.
    custom_visibility_function: CheckPresenceVisibility
    # Codebase Default: []
    events:
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    - name: user_online
      broadcast_to:
      - admins
      - friends
      # [OPTIONAL] Configuration setting.
      persist: false
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    - name: user_offline
      broadcast_to:
      - admins
      # [OPTIONAL] Configuration setting.
      persist: false
  hub:
    pools:
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    - name: admins
      # [OPTIONAL] Feature toggle.
      # Choices: true, false
      # Codebase Default: False
      enabled: true
      # [OPTIONAL] Configuration setting.
      key_by: connection
      # [OPTIONAL] Configuration setting.
      auto_register: false
      # [OPTIONAL] Configuration setting.
      # Codebase Default: "No description provided"
      description: Admin connections for support chat
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    - name: users
      # [OPTIONAL] Feature toggle.
      # Choices: true, false
      # Codebase Default: False
      enabled: true
      # [OPTIONAL] Configuration setting.
      key_by: user_id
      # [OPTIONAL] Configuration setting.
      auto_register: true
      # [OPTIONAL] Configuration setting.
      # Codebase Default: "No description provided"
      description: Regular user connections
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    - name: game_rooms
      # [OPTIONAL] Feature toggle.
      # Choices: true, false
      # Codebase Default: False
      enabled: false
      # [OPTIONAL] Configuration setting.
      key_by: room_id
      # [OPTIONAL] Configuration setting.
