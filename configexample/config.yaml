# [OPTIONAL] Unified Authentication System.
# Codebase Default: {}
authentication:
  # [OPTIONAL] Feature toggle.
  # Choices: true, false
  # Codebase Default: False
  enabled: true
  # Codebase Default: {}
  session:
    # [OPTIONAL] Feature toggle.
    # Choices: true, false
    # Codebase Default: False
    enabled: false
    claims:
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    - name: role
      # [OPTIONAL] Configuration setting.
      # Codebase Default: ""
      type: string
  # Codebase Default: []
  register_middleware: []
  jwt:
    # [OPTIONAL] Feature toggle.
    # Choices: true, false
    # Codebase Default: False
    enabled: true
    # [REQUIRED if jwt enabled] Cryptographic signing algorithm.
    # Choices: HS256, HS384, HS512, RS256, RS384, RS512
    # Codebase Default: "HS256"
    algorithm: HS256
    # [OPTIONAL] Configuration setting.
    expiry_hours: 24
    # [OPTIONAL] Configuration setting.
    secret_key_env: JWT_SECRET
    # [OPTIONAL] List of {name, type} payload tokens injected into the JWT.
    claims:
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    - name: role
      # [OPTIONAL] Configuration setting.
      # Codebase Default: ""
      type: string
  # Codebase Default: {}
  identifier:
    # Codebase Default: ["fullname", "name", "display_name", "first_name"]
    name_pool:
    - fullname
    # [REQUIRED if auth enabled] Ways a user can authenticate.
    # Choices: email, username, phone, email_or_username
    # Codebase Default: []
    login_methods:
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    - field: email
      # [OPTIONAL] Feature toggle.
      # Choices: true, false
      # Codebase Default: False
      enabled: false
      # [OPTIONAL] Configuration setting.
      repository_method: GetUserByEmail
      # [OPTIONAL] Configuration setting.
      # Codebase Default: {'use_validator': True}
      validation: required,email
      # [OPTIONAL] Configuration setting.
      error_message: invalid_email
      # Codebase Default: auth.get('rate_limit', {}
      rate_limit:
        # [OPTIONAL] Feature toggle.
        # Choices: true, false
        # Codebase Default: False
        enabled: false
        # [OPTIONAL] Configuration setting.
        # Codebase Default: ""
        name: email_login_rate_limit
      # Codebase Default: ['auth']
      middleware: []
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    - field: username
      # [OPTIONAL] Feature toggle.
      # Choices: true, false
      # Codebase Default: False
      enabled: false
      # [OPTIONAL] Configuration setting.
      repository_method: GetUserByUsername
      # [OPTIONAL] Configuration setting.
      # Codebase Default: {'use_validator': True}
      validation: required,min=3,max=50
      # [OPTIONAL] Configuration setting.
      error_message: invalid_username
      # Codebase Default: auth.get('rate_limit', {}
      rate_limit:
        # [OPTIONAL] Feature toggle.
        # Choices: true, false
        # Codebase Default: False
        enabled: false
        # [OPTIONAL] Configuration setting.
        # Codebase Default: ""
        name: username_login_rate_limit
      # Codebase Default: ['auth']
      middleware: []
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    - field: email_or_username
      # [OPTIONAL] Feature toggle.
      # Choices: true, false
      # Codebase Default: False
      enabled: true
      # [OPTIONAL] Configuration setting.
      repository_method: GetUserByEmailOrUsername
      # [OPTIONAL] Configuration setting.
      # Codebase Default: {'use_validator': True}
      validation: required
      # [OPTIONAL] Configuration setting.
      error_message: invalid_identifier
      # [OPTIONAL] Configuration setting.
      json_field: identifier
      # [OPTIONAL] Configuration setting.
      dto_description: Email or username
      # Codebase Default: auth.get('rate_limit', {}
      rate_limit:
        # [OPTIONAL] Feature toggle.
        # Choices: true, false
        # Codebase Default: False
        enabled: false
        # [OPTIONAL] Configuration setting.
        # Codebase Default: ""
        name: login_rate_limit
      # Codebase Default: ['auth']
      middleware: []
    # Codebase Default: []
    register_fields:
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    - field: email
      # [OPTIONAL] Configuration setting.
      # Codebase Default: False
      required: true
      # [OPTIONAL] Configuration setting.
      # Codebase Default: False
      unique: true
      # [OPTIONAL] Configuration setting.
      # Codebase Default: {'use_validator': True}
      validation: required,email
      # [OPTIONAL] Configuration setting.
      repository_check: GetUserByEmail
      # [OPTIONAL] Configuration setting.
      # Codebase Default: ""
      type: string
      # [OPTIONAL] Configuration setting.
      dto_type: string
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    - field: username
      # [OPTIONAL] Configuration setting.
      # Codebase Default: False
      required: false
      # [OPTIONAL] Configuration setting.
      # Codebase Default: False
      unique: true
      # [OPTIONAL] Configuration setting.
      # Codebase Default: {'use_validator': True}
      validation: omitempty,min=3,max=50
      # [OPTIONAL] Configuration setting.
      repository_check: GetUserByUsername
      # [OPTIONAL] Configuration setting.
      # Codebase Default: ""
      type: '*string'
      # [OPTIONAL] Configuration setting.
      dto_type: '*string'
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    - field: fullname
      # [OPTIONAL] Configuration setting.
      # Codebase Default: False
      required: true
      # [OPTIONAL] Configuration setting.
      # Codebase Default: False
      unique: false
      # [OPTIONAL] Configuration setting.
      # Codebase Default: {'use_validator': True}
      validation: required,min=2
      # [OPTIONAL] Configuration setting.
      # Codebase Default: ""
      type: string
      # [OPTIONAL] Configuration setting.
      dto_type: string
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    - field: phone
      # [OPTIONAL] Configuration setting.
      # Codebase Default: False
      required: false
      # [OPTIONAL] Configuration setting.
      # Codebase Default: False
      unique: true
      # [OPTIONAL] Configuration setting.
      # Codebase Default: {'use_validator': True}
      validation: omitempty,e164
      # [OPTIONAL] Configuration setting.
      repository_check: GetUserByPhone
      # [OPTIONAL] Configuration setting.
      # Codebase Default: ""
      type: '*string'
      # [OPTIONAL] Configuration setting.
      dto_type: '*string'
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    - field: password
      # [OPTIONAL] Configuration setting.
      # Codebase Default: False
      required: true
      # [OPTIONAL] Configuration setting.
      # Codebase Default: {'use_validator': True}
      validation: required,min=8
      # [OPTIONAL] Configuration setting.
      # Codebase Default: ""
      type: string
      # [OPTIONAL] Configuration setting.
      dto_type: string
      # [OPTIONAL] Configuration setting.
      sensitive: true
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    - field: profile_image
      # [OPTIONAL] Configuration setting.
      # Codebase Default: False
      required: false
      # [OPTIONAL] Configuration setting.
      file_upload: true
      # [OPTIONAL] Configuration setting.
      # Codebase Default: ""
      type: '*multipart.FileHeader'
      # [OPTIONAL] Configuration setting.
      dto_type: '*multipart.FileHeader'
      # [OPTIONAL] Configuration setting.
      # Codebase Default: self.to_snake_case(f['field']
      form_field: profile_image
      # [OPTIONAL] Configuration setting.
      model_field: ProfileImage
      # [OPTIONAL] Configuration setting.
      # Codebase Default: 5
      max_size_mb: 5
      # Codebase Default: []
      allowed_types:
      - image/jpeg
      - image/png
      - image/webp
      # [OPTIONAL] Configuration setting.
      # Codebase Default: f'uploads/{name.lower(
      storage_path: uploads/profiles
      # [OPTIONAL] Configuration setting.
      filename_pattern: profile_{user_id}_{timestamp}
  # Codebase Default: {}
  email_password:
    # [OPTIONAL] Feature toggle.
    # Choices: true, false
    # Codebase Default: False
    enabled: true
    # [OPTIONAL] Security computation depth.
    bcrypt_cost: 14
    password_validation:
      # [OPTIONAL] Configuration setting.
      min_length: 8
      # [OPTIONAL] Configuration setting.
      require_uppercase: true
      # [OPTIONAL] Configuration setting.
      require_lowercase: true
      # [OPTIONAL] Configuration setting.
      require_number: true
      # [OPTIONAL] Configuration setting.
      require_special: true
    # Codebase Default: {}
    forgot_password:
      # [OPTIONAL] Feature toggle.
      # Choices: true, false
      # Codebase Default: False
      enabled: true
      # [OPTIONAL] Configuration setting.
      otp_expiry: 10m
      # [OPTIONAL] Configuration setting.
      repository_method: GetUserByEmailOrUsernameForgot
      # [OPTIONAL] Configuration setting.
      email_template: templates/password_reset.html
      # Codebase Default: auth.get('rate_limit', {}
      rate_limit:
        # [OPTIONAL] Feature toggle.
        # Choices: true, false
        # Codebase Default: False
        enabled: false
        # [OPTIONAL] Configuration setting.
        # Codebase Default: ""
        name: forgot_password_rate_limit
      # Codebase Default: ['auth']
      middleware: []
      # [OPTIONAL] Configuration setting.
      identifier_field: email_or_username
    # Codebase Default: {}
    change_password:
      # [OPTIONAL] Feature toggle.
      # Choices: true, false
      # Codebase Default: False
      enabled: true
      # [OPTIONAL] Configuration setting.
      require_old_password: true
      # Codebase Default: auth.get('rate_limit', {}
      rate_limit:
        # [OPTIONAL] Feature toggle.
        # Choices: true, false
        # Codebase Default: False
        enabled: false
        # [OPTIONAL] Configuration setting.
        # Codebase Default: ""
        name: change_password_rate_limit
      # Codebase Default: ['auth']
      middleware: []
  # Codebase Default: {}
  email_verification:
    # [OPTIONAL] Feature toggle.
    # Choices: true, false
    # Codebase Default: False
    enabled: true
    # [OPTIONAL] Configuration setting.
    require_on_registration: true
    # [OPTIONAL] Constraint on OTP length.
    otp_length: 6
    # [OPTIONAL] Configuration setting.
    otp_expiry: 10m
    # [OPTIONAL] Configuration setting.
    email_template: templates/email_verification.html
    # Codebase Default: auth.get('rate_limit', {}
    rate_limit:
      # [OPTIONAL] Feature toggle.
      # Choices: true, false
      # Codebase Default: False
      enabled: false
      # [OPTIONAL] Configuration setting.
      # Codebase Default: ""
      name: email_verification_rate_limit
    # Codebase Default: ['auth']
    middleware: []
  # Codebase Default: {}
  social_auth:
    # Codebase Default: {}
    google:
      # [OPTIONAL] Feature toggle.
      # Choices: true, false
      # Codebase Default: False
      enabled: true
      # [OPTIONAL] Configuration setting.
      client_id_env: GOOGLE_CLIENT_ID
      # [OPTIONAL] Configuration setting.
      client_secret_env: GOOGLE_CLIENT_SECRET
      # [OPTIONAL] Configuration setting.
      redirect_url_env: GOOGLE_REDIRECT_URL
      # [OPTIONAL] Configuration setting.
      state: random
      # [OPTIONAL] Configuration setting.
      success_redirect: /dashboard
      field_mapping:
      # [OPTIONAL] Configuration setting.
      # Codebase Default: 'path'
      - source: name
        # [OPTIONAL] Configuration setting.
        target: Fullname
        # [OPTIONAL] Configuration setting.
        # Codebase Default: False
        required: false
      # [OPTIONAL] Configuration setting.
      # Codebase Default: 'path'
      - source: picture
        # [OPTIONAL] Configuration setting.
        target: ProfileImage
        # [OPTIONAL] Configuration setting.
        # Codebase Default: False
        required: false
      # [OPTIONAL] Configuration setting.
      repository_method: GetUserByGoogleID
      # Codebase Default: {}
      endpoints:
        # Codebase Default: {}
        api:
          # [OPTIONAL] Feature toggle.
          # Choices: true, false
          # Codebase Default: False
          enabled: true
          # [OPTIONAL] Configuration setting.
          # Codebase Default: ''
          path: /api/auth/google
          # [OPTIONAL] Configuration setting.
          # Codebase Default: "GET"
          method: POST
        # Codebase Default: {}
        web:
          # [OPTIONAL] Feature toggle.
          # Choices: true, false
          # Codebase Default: False
          enabled: true
          # [OPTIONAL] Configuration setting.
          # Codebase Default: f'/auth/{provider}/login'
          login_path: /auth/google/login
          # [OPTIONAL] Configuration setting.
          # Codebase Default: f'/auth/{provider}/callback'
          callback_path: /auth/google/callback
    # Codebase Default: {}
    facebook:
      # [OPTIONAL] Feature toggle.
      # Choices: true, false
      # Codebase Default: False
      enabled: true
      # [OPTIONAL] Configuration setting.
      client_id_env: FACEBOOK_CLIENT_ID
      # [OPTIONAL] Configuration setting.
      client_secret_env: FACEBOOK_CLIENT_SECRET
      # [OPTIONAL] Configuration setting.
      redirect_url_env: FACEBOOK_REDIRECT_URL
      # [OPTIONAL] Configuration setting.
      state: random
      # [OPTIONAL] Configuration setting.
      success_redirect: /dashboard
      field_mapping:
      # [OPTIONAL] Configuration setting.
      # Codebase Default: 'path'
      - source: name
        # [OPTIONAL] Configuration setting.
        target: Fullname
        # [OPTIONAL] Configuration setting.
        # Codebase Default: False
        required: false
      # [OPTIONAL] Configuration setting.
      repository_method: GetUserByFacebookID
      # Codebase Default: {}
      endpoints:
        # Codebase Default: {}
        api:
          # [OPTIONAL] Feature toggle.
          # Choices: true, false
          # Codebase Default: False
          enabled: true
          # [OPTIONAL] Configuration setting.
          # Codebase Default: ''
          path: /api/auth/facebook
          # [OPTIONAL] Configuration setting.
          # Codebase Default: "GET"
          method: POST
        # Codebase Default: {}
        web:
          # [OPTIONAL] Feature toggle.
          # Choices: true, false
          # Codebase Default: False
          enabled: true
          # [OPTIONAL] Configuration setting.
          # Codebase Default: f'/auth/{provider}/login'
          login_path: /auth/facebook/login
          # [OPTIONAL] Configuration setting.
          # Codebase Default: f'/auth/{provider}/callback'
          callback_path: /auth/facebook/callback
  # Codebase Default: {}
  refresh_token:
    # [OPTIONAL] Feature toggle.
    # Choices: true, false
    # Codebase Default: False
    enabled: true
    # [OPTIONAL] Configuration setting.
    expiry: 168h
    # [OPTIONAL] Issue new Refresh Token on successful use.
    # Choices: true, false
    rotate_on_refresh: true
    # Codebase Default: auth.get('rate_limit', {}
    rate_limit:
      # [OPTIONAL] Feature toggle.
      # Choices: true, false
      # Codebase Default: False
      enabled: false
      # [OPTIONAL] Configuration setting.
      # Codebase Default: ""
      name: refresh_token_rate_limit
    # Codebase Default: ['auth']
    middleware: []
  # Codebase Default: {}
  logout:
    # [OPTIONAL] Feature toggle.
    # Choices: true, false
    # Codebase Default: False
    enabled: true
    # [OPTIONAL] Configuration setting.
    clear_tokens: true
  # Codebase Default: []
  app_check_tokens:
  # [OPTIONAL] Configuration setting.
  # Codebase Default: ""
  - name: admin_token
    # [OPTIONAL] Configuration setting.
    # Codebase Default: "HS256"
    algorithm: HS512
    # [OPTIONAL] Configuration setting.
    secret_key_env: ADMIN_TOKEN_SECRET
    # [OPTIONAL] Configuration setting.
    expiry_hours: 720
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ''
    endpoint: generate_admin_token
    # Codebase Default: ['auth']
    middleware:
    - auth
    - admin
    claims:
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    - name: user_id
      # [OPTIONAL] Configuration setting.
      # Codebase Default: ""
      type: uint
      # [OPTIONAL] Configuration setting.
      # Codebase Default: 'path'
      source: input
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    - name: role
      # [OPTIONAL] Configuration setting.
      # Codebase Default: ""
      type: string
      # [OPTIONAL] Configuration setting.
      # Codebase Default: 'path'
      source: input
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    - name: permissions
      # [OPTIONAL] Configuration setting.
      # Codebase Default: ""
      type: '[]string'
      # [OPTIONAL] Configuration setting.
      # Codebase Default: 'path'
      source: input
  # [OPTIONAL] Configuration setting.
  # Codebase Default: ""
  - name: api_token
    # [OPTIONAL] Configuration setting.
    # Codebase Default: "HS256"
    algorithm: HS256
    # [OPTIONAL] Configuration setting.
    secret_key_env: API_TOKEN_SECRET
    # [OPTIONAL] Configuration setting.
    expiry_hours: 8760
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ''
    endpoint: generate_api_token
    # Codebase Default: ['auth']
    middleware:
    - auth
    claims:
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    - name: app_id
      # [OPTIONAL] Configuration setting.
      # Codebase Default: ""
      type: string
      # [OPTIONAL] Configuration setting.
      # Codebase Default: 'path'
      source: config
      # [OPTIONAL] Configuration setting.
      config_key: APP_ID
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    - name: scope
      # [OPTIONAL] Configuration setting.
      # Codebase Default: ""
      type: string
      # [OPTIONAL] Configuration setting.
      # Codebase Default: 'path'
      source: input
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    - name: environment
      # [OPTIONAL] Configuration setting.
      # Codebase Default: ""
      type: string
      # [OPTIONAL] Configuration setting.
      # Codebase Default: 'path'
      source: config
      # [OPTIONAL] Configuration setting.
      config_key: ENVIRONMENT
  # Codebase Default: {}
  web_auth:
    # [OPTIONAL] Feature toggle.
    # Choices: true, false
    # Codebase Default: False
    enabled: true
    # Codebase Default: {}
    endpoints:
      login:
        # [OPTIONAL] Feature toggle.
        # Choices: true, false
        # Codebase Default: False
        enabled: true
        # [OPTIONAL] Configuration setting.
        # Codebase Default: ''
        path: /auth/login
        # Codebase Default: auth.get('rate_limit', {}
        rate_limit:
          # [OPTIONAL] Feature toggle.
          # Choices: true, false
          # Codebase Default: False
          enabled: false
          # [OPTIONAL] Configuration setting.
          # Codebase Default: ""
          name: login_rate_limit
      # Codebase Default: {}
      signup:
        # [OPTIONAL] Feature toggle.
        # Choices: true, false
