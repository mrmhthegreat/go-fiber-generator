    enabled: true
    # [OPTIONAL] Configuration setting.
    header: X-CSRFToken
    # [OPTIONAL] Configuration setting.
    # Codebase Default: self.to_snake_case(f['field']
    form_field: csrf_token
    # [OPTIONAL] Configuration setting.
    cookie_name: csrf_
    # [OPTIONAL] Configuration setting.
    same_site: Lax
    # [OPTIONAL] Configuration setting.
    expiration: 1 * time.Hour
    # [OPTIONAL] Configuration setting.
    context_key: csrf
  # Codebase Default: auth.get('rate_limit', {}
