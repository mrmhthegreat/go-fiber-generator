# [OPTIONAL] Global route filters and endpoints.
# Codebase Default: ['auth']
middleware:
  maintenance:
    # [OPTIONAL] Feature toggle.
    # Choices: true, false
    # Codebase Default: False
    enabled: true
    # [OPTIONAL] Configuration setting.
    mode_key_env: MAINTENANCE_MODE
    exclude_paths:
    - /under-maintenance
    - /static/
    - /health
    # [OPTIONAL] Configuration setting.
    redirect_path: /under-maintenance
    # [OPTIONAL] Configuration setting.
    api_error_code: service_unavailable_maintenance
  # Codebase Default: {}
  database:
    # [OPTIONAL] Feature toggle.
    # Choices: true, false
    # Codebase Default: False
    enabled: true
    # [OPTIONAL] Configuration setting.
    context_key: db
  cors:
    # [OPTIONAL] Feature toggle.
    # Choices: true, false
    # Codebase Default: False
    enabled: true
    # [OPTIONAL] Configuration setting.
    allow_origins: '*'
    # [OPTIONAL] Configuration setting.
    allow_headers: Origin, Content-Type, Accept, Authorization
    # [OPTIONAL] Configuration setting.
    allow_methods: GET, POST, PUT, DELETE, OPTIONS, PATCH
    # [OPTIONAL] Configuration setting.
    allow_credentials: true
  compression:
    # [OPTIONAL] Feature toggle.
    # Choices: true, false
    # Codebase Default: False
    enabled: true
    # [OPTIONAL] Configuration setting.
    level: best_speed
  logging:
    # [OPTIONAL] Feature toggle.
    # Choices: true, false
    # Codebase Default: False
    enabled: true
    # [OPTIONAL] Configuration setting.
    log_body: false
  csrf:
    # [OPTIONAL] Feature toggle.
    # Choices: true, false
