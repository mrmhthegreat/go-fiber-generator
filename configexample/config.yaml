# ─────────────────────────────────────────────────────────────
# API Protocols
# ─────────────────────────────────────────────────────────────

graphql:
  # [OPTIONAL] Feature toggle.
  # Choices: true, false
  # Codebase Default: False
  enabled: true
  # [OPTIONAL] Configuration setting.
  # Codebase Default: ''
  path: /graphql
  # [OPTIONAL] Configuration setting.
  playground: true              # GraphiQL in dev
  # [OPTIONAL] Configuration setting.
  introspection: true           # Schema introspection
  # [OPTIONAL] Guard against nested AST query attacks.
  complexity_limit: 1000        # Query depth protection
  
  # Schema generation
  models:
    # [OPTIONAL] Configuration setting.
    include: [User, Post, Category, Comment]  # Expose these models
    # [OPTIONAL] Configuration setting.
    exclude_fields: [password, secret_token, reset_token]  # Global blacklist
    
  # Custom queries beyond CRUD
  queries:
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    - name: me
      # [OPTIONAL] Configuration setting.
      # Codebase Default: ""
      type: User
      # [OPTIONAL] Configuration setting.
      resolver: GetCurrentUser
      # [OPTIONAL] Configuration setting.
      auth_required: true
      
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    - name: searchPosts
      # [OPTIONAL] Configuration setting.
      # Codebase Default: ""
      type: Post
      # [OPTIONAL] Configuration setting.
      # Codebase Default: {}
      list: true
      # [OPTIONAL] Configuration setting.
      # Codebase Default: False
      pagination: true
      args:
        # [OPTIONAL] Configuration setting.
        # Codebase Default: ""
        - name: query
          # [OPTIONAL] Configuration setting.
          # Codebase Default: ""
          type: String!
        # [OPTIONAL] Configuration setting.
        # Codebase Default: ""
        - name: filters
          # [OPTIONAL] Configuration setting.
          # Codebase Default: ""
          type: PostSearchInput    # References DTO/input type
          
  mutations:
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    - name: publishPost
      # [OPTIONAL] Configuration setting.
      input: PublishPostInput
      # [OPTIONAL] Configuration setting.
      # Codebase Default: ""
      type: Post
      # [OPTIONAL] Configuration setting.
      resolver: PublishPost
      # [OPTIONAL] Configuration setting.
      auth_required: true
      # [OPTIONAL] Configuration setting.
      # Codebase Default: ['chat.send']
      permissions: [post.publish]
      
  # [OPTIONAL] Configuration setting.
  subscriptions:                  # Real-time (uses your WebSocket)
    # [OPTIONAL] Feature toggle.
    # Choices: true, false
    # Codebase Default: False
    enabled: true
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ''
    path: /graphql/ws
    # Codebase Default: []
    events:
      # [OPTIONAL] Configuration setting.
      # Codebase Default: ""
      - name: postCreated
        # [OPTIONAL] Configuration setting.
        # Codebase Default: ""
        type: Post
        # [OPTIONAL] Configuration setting.
        filter: public_posts     # Optional filtering logic

grpc:
  # [OPTIONAL] Feature toggle.
  # Choices: true, false
  # Codebase Default: False
  enabled: true
  # [OPTIONAL] Configuration setting.
  # Codebase Default: "3000"
  port: 50051
  tls:
    # [OPTIONAL] Toggle HTTP/2 SSL generation.
    # Choices: true, false
    # Codebase Default: False
    enabled: false
    # [OPTIONAL] Configuration setting.
    cert_env: GRPC_TLS_CERT
    # [OPTIONAL] Configuration setting.
    key_env: GRPC_TLS_KEY
    
  # Proto generation settings
  package: blogapi              # proto package name
  # [OPTIONAL] Configuration setting.
  go_package: github.com/user/project/internal/proto
  
  # HTTP transcoding (REST fallback via grpc-gateway)
  gateway:
    # [OPTIONAL] Feature toggle.
    # Choices: true, false
    # Codebase Default: False
    enabled: true
    # [OPTIONAL] Configuration setting.
    # Codebase Default: "3000"
    port: 8081                  # HTTP port for gRPC-Gateway
    
  services:
    # [OPTIONAL] Configuration setting.
    # Codebase Default: ""
    - name: PostService
      # [OPTIONAL] Configuration setting.
      # Codebase Default: []
      models: [Post]            # Auto-generate CRUD RPCs
      custom_methods:
        # [OPTIONAL] Configuration setting.
        # Codebase Default: ""
        - name: PublishPost
          # [OPTIONAL] Configuration setting.
          input: PublishPostRequest
          # [OPTIONAL] Configuration setting.
          output: Post
          http_mapping:
            # [OPTIONAL] Configuration setting.
            # Codebase Default: "GET"
            method: POST
            # [OPTIONAL] Configuration setting.
            # Codebase Default: ''
            path: /api/v1/posts/{id}/publish
            
