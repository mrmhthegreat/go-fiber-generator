project:
  module: github.com/username/my_api
  user_model_name: User  # Name of your user model
  repository_name: UserRepository  # Repository interface name to use
  
# ============================================================================
# NOTIFICATIONS CONFIGURATION - Fully Dynamic
# ============================================================================

rbac:
  enabled: true
  service_name: "RBACService"
  default_role: user
  all_privileges: 'super_admin'
  model_field: Role  # Field name in User model
  # Define custom roles with dashboard paths
# ============================================
# FCM CONFIGURATION
# ============================================
fcm:
  enabled: true
  credentials_path_env: FCM_CREDENTIALS_PATH
  project_id_env: FCM_PROJECT_ID
  save_to_database: false
  admin_topic_env: admin_default_stogne
  controller:
    enabled: true
    middleware: []
    base_path: /api
    SendFCM:
      enabled: true
      middleware: []
      path: /send-fcm
    SubscribeToTopic:
      enabled: true
      middleware: []
      path: /subscribe-to-topic

  web_handler:
    enabled: false
    middleware: []
    permissions: [post.view.user]
    context:
      needs_user: true
      needs_csrf: true
      needs_perms: true
      needs_dashbase: true
      needs_translations: true
      # base_translations: PostBase
      # extra_translations: [CommonTranslations]
      user_config:
        use_repo: true
        repo_name: userRepo
        method: GetByID
        get_all_method: GetAll
        get_user_by_token_method: GetUserByToken
      # custom_data:
        # - name: categories
        #   var: categories
        #   repo: Category
        #   method: GetAll
        #   args: []
        #   marshal: true
    GetNotificationPage:
      enabled: true
      middleware: []
      permissions: [post.view.user]
      path: /get-notification-page
    SendFCM:
      enabled: true
      middleware: []
      permissions: [post.view.user]
      path: /send-fcm
    SubscribeToTopic:
      enabled: true
      middleware: []
      permissions: [post.view.user]
      path: /subscribe-to-topic



notifications:
  enabled: true
  
  # ──────────────────────────────────────────────────────────────────────────
  # Model Configuration
  # ──────────────────────────────────────────────────────────────────────────
  model:
    timestamps: true
    soft_delete: true
    
    fields:
      - name: id
        type: uint
        primary_key: true
        auto_increment: true
      
      - name: user_id
        type: uint
        required: true
        index: true
      
      - name: title
        type: string
        gorm_type: varchar(200)
        required: true
      
      - name: message
        type: string
        gorm_type: text
        required: true
      
      - name: type
        type: string
        gorm_type: varchar(50)
        required: true
        validation:
          enum: [info, warning, error, success, chat, order, system]
      
      - name: priority
        type: string
        gorm_type: varchar(10)
        default: normal
        validation:
          enum: [low, normal, high, urgent]
      
      - name: reference_id
        type: "*uint"
        index: true
        description: "ID of related entity (order, conversation, etc)"
      
      - name: reference_type
        type: "*string"
        gorm_type: varchar(50)
        description: "Type of related entity"
      
      - name: is_read
        type: bool
        default: false
      
      - name: action_url
        type: "*string"
        gorm_type: varchar(500)
        description: "URL to navigate on click"
      
      - name: metadata
        type: "*string"
        gorm_type: json
        description: "Additional custom data"
    
    relations:
      - name: User
        model: User
        foreign_key: UserID
        preload: false
  
  # ──────────────────────────────────────────────────────────────────────────
  # Repository Configuration
  # ──────────────────────────────────────────────────────────────────────────
  repository:
    batch_operations: true  # Enable batch create/update
    
    custom_methods:
      - name: MarkAllAsRead
        description: "Mark all notifications as read for user"
      - name: DeleteOldNotifications
        description: "Delete notifications older than X days"
  
  # ──────────────────────────────────────────────────────────────────────────
  # Controller Configuration
  # ──────────────────────────────────────────────────────────────────────────
  controller:
    enabled: true
    base_path: /api/v1/notifications
    middleware: ["auth"]
    endpoints:
      list:
        enabled: true
        method: GET
        path: /list
      
      mark_as_read:
        enabled: true
        method: POST
        path: /:id/read
        # id is needed in path
      
      mark_all_as_read:
        enabled: false
        method: POST
      bulk_mark_read:
        enabled: true
        method: POST
        path: /bulk-read
      unread_count:
        enabled: true
        method: GET
        path: /unread-count
      delete:
        enabled: true
        method: DELETE
        path: /:id
        # id is needed in path
      delete_all:
        enabled: true
        method: DELETE
        path: /all
  # ──────────────────────────────────────────────────────────────────────────
  # WebSocket Integration
  # ──────────────────────────────────────────────────────────────────────────
  websocket:
    enabled: false
  
  # Push Notifications (FCM)
  # ──────────────────────────────────────────────────────────────────────────
