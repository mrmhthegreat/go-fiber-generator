project:
  module: github.com/username/blog_api
  user_model_name: User
  repository_name: UserRepository
  structure:
    use_internal: true
    use_pkg: true
    use_cmd: true
    cmd_name: server

i18n:
  enabled: true
  languages:
    - en
    - ar
    - fr

template_engine:
  enabled: false

static_files:
  enabled: false

server:
  port: '3000'
  default_port: '3000'
  body_limit: 50 * 1024 * 1024
  body_limit_description: 50MB
  pass_locals_to_views: false
  read_timeout: 10 * time.Second
  write_timeout: 10 * time.Second

features:
  cron_jobs: true

database:
  driver: postgres
  url_env: DATABASE_URL
  host_env: DATABASE_HOST
  port_env: DATABASE_PORT
  name_env: DATABASE_NAME
  user_env: DATABASE_USER
  password_env: DATABASE_PASSWORD
  ssl_mode_env: DATABASE_SSL_MODE
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5 * time.Minute
  auto_migrate: true
  run_migrations: true

redis:
  enabled: true
  host_env: REDIS_ADDR
  password_env: REDIS_PASSWORD
  db_env: REDIS_DB
  min_idle_conns: 5
  max_retries: 3
  retry_delay: 2 * time.Second
  pool_size: 20
  session_addr_env: REDIS_ADDR

swagger:
  enabled: true
  title: Blog API
  description: Production-ready Blog REST API
  version: 1.0.0
  host: localhost:3000
  base_path: /api
  schemes:
    - http
    - https
  contact:
    name: API Support
    email: support@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

email:
  enabled: true
  provider: smtp
  smtp_host_env: SMTP_HOST
  smtp_port_env: SMTP_PORT
  smtp_user_env: SMTP_EMAIL
  smtp_password_env: SMTP_EMAIL_PASSWORD

storage:
  enabled: true
  provider_env: STORAGE_PROVIDER
  supabase:
    url_env: STORAGE_SUPABASE_URL
    token_env: STORAGE_SUPABASE_TOKEN
    bucket_name_env: STORAGE_SUPABASE_BUCKET_NAME

fcm:
  enabled: true
  credentials_path_env: FCM_CREDENTIALS_PATH
  project_id_env: FCM_PROJECT_ID
  save_to_database: true
  admin_topic_env: admin_blog_notifications
  controller:
    enabled: true
    middleware:
      - auth
    base_path: /api
    SendFCM:
      enabled: true
      middleware:
        - auth
      path: /send-fcm
    SubscribeToTopic:
      enabled: true
      middleware:
        - auth
      path: /subscribe-to-topic
  web_handler:
    enabled: false

session:
  enabled: true
  secret_key_env: CHANGE_THIS_SESSION_SECRET
  cookies_secret_key_env: CHANGE_THIS_COOKIES_SECRET
  cookie_http_only: true
  cookie_secure: true
  expiration: 24 * time.Hour
  store_context_key: session

helpers:
  math_helpers: true
  string_helpers: true
  random_helpers: true
  time_helpers: true
  validation_helpers: true

rbac:
  enabled: true
  service_name: RBACService
  default_role: user
  all_privileges: super_admin
  model_field: Role
  roles:
    - name: super_admin
      dashboard_path: /super-admin
    - name: admin
      dashboard_path: /admin
    - name: author
      dashboard_path: /dashboard
    - name: user
      dashboard_path: /dashboard
  controller:
    enabled: true
    base_path: /api/rbac
    tag: RBAC Management
    middleware:
      - auth
    ListRoles:
      enabled: true
      path: /roles
      middleware: [auth]
    GetRole:
      enabled: true
      path: /roles/:id
      middleware: [auth]
    CreateRole:
      enabled: true
      path: /roles
      middleware: [auth]
    UpdateRole:
      enabled: true
      path: /roles/:id
      middleware: [auth]
    DeleteRole:
      enabled: true
      path: /roles/:id
      middleware: [auth]
    ListPermissions:
      enabled: true
      path: /permissions
      middleware: [auth]
    SyncPermissions:
      enabled: true
      path: /permissions/sync
      middleware: [auth]
    GetUserOverrides:
      enabled: true
      path: /users/:userId/overrides
      middleware: [auth]
    SetUserOverride:
      enabled: true
      path: /users/:userId/overrides
      middleware: [auth]
    RemoveUserOverride:
      enabled: true
      path: /users/:userId/overrides/:permId
      middleware: [auth]
    BulkUpdateRolePermissions:
      enabled: true
      path: /roles/:id/permissions/bulk
      middleware: [auth]
    GetUserPermissions:
      enabled: true
      path: /users/:userId/permissions/debug
      middleware: [auth]
    InvalidateCache:
      enabled: true
      path: /cache/invalidate/:userId
      middleware: [auth]
    CheckPermission:
      enabled: true
      path: /check
      middleware: [auth]
  web_handler:
    enabled: false

authentication:
  enabled: true
  session:
    enabled: false
    claims:
      - name: role
        type: string
  register_middleware: []
  jwt:
    enabled: true
    algorithm: HS256
    expiry_hours: 24
    secret_key_env: JWT_SECRET
    claims:
      - name: role
        type: string
  identifier:
    name_pool:
      - fullname
    login_methods:
      - field: email_or_username
        enabled: true
        repository_method: GetUserByEmailOrUsername
        validation: required
        error_message: invalid_identifier
        json_field: identifier
        dto_description: Email or username
        rate_limit:
          enabled: false
          name: login_rate_limit
        middleware: []
    register_fields:
      - field: email
        required: true
        unique: true
        validation: required,email
        repository_check: GetUserByEmail
        type: string
        dto_type: string
      - field: username
        required: false
        unique: true
        validation: omitempty,min=3,max=50
        repository_check: GetUserByUsername
        type: '*string'
        dto_type: '*string'
      - field: fullname
        required: true
        unique: false
        validation: required,min=2
        type: string
        dto_type: string
      - field: password
        required: true
        validation: required,min=8
        type: string
        dto_type: string
        sensitive: true
      - field: profile_image
        required: false
        file_upload: true
        type: '*multipart.FileHeader'
        dto_type: '*multipart.FileHeader'
        form_field: profile_image
        model_field: ProfileImage
        max_size_mb: 5
        allowed_types:
          - image/jpeg
          - image/png
          - image/webp
        storage_path: uploads/profiles
        filename_pattern: profile_{user_id}_{timestamp}
  email_password:
    enabled: true
    bcrypt_cost: 14
    password_validation:
      min_length: 8
      require_uppercase: true
      require_lowercase: true
      require_number: true
      require_special: true
    forgot_password:
      enabled: true
      otp_expiry: 10m
      repository_method: GetUserByEmailOrUsernameForgot
      email_template: templates/password_reset.html
      rate_limit:
        enabled: false
        name: forgot_password_rate_limit
      middleware: []
      identifier_field: email_or_username
    change_password:
      enabled: true
      require_old_password: true
      rate_limit:
        enabled: false
        name: change_password_rate_limit
      middleware: []
  email_verification:
    enabled: true
    require_on_registration: true
    otp_length: 6
    otp_expiry: 10m
    email_template: templates/email_verification.html
    rate_limit:
      enabled: false
      name: email_verification_rate_limit
    middleware: []
  social_auth:
    google:
      enabled: true
      client_id_env: GOOGLE_CLIENT_ID
      client_secret_env: GOOGLE_CLIENT_SECRET
      redirect_url_env: GOOGLE_REDIRECT_URL
      state: random
      success_redirect: /dashboard
      field_mapping:
        - source: name
          target: Fullname
          required: false
        - source: picture
          target: ProfileImage
          required: false
      repository_method: GetUserByGoogleID
      endpoints:
        api:
          enabled: true
          path: /api/auth/google
          method: POST
        web:
          enabled: false
    facebook:
      enabled: false
  refresh_token:
    enabled: true
    expiry: 168h
    rotate_on_refresh: true
    rate_limit:
      enabled: false
      name: refresh_token_rate_limit
    middleware: []
  logout:
    enabled: true
    clear_tokens: true
  app_check_tokens:
    - name: admin_token
      algorithm: HS512
      secret_key_env: ADMIN_TOKEN_SECRET
      expiry_hours: 720
      endpoint: generate_admin_token
      middleware:
        - auth
        - admin
      claims:
        - name: user_id
          type: uint
          source: input
        - name: role
          type: string
          source: input
        - name: permissions
          type: '[]string'
          source: input
  web_auth:
    enabled: false

middleware:
  maintenance:
    enabled: true
    mode_key_env: MAINTENANCE_MODE
    exclude_paths:
      - /under-maintenance
      - /static/
      - /health
    redirect_path: /under-maintenance
    api_error_code: service_unavailable_maintenance
  database:
    enabled: true
    context_key: db
  cors:
    enabled: true
    allow_origins: '*'
    allow_headers: Origin, Content-Type, Accept, Authorization
    allow_methods: GET, POST, PUT, DELETE, OPTIONS, PATCH
    allow_credentials: true
  compression:
    enabled: true
    level: best_speed
  logging:
    enabled: true
    log_body: false
  csrf:
    enabled: false
  rate_limit:
    enabled: true
  rbac:
    enabled: true
  dashboard:
    enabled: false
  web_auth:
    enabled: false
  locals:
    user_id: user_id
    email: email
    session: session
    verified: verified
    app_id: app_id
    is_admin: is_admin
    role: role
  definitions:
    - name: simple_jwt
      type: jwt
      header_name: Authorization
      scheme: Bearer
      secret_key_env: JWT_SECRET
      algorithm: HS256
      claims:
        - name: user_id
          type: uint
          required: true
      description: Simple JWT with user_id
    - name: user_auth
      type: jwt
      header_name: Authorization
      scheme: Bearer
      secret_key_env: JWT_SECRET
      algorithm: HS256
      claims:
        - name: user_id
          type: uint
          required: true
        - name: email
          type: string
          required: true
        - name: role
          type: string
          required: false
      description: Full user JWT with typed claims
    - name: ip_rate_limit
      type: rate_limit
      max_requests: 100
      window: 1m
      key_generator: ip
      description: IP-based rate limiting
    - name: user_rate_limit
      type: rate_limit
      max_requests: 60
      window: 1m
      key_generator: user_id
      description: User-based rate limiting

websocket:
  enabled: true
  handler_type: dedicated
  path: /ws
  authentication:
    method: jwt
    jwt:
      secret_key_env: JWT_SECRET
      algorithm: HS256
      claims:
        user_id:
          claim_name: user_id
          type: float64
          required: true
        role:
          claim_name: role
          type: string
          required: false
        email:
          claim_name: email
          type: string
          required: false
      extraction:
        header: Authorization
        header_prefix: 'Bearer '
        query_param: token
        cookie_name: ''
    app_token:
      enabled: false
  connection:
    read_buffer_size: 1024
    write_buffer_size: 1024
    handshake_timeout: 10
    read_deadline: 60
    write_deadline: 10
    pong_wait: 60
    ping_period: 54
    max_message_size: 512
  presence:
    enabled: true
    broadcast_on_connect: true
    broadcast_on_disconnect: true
    visibility: all
    events:
      - name: user_online
        broadcast_to:
          - users
        persist: false
      - name: user_offline
        broadcast_to:
          - users
        persist: false
  hub:
    pools:
      - name: users
        enabled: true
        key_by: user_id
        auto_register: true
        description: Blog user connections
    channels:
      - name: broadcastUser
        enabled: true
        buffer_size: 100
        drop_on_full: true
        description: Broadcast to specific users
      - name: broadcastNotify
        enabled: true
        buffer_size: 200
        drop_on_full: true
        description: Notification broadcasts
  events:
    - name: message_sent
      enabled: true
      handler_type: chat_message
      broadcast_to:
        - conversation
      persist: true
      requires_auth: true
      rate_limit:
        enabled: true
        max_per_minute: 60
  rooms:
    enabled: false

chat:
  enabled: true
  modes:
    support: false
    user_to_user: true
    group: false
  models:
    conversation:
      enabled: true
      timestamps: true
      soft_delete: true
      fields:
        - name: id
          type: uint
          primary_key: true
          auto_increment: true
          json_tag: id
        - name: user_id
          type: uint
          required: true
          index: true
          json_tag: user_id
          description: Primary user in conversation
        - name: receiver_id
          type: '*uint'
          index: true
          json_tag: receiver_id
          description: For user-to-user chat
        - name: status
          type: string
          gorm_type: varchar(20)
          default: open
          json_tag: status
          validation:
            enum:
              - open
              - closed
              - archived
        - name: conv_type
          type: string
          gorm_type: varchar(20)
          default: chat
          json_tag: conv_type
          validation:
            enum:
              - chat
              - support
              - group
        - name: last_message
          type: string
          gorm_type: text
          json_tag: last_message
          required: false
      relations:
        - name: User
          model: User
          foreign_key: UserID
          preload: true
          has_many: false
        - name: Receiver
          model: User
          foreign_key: ReceiverID
          preload: true
          has_many: false
        - name: Messages
          model: Message
          foreign_key: ConversationID
          preload: false
          has_many: true
    message:
      enabled: true
      timestamps: true
      soft_delete: true
      fields:
        - name: id
          type: uint
          primary_key: true
          auto_increment: true
        - name: conversation_id
          type: uint
          required: true
          index: true
        - name: sender_id
          type: uint
          required: true
          index: true
        - name: sender_type
          type: string
          gorm_type: varchar(20)
          default: user
          validation:
            enum:
              - user
              - admin
              - system
        - name: content
          type: string
          gorm_type: text
          required: true
        - name: is_read
          type: bool
          default: false
        - name: attachments
          type: '*string'
          gorm_type: json
          description: File attachments metadata
        - name: reply_to_id
          type: '*uint'
          index: true
          description: For threaded replies
      relations:
        - name: Conversation
          model: Conversation
          foreign_key: ConversationID
          preload: false
        - name: Sender
          model: User
          foreign_key: SenderID
          preload: true
  repository:
    search_fields:
      conversation:
        - status
        - conv_type
        - last_message
      message:
        - content
    default_sort:
      conversation:
        field: updated_at
        order: desc
      message:
        field: created_at
        order: asc
    pagination:
      default_limit: 20
      max_limit: 100
    custom_methods:
      - name: FindActiveConversations
        description: Find all active conversations
      - name: FindUnreadMessages
        description: Find unread messages for user
  controller:
    enabled: true
    base_path: /api/v1/chat
    endpoints:
      list_conversations:
        enabled: true
        path: /conversations
        method: GET
        middleware:
          - auth
      list_messages:
        enabled: true
        path: /conversations/:id/messages
        method: GET
        middleware:
          - auth
      send_message:
        enabled: true
        path: /conversations/:id/messages
        method: POST
        middleware:
          - auth
      mark_as_read:
        enabled: true
        path: /conversations/:id/read
        method: POST
        middleware:
          - auth
    validation:
      message:
        content:
          required: true
          min_length: 1
          max_length: 5000
  web_handler:
    enabled: false
  websocket:
    enabled: true
    path: /ws/chat
    admin_path: /ws/admin/chat

notifications:
  enabled: true
  model:
    timestamps: true
    soft_delete: true
    fields:
      - name: id
        type: uint
        primary_key: true
        auto_increment: true
      - name: user_id
        type: uint
        required: true
        index: true
      - name: title
        type: string
        gorm_type: varchar(200)
        required: true
      - name: message
        type: string
        gorm_type: text
        required: true
      - name: type
        type: string
        gorm_type: varchar(50)
        required: true
        validation:
          enum:
            - info
            - warning
            - error
            - success
            - chat
            - system
      - name: priority
        type: string
        gorm_type: varchar(10)
        default: normal
        validation:
          enum:
            - low
            - normal
            - high
            - urgent
      - name: reference_id
        type: '*uint'
        index: true
        description: ID of related entity
      - name: reference_type
        type: '*string'
        gorm_type: varchar(50)
        description: Type of related entity
      - name: is_read
        type: bool
        default: false
      - name: action_url
        type: '*string'
        gorm_type: varchar(500)
        description: URL to navigate on click
      - name: metadata
        type: '*string'
        gorm_type: json
        description: Additional custom data
    relations:
      - name: User
        model: User
        foreign_key: UserID
        preload: false
  repository:
    batch_operations: true
    custom_methods:
      - name: MarkAllAsRead
        description: Mark all notifications as read for user
      - name: DeleteOldNotifications
        description: Delete notifications older than X days
  controller:
    enabled: true
    base_path: /api/v1/notifications
    middleware:
      - auth
    endpoints:
      list:
        enabled: true
        method: GET
        path: /list
      mark_as_read:
        enabled: true
        method: POST
        path: /:id/read
      mark_all_as_read:
        enabled: true
        method: POST
      bulk_mark_read:
        enabled: true
        method: POST
        path: /bulk-read
      unread_count:
        enabled: true
        method: GET
        path: /unread-count
      delete:
        enabled: true
        method: DELETE
        path: /:id
      delete_all:
        enabled: true
        method: DELETE
        path: /all
  websocket:
    enabled: true
  push:
    enabled: true

models:
  - name: User
    table_name: users
    soft_delete:
      enabled: true
      include_hard_delete: true
      include_restore: true
    timestamps: true
    pagination: true
    filters:
      - id
      - email
      - username
      - role
      - verified
      - is_active
      - search
    sort_by:
      - created_at
      - updated_at
      - fullname
      - email
      - username
    search_fields:
      - fullname
      - email
      - username
      - bio
    default_sort_field: created_at
    default_sort_order: desc
    fields:
      - name: ID
        type: uint
        gorm: primaryKey;autoIncrement
        json: id
      - name: Username
        type: string
        gorm: unique;not null;index
        json: username
        validate: required,min=3,max=50,alphanum
      - name: Email
        type: string
        gorm: unique;not null;index
        json: email
        validate: required,email
      - name: Password
        type: string
        gorm: not null
        json: '-'
      - name: Fullname
        type: string
        gorm: not null
        json: fullname
        validate: required,min=2,max=100
      - name: Bio
        type: '*string'
        gorm: type:text;null
        json: bio
      - name: Avatar
        type: string
        gorm: default:'https://api.dicebear.com/7.x/avataaars/svg'
        json: avatar
      - name: Role
        type: string
        gorm: type:varchar(20);default:'user'
        json: role
        validate: oneof=user author admin super_admin
      - name: Verified
        type: bool
        gorm: default:false
        json: verified
      - name: IsActive
        type: bool
        gorm: default:true
        json: is_active
      - name: PostCount
        type: int
        gorm: default:0
        json: post_count
      - name: FollowerCount
        type: int
        gorm: default:0
        json: follower_count
    relations:
      - name: Posts
        type: has_many
        model: Post
        foreign_key: AuthorID
    create_dto:
      enabled: true
      fields:
        - Username
        - Email
        - Password
        - Fullname
        - Bio
        - Avatar
        - Role
      custom_fields: []
    update_dto:
      enabled: true
      partial: true
      fields:
        - Username
        - Email
        - Fullname
        - Bio
        - Avatar
        - Role
        - IsActive
        - Verified
      custom_fields: []
    dtos:
      - name: RegisterUserRequest
        type: create
        enabled: true
        fields:
          - Username
          - Email
          - Password
          - Fullname
        custom_fields:
          - name: ConfirmPassword
            type: string
            json: confirm_password
            validate: required,eqfield=Password
        file_fields: {}
      - name: UpdateProfileRequest
        type: update
        partial: true
        enabled: true
        fields:
          - Fullname
          - Bio
        file_fields:
          Avatar: file
      - name: AdminUpdateUserRequest
        type: update
        partial: true
        enabled: true
        fields:
          - Username
          - Email
          - Fullname
          - Bio
        custom_fields:
          - name: Role
            type: string
            json: role
            validate: omitempty,oneof=user author admin super_admin
          - name: IsActive
            type: bool
            json: is_active
    list_response:
      enabled: true
      fields:
        - name: ID
          type: uint
          json_name: id
          from_field: ID
        - name: Username
          type: string
          json_name: username
          from_field: Username
        - name: Fullname
          type: string
          json_name: fullname
          from_field: Fullname
        - name: Avatar
          type: string
          json_name: avatar
          from_field: Avatar
        - name: Role
          type: string
          json_name: role
          from_field: Role
        - name: PostCount
          type: int
          json_name: post_count
          from_field: PostCount
        - name: CreatedAt
          type: time.Time
          json_name: created_at
          from_field: CreatedAt
      include_relations: []
    detail_response:
      enabled: true
      fields:
        - name: ID
          type: uint
          json_name: id
          from_field: ID
        - name: Username
          type: string
          json_name: username
          from_field: Username
        - name: Email
          type: string
          json_name: email
          from_field: Email
        - name: Fullname
          type: string
          json_name: fullname
          from_field: Fullname
        - name: Bio
          type: '*string'
          json_name: bio
          from_field: Bio
          omitempty: true
        - name: Avatar
          type: string
          json_name: avatar
          from_field: Avatar
        - name: Role
          type: string
          json_name: role
          from_field: Role
        - name: Verified
          type: bool
          json_name: verified
          from_field: Verified
        - name: IsActive
          type: bool
          json_name: is_active
          from_field: IsActive
        - name: PostCount
          type: int
          json_name: post_count
          from_field: PostCount
        - name: FollowerCount
