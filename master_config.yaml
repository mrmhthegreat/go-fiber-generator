        repo_method: GetByUserAndID
        params:
        - name: user_id
          type: uint
          source: claim
        - name: id
          type: uint
          source: path
        ownership:
          enabled: true
          verify: param
      batch_delete:
        enabled: false
  web_handler:
    enabled: true
    base_path: /dashboard/posts
    middleware:
    - auth
    - csrf
    package_name: handlers
    auth_redirect: /login
    template_base: views/posts
    rate_limit:
      enabled: false
      name: post_rate_limit
    rbac:
      enabled: true
    crud_settings:
      create_page:
        enabled: true
        handler_type: page
        method: GET
        path: /new
        template: create.html
