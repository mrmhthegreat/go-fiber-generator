project:
  module: github.com/username/my_api
  user_model_name: User
  repository_name: UserRepository
  structure:
    use_internal: true
    use_pkg: true
    use_cmd: true
    cmd_name: server
i18n:
  enabled: true
  languages:
  - en
  - fr
  - ar
template_engine:
  enabled: true
  extension: .html
  reload: true
  time_format: 02 Jan 15:04
static_files:
  enabled: true
  route: /static
server:
  port: '3000'
  default_port: '3000'
  body_limit: 50 * 1024 * 1024
  body_limit_description: 50MB
  pass_locals_to_views: false
  read_timeout: 10 * time.Second
  write_timeout: 10 * time.Second
features:
  cron_jobs: true
database:
  driver: postgres
  url_env: DATABASE_URL
  host_env: DATABASE_HOST
  port_env: DATABASE_PORT
  name_env: DATABASE_NAME
  user_env: DATABASE_USER
  password_env: DATABASE_PASSWORD
  ssl_mode_env: DATABASE_SSL_MODE
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5 * time.Minute
  auto_migrate: true
  run_migrations: true
redis:
  enabled: true
  host_env: REDIS_ADDR
  password_env: REDIS_PASSWORD
  db_env: REDIS_DB
  min_idle_conns: 5
  max_retries: 3
  retry_delay: 2 * time.Second
  pool_size: 20
  session_addr_env: REDIS_ADDR
swagger:
  enabled: true
  title: My API
  description: Professional Go Fiber API
  version: 1.0.0
  host: localhost:3000
  base_path: /api
  schemes:
  - http
  - https
  contact:
    name: API Support
    email: support@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
email:
  enabled: true
  provider: smtp
  smtp_host_env: SMTP_HOST
  smtp_port_env: SMTP_PORT
  smtp_user_env: SMTP_EMAIL
  smtp_password_env: SMTP_EMAIL_PASSWORD
imap:
  enabled: true
  host_env: IMAP_HOST
  port_env: IMAP_PORT
  user_env: IMAP_EMAIL
  password_env: IMAP_PASSWORD
  use_ssl: true
  mailbox: INBOX
  fetch_interval: 5 * time.Minute
  mark_as_read: true
  max_emails_per_fetch: 50
  fetch_sent: true
  controller:
    enabled: true
    middleware: []
    base_path: /api
