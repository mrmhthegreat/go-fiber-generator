    enabled: false
    middleware: []
    permissions:
    - post.view.user
    context:
      needs_user: true
      needs_csrf: true
      needs_perms: true
      needs_dashbase: true
      needs_translations: true
      user_config:
        use_repo: true
        repo_name: userRepo
        method: GetByID
        get_all_method: GetAll
        get_user_by_token_method: GetUserByToken
    GetNotificationPage:
      enabled: true
      middleware: []
      permissions:
      - post.view.user
      path: /get-notification-page
    SendFCM:
      enabled: true
      middleware: []
      permissions:
      - post.view.user
      path: /send-fcm
    SubscribeToTopic:
      enabled: true
      middleware: []
      permissions:
      - post.view.user
      path: /subscribe-to-topic
session:
  enabled: true
  secret_key_env: CHANGE_THIS_SESSION_SECRET
  cookies_secret_key_env: CHANGE_THIS_COOKIES_SECRET
  cookie_http_only: true
  cookie_secure: false
  expiration: 24 * time.Hour
  store_context_key: session
helpers:
  math_helpers: true
  string_helpers: true
  random_helpers: true
  time_helpers: true
  validation_helpers: true
