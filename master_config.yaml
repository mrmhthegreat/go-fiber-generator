        middleware:
        - auth
        - csrf
        permissions:
        - post.create
        context:
          needs_user: true
          needs_csrf: true
          needs_perms: true
          needs_dashbase: true
          needs_translations: true
          base_translations: PostBase
          extra_translations:
          - CommonTranslations
          user_config:
            use_repo: true
            repo_name: userRepo
            method: GetByID
          custom_data:
          - name: categories
            var: categories
            repo: Category
            method: GetAll
            args: []
            marshal: true
          - name: tags
            var: tags
            repo: Tag
            method: GetAll
            args: []
            marshal: true
      create:
        enabled: true
        handler_type: action
        method: POST
        path: ''
        dto: CreatePostRequest
        return_type: redirect
        redirect_on_success: /dashboard/posts
        permissions:
        - post.create
        file_uploads:
        - field: FeaturedImage
          form_field: featured_image
          storage_path: uploads/posts
          max_size_mb: 5
          allowed_types:
          - image/jpeg
          - image/png
          - image/webp
          required: false
        ownership:
          enabled: true
          field: AuthorID
          auto_fill: user_id
      edit_page:
        enabled: true
        handler_type: page
        method: GET
        path: /:id/edit
        template: edit.html
        permissions:
        - post.edit
        path_params:
        - name: id
          type: uint
        context:
          needs_user: true
          needs_csrf: true
          needs_perms: true
          needs_dashbase: true
          needs_translations: true
          base_translations: PostBase
          user_config:
            use_repo: true
            repo_name: userRepo
            method: GetByID
          custom_data:
          - name: post
            var: post
            repo: Post
            method: GetByID
            args:
            - id
            marshal: false
          - name: categories
            var: categories
            repo: Category
            method: GetAll
            args: []
            marshal: true
          - name: tags
            var: tags
            repo: Tag
            method: GetAll
            args: []
            marshal: true
        ownership:
          enabled: true
          field: AuthorID
          verify: field
      update:
        enabled: true
        handler_type: action
        method: POST
        path: /:id
        dto: UpdatePostRequest
        return_type: hx_redirect
        hx_redirect: '{dashBase}/posts/:id'
        permissions:
        - post.edit
        track_changes: true
        path_params:
        - name: id
          type: uint
        ownership:
          enabled: true
          verify: param
          repo_method: GetByUserAndID
      get:
        enabled: true
        handler_type: page
        method: GET
        path: /:id
        template: show.html
        permissions:
        - post.view
        path_params:
        - name: id
          type: uint
        context:
          needs_user: true
          needs_csrf: true
          needs_perms: true
          needs_dashbase: true
          user_config:
            use_repo: true
            repo_name: userRepo
            method: GetByID
          custom_data:
          - name: post
            var: post
            repo: Post
            method: GetByID
            args:
            - id
            marshal: false
          - name: comments
            var: comments
            repo: Comment
            method: GetByPostID
            args:
            - id
            marshal: true
            rbac_perm: comment.view
      list:
        enabled: true
        handler_type: page
        method: GET
        path: ''
        template: index.html
        permissions:
        - post.list
        pagination: true
        query_params:
        - name: search
          type: string
          default: ''
        - name: status
          type: string
          default: published
        - name: category_id
          type: uint
          default: 0
        context:
          needs_user: true
          needs_csrf: true
          needs_perms: true
          needs_dashbase: true
          needs_translations: true
          user_config:
            use_repo: true
            repo_name: userRepo
            method: GetByID
          base_translations: PostBase
          custom_data:
          - name: posts
            var: posts
            repo: Post
            method: List
            args:
            - opts
            marshal: true
          - name: categories
            var: categories
            repo: Category
            method: GetAll
            args: []
            marshal: true
      delete:
        enabled: true
        handler_type: action
        method: DELETE
        path: /:id
        return_type: json
        permissions:
        - post.delete
        path_params:
        - name: id
          type: uint
        ownership:
          enabled: true
          field: AuthorID
          verify: field
