      - rbac.permissions.manage
authentication:
  enabled: true
  session:
    enabled: false
    claims:
    - name: role
      type: string
  register_middleware: []
  jwt:
    enabled: true
    algorithm: HS256
    expiry_hours: 24
    secret_key_env: JWT_SECRET
    claims:
    - name: role
      type: string
  identifier:
    name_pool:
    - fullname
    login_methods:
    - field: email
      enabled: false
      repository_method: GetUserByEmail
      validation: required,email
      error_message: invalid_email
      rate_limit:
        enabled: false
        name: email_login_rate_limit
      middleware: []
    - field: username
      enabled: false
      repository_method: GetUserByUsername
      validation: required,min=3,max=50
      error_message: invalid_username
      rate_limit:
        enabled: false
        name: username_login_rate_limit
      middleware: []
    - field: email_or_username
      enabled: true
      repository_method: GetUserByEmailOrUsername
      validation: required
      error_message: invalid_identifier
      json_field: identifier
      dto_description: Email or username
      rate_limit:
        enabled: false
        name: login_rate_limit
      middleware: []
    register_fields:
    - field: email
      required: true
      unique: true
      validation: required,email
      repository_check: GetUserByEmail
      type: string
      dto_type: string
    - field: username
      required: false
      unique: true
      validation: omitempty,min=3,max=50
      repository_check: GetUserByUsername
      type: '*string'
      dto_type: '*string'
    - field: fullname
      required: true
      unique: false
      validation: required,min=2
      type: string
      dto_type: string
    - field: phone
      required: false
      unique: true
      validation: omitempty,e164
      repository_check: GetUserByPhone
      type: '*string'
      dto_type: '*string'
    - field: password
      required: true
      validation: required,min=8
      type: string
      dto_type: string
      sensitive: true
    - field: profile_image
      required: false
      file_upload: true
      type: '*multipart.FileHeader'
      dto_type: '*multipart.FileHeader'
      form_field: profile_image
      model_field: ProfileImage
      max_size_mb: 5
      allowed_types:
      - image/jpeg
      - image/png
      - image/webp
      storage_path: uploads/profiles
      filename_pattern: profile_{user_id}_{timestamp}
  email_password:
    enabled: true
    bcrypt_cost: 14
    password_validation:
      min_length: 8
      require_uppercase: true
      require_lowercase: true
      require_number: true
      require_special: true
    forgot_password:
      enabled: true
      otp_expiry: 10m
      repository_method: GetUserByEmailOrUsernameForgot
      email_template: templates/password_reset.html
      rate_limit:
        enabled: false
        name: forgot_password_rate_limit
      middleware: []
      identifier_field: email_or_username
    change_password:
      enabled: true
      require_old_password: true
      rate_limit:
        enabled: false
        name: change_password_rate_limit
      middleware: []
  email_verification:
    enabled: true
    require_on_registration: true
    otp_length: 6
    otp_expiry: 10m
    email_template: templates/email_verification.html
    rate_limit:
      enabled: false
      name: email_verification_rate_limit
    middleware: []
  social_auth:
    google:
      enabled: true
      client_id_env: GOOGLE_CLIENT_ID
      client_secret_env: GOOGLE_CLIENT_SECRET
      redirect_url_env: GOOGLE_REDIRECT_URL
      state: random
      success_redirect: /dashboard
      field_mapping:
      - source: name
        target: Fullname
        required: false
      - source: picture
        target: ProfileImage
        required: false
      repository_method: GetUserByGoogleID
      endpoints:
        api:
          enabled: true
          path: /api/auth/google
          method: POST
        web:
          enabled: true
          login_path: /auth/google/login
          callback_path: /auth/google/callback
    facebook:
      enabled: true
      client_id_env: FACEBOOK_CLIENT_ID
      client_secret_env: FACEBOOK_CLIENT_SECRET
      redirect_url_env: FACEBOOK_REDIRECT_URL
      state: random
      success_redirect: /dashboard
      field_mapping:
      - source: name
        target: Fullname
        required: false
      repository_method: GetUserByFacebookID
      endpoints:
        api:
          enabled: true
          path: /api/auth/facebook
          method: POST
        web:
          enabled: true
          login_path: /auth/facebook/login
          callback_path: /auth/facebook/callback
  refresh_token:
    enabled: true
    expiry: 168h
    rotate_on_refresh: true
    rate_limit:
      enabled: false
      name: refresh_token_rate_limit
    middleware: []
  logout:
    enabled: true
    clear_tokens: true
  app_check_tokens:
  - name: admin_token
    algorithm: HS512
    secret_key_env: ADMIN_TOKEN_SECRET
    expiry_hours: 720
    endpoint: generate_admin_token
    middleware:
    - auth
    - admin
    claims:
    - name: user_id
      type: uint
      source: input
    - name: role
      type: string
      source: input
    - name: permissions
      type: '[]string'
      source: input
  - name: api_token
    algorithm: HS256
    secret_key_env: API_TOKEN_SECRET
    expiry_hours: 8760
    endpoint: generate_api_token
    middleware:
    - auth
    claims:
    - name: app_id
      type: string
      source: config
      config_key: APP_ID
    - name: scope
      type: string
      source: input
    - name: environment
      type: string
      source: config
      config_key: ENVIRONMENT
  web_auth:
    enabled: true
    endpoints:
      login:
        enabled: true
        path: /auth/login
        rate_limit:
          enabled: false
          name: login_rate_limit
      signup:
        enabled: true
        path: /auth/signup
        middleware: []
        rate_limit:
          enabled: false
          name: signup_rate_limit
      logout:
        enabled: true
        path: /auth/logout
        rate_limit:
          enabled: false
          name: logout_rate_limit
      verify_email:
        enabled: true
        path: /auth/verify
        middleware:
        - login
        rate_limit:
          enabled: false
          name: verify_email_rate_limit
      forgot_password:
        enabled: true
        path: /auth/forgot-password
        rate_limit:
          enabled: false
          name: forgot_password_rate_limit
      reset_password:
        enabled: true
        path: /auth/reset-password
        rate_limit:
          enabled: false
          name: reset_password_rate_limit
middleware:
  maintenance:
    enabled: true
    mode_key_env: MAINTENANCE_MODE
    exclude_paths:
    - /under-maintenance
    - /static/
    - /health
    redirect_path: /under-maintenance
    api_error_code: service_unavailable_maintenance
  database:
    enabled: true
    context_key: db
  cors:
    enabled: true
    allow_origins: '*'
    allow_headers: Origin, Content-Type, Accept, Authorization
    allow_methods: GET, POST, PUT, DELETE, OPTIONS, PATCH
    allow_credentials: true
  compression:
    enabled: true
    level: best_speed
  logging:
    enabled: true
    log_body: false
  csrf:
    enabled: true
    header: X-CSRFToken
    form_field: csrf_token
    cookie_name: csrf_
    same_site: Lax
    expiration: 1 * time.Hour
    context_key: csrf
  rate_limit:
    enabled: true
  rbac:
    enabled: true
  dashboard:
    enabled: true
  web_auth:
    enabled: true
    email_verification_enabled: false
    session_keys:
      authenticated: authenticated
      user_id: user_id
    redirects:
      login: /login
      verify_email: /auth/verify
      server_error: /server-error
    verify_exclude_paths:
    - /auth/verify
    - /auth/logout
    - /auth/resend-verification
  locals:
    user_id: user_id
    email: email
    session: session
    verified: verified
    app_id: app_id
    is_admin: is_admin
    role: role
  definitions:
  - name: web_session
    type: session_auth
    session_key: authenticated
    redirect_on_fail: /login
    description: Session-based auth for web routes
  - name: simple_jwt
    type: jwt
    header_name: Authorization
    scheme: Bearer
    secret_key_env: JWT_SECRET
    algorithm: HS256
    claims:
    - name: user_id
      type: uint
      required: true
    description: Simple JWT with user_id
  - name: user_auth
    type: jwt
    header_name: Authorization
    scheme: Bearer
    secret_key_env: JWT_SECRET
    algorithm: HS256
    claims:
    - name: user_id
      type: uint
      required: true
    - name: email
      type: string
      required: true
    - name: role
      type: string
      required: false
    description: Full user JWT with typed claims
  - name: secure_api
    type: jwt
    header_name: X-Auth-Token
    scheme: Token
    secret_key_env: JWT_SECRET_SECURE
    algorithm: HS512
    claims:
    - name: user_id
      type: uint
      required: true
    - name: tier
      type: string
      required: true
    - name: is_premium
      type: bool
      required: false
    description: High security API with HS512
  - name: advanced_jwt
    type: jwt
    header_name: Authorization
    scheme: Bearer
    secret_key_env: JWT_SECRET
    algorithm: HS256
    claims:
    - name: user_id
      type: uint
      required: true
      context_key: current_user_id
    - name: email
      type: string
      required: true
    - name: balance
      type: float64
      required: false
    - name: is_admin
      type: bool
      required: false
    - name: roles
      required: false
    - name: metadata
      required: false
    description: Advanced JWT with many claim types
  - name: flexible_jwt
    type: jwt
    header_name: Authorization
    scheme: Bearer
    secret_key_env: JWT_SECRET
    description: Flexible JWT that extracts all claims
  - name: api_key
    type: api_key
    header: X-API-Key
    secret_key_env: API_KEY
    description: API key authentication
  - name: partner_key
    type: api_key
    header: X-Partner-Key
    secret_key_env: PARTNER_API_KEY
    description: Partner API key
  - name: ip_rate_limit
    type: rate_limit
    max_requests: 100
    window: 1m
    key_generator: ip
    description: IP-based rate limiting
  - name: user_rate_limit
    type: rate_limit
    max_requests: 60
    window: 1m
    key_generator: user_id
    description: User-based rate limiting
  - name: api_key_rate_limit
    type: rate_limit
    max_requests: 1000
    window: 1h
    key_generator: api_key
    description: High limit for API keys
  - name: mobile_headers
    type: header_check
    description: Validate mobile app headers
    required_headers:
    - name: X-App-Version
    - name: X-Platform
    - name: X-Device-ID
  - name: api_version
    type: header_check
    description: Validate API version
    required_headers:
    - name: X-API-Version
      value: v2
  - name: secure_endpoint
    type: combined
    description: API key + JWT
    components:
    - type: api_key
      header: X-API-Key
      secret_key_env: API_KEY
    - type: jwt
      header: Authorization
      scheme: Bearer
      secret_key_env: JWT_SECRET
      claims_required:
      - user_id
  - name: multi_factor
    type: combined
    description: Multi-factor authentication
    components:
    - type: api_key
      header: X-API-Key
      secret_key_env: API_KEY
    - type: signature
      header: X-Request-Signature
      algorithm: hmac_sha256
      secret_key_env: SIGN_SECRET
      timestamp_header: X-Timestamp
      timestamp_window: 5m
      signature_fields:
      - X-Timestamp
      - X-API-Key
    - type: jwt
      header: Authorization
      scheme: Bearer
      secret_key_env: JWT_SECRET
      algorithm: HS512
      claims:
      - name: user_id
        type: uint
        required: true
      - name: email
        type: string
        required: true
  custom:
  - name: request_id
    type: custom
    handler: middleware.RequestIDMiddleware
    description: Adds unique request ID
websocket:
  enabled: true
  handler_type: dedicated
  path: /ws
  authentication:
    method: jwt
    jwt:
      secret_key_env: JWT_SECRET
      algorithm: HS256
      claims:
        user_id:
          claim_name: user_id
          type: float64
          required: true
        role:
          claim_name: role
          type: string
          required: false
        email:
          claim_name: email
          type: string
          required: false
      extraction:
        header: Authorization
        header_prefix: 'Bearer '
        query_param: token
        cookie_name: ''
    app_token:
      enabled: true
      secret_key: APP_TOKEN
      header_name: X-App-Token
      query_param: app_token
      required: false
    session:
      cookie_name: session_id
      validation_function: ValidateSession
    custom:
      function_name: CustomAuthHandler
  connection:
    read_buffer_size: 1024
    write_buffer_size: 1024
    handshake_timeout: 10
    read_deadline: 60
    write_deadline: 10
    pong_wait: 60
    ping_period: 54
    max_message_size: 512
  presence:
    enabled: true
    broadcast_on_connect: true
    broadcast_on_disconnect: true
    visibility: all
    custom_visibility_function: CheckPresenceVisibility
    events:
    - name: user_online
