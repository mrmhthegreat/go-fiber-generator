    - name: users
      enabled: true
      key_by: user_id
      auto_register: true
      description: Regular user connections
    - name: game_rooms
      enabled: false
      key_by: room_id
      auto_register: false
      description: Game room connections
    channels:
    - name: broadcastAdmin
      enabled: true
      buffer_size: 100
      drop_on_full: true
      description: Broadcast to all admins
    - name: broadcastUser
      enabled: true
      buffer_size: 100
      drop_on_full: true
      description: Broadcast to specific users
    - name: broadcastStatus
      enabled: true
      buffer_size: 50
      drop_on_full: false
      description: Presence status updates
    - name: broadcastNotify
      enabled: true
      buffer_size: 200
      drop_on_full: true
      description: Notification broadcasts
  events:
  - name: message_sent
