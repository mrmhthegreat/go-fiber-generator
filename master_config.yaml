      - rbac.roles.manage
    UpdateRole:
      enabled: true
      path: /roles/:id
      middleware: []
      permissions:
      - rbac.roles.manage
    DeleteRole:
      enabled: true
      path: /roles/:id
      middleware: []
      permissions:
      - rbac.roles.manage
    ListPermissions:
      enabled: true
      path: /permissions
      middleware: []
      permissions:
      - rbac.permissions.manage
    SyncPermissions:
      enabled: true
      path: /permissions/sync
      middleware: []
