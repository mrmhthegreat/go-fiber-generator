# =============================================================================
# MASTER CONFIGURATION FILE
# Combines: authenticaton_config.yaml + chat_noti_web.yaml +
#           middleware_config.yaml + repo_model_config.yaml
# Usage: python generator.py master_config.yaml
# =============================================================================

project:
  module: github.com/username/my_api
  user_model_name: User
  repository_name: UserRepository
  # Professional folder structure (Go best practices)
  structure:
    use_internal: true      # Use internal/ for private packages
    use_pkg: true           # Use pkg/ for public packages
    use_cmd: true           # Use cmd/ for executables
    cmd_name: server        # cmd/server/main.go
# ============================================
# I18N CONFIGURATION
# ============================================
i18n:
  enabled: true
  languages: [en, fr, ar]

# ============================================
# TEMPLATE ENGINE (Web Handlers)
# ============================================
template_engine:
  enabled: false
  extension: .html
  reload: true
  time_format: "02 Jan 15:04"
# ============================================
# STATIC FILES (Optional)
# ============================================
static_files:
  enabled: true
  route: /static

# ============================================
# SERVER CONFIGURATION
# ============================================
server:
  port: "3000"
  default_port: "3000"
  body_limit: "50 * 1024 * 1024" # 50MB
  body_limit_description: "50MB"
  pass_locals_to_views: false
  read_timeout: "10 * time.Second"
  write_timeout: "10 * time.Second"


# ============================================
# FEATURES
# ============================================
features:
  cron_jobs: true                 # Enables background cron job system
  
# ============================================
# DATABASE CONFIGURATION
# ============================================
database:
  driver: postgres  # postgres, mysql, sqlite
  url_env: DATABASE_URL # Used by config.yaml template
  # Individual fields for future flexibility
  host_env: DATABASE_HOST
  port_env: DATABASE_PORT
  name_env: DATABASE_NAME
  user_env: DATABASE_USER
  password_env: DATABASE_PASSWORD
  ssl_mode_env: DATABASE_SSL_MODE
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: "5 * time.Minute"
  auto_migrate: true
  run_migrations: true

# ============================================
# REDIS CONFIGURATION
# ============================================
redis:
  enabled: true
  host_env: REDIS_ADDR
  password_env: REDIS_PASSWORD
  db_env: REDIS_DB
  min_idle_conns: 5
  max_retries: 3
  retry_delay: "2 * time.Second"
  pool_size: 20
  session_addr_env: REDIS_ADDR # For session storage
# ============================================
# SWAGGER / API DOCUMENTATION
# ============================================
swagger:
  enabled: true
  title: "My API"
  description: "Professional Go Fiber API"
  version: "1.0.0"
  host: "localhost:3000"
  base_path: "/api"
  schemes: ["http", "https"]
  contact:
    name: "API Support"
    email: "support@example.com"
  license:
    name: "MIT"
    url: "https://opensource.org/licenses/MIT"
# =============================================================================
# EMAIL (SMTP)
# =============================================================================
email:
  enabled: true
  provider: smtp
  smtp_host_env: SMTP_HOST
  smtp_port_env: SMTP_PORT
  smtp_user_env: SMTP_EMAIL
  smtp_password_env: SMTP_EMAIL_PASSWORD

# =============================================================================
# IMAP (Incoming Email)
# =============================================================================
imap:
  enabled: true
  host_env: IMAP_HOST
  port_env: IMAP_PORT
  user_env: IMAP_EMAIL
  password_env: IMAP_PASSWORD
  use_ssl: true
  mailbox: INBOX
  fetch_interval: "5 * time.Minute"
  mark_as_read: true
  max_emails_per_fetch: 50
  fetch_sent: true
  controller:
    enabled: true
    middleware: []
    base_path: /api
    GetEmailsList:
      enabled: true
      middleware: []
      path: /get-emails-list
    GetEmailDetail:
      enabled: true
      middleware: []
      path: /get-email-detail/:id
    SendEmail:
      enabled: true
      middleware: []
      path: /send-email
    MarkEmailRead:
      enabled: true
      middleware: []
      path: /mark-email-read/:id
    RefreshEmails:
      enabled: true
      middleware: []
      path: /refresh-emails
  web_handler:
    enabled: true
    middleware: []
    permissions: [post.view.user]
    context:
      needs_user: true
      needs_csrf: true
      needs_perms: true
      needs_dashbase: true
      needs_translations: true
      user_config:
        use_repo: true
        repo_name: userRepo
        method: GetByID
    base_path: /api
    GetEmailsList:
      enabled: true
      middleware: []
      permissions: [post.view.user]
      path: /get-emails-list
    GetEmailDetail:
      enabled: true
      middleware: []
      permissions: [post.view.user]
      path: /get-email-detail/:id
    SendEmail:
      enabled: true
      middleware: []
      permissions: [post.view.user]
      path: /send-email
    MarkEmailRead:
      enabled: true
      middleware: []
      permissions: [post.view.user]
      path: /mark-email-read/:id
    RefreshEmails:
      enabled: true
      middleware: []
      permissions: [post.view.user]
      path: /refresh-emails
    GetSentEmails:
      enabled: true
      middleware: []
      permissions: [post.view.user]
      path: /get-sent-emails
    GetInboxPage:
      enabled: true
      middleware: []
      permissions: [post.view.user]
      path: /get-inbox-page

# =============================================================================
# STORAGE
# =============================================================================
storage:
  enabled: true
  provider_env: STORAGE_PROVIDER
  supabase:
    url_env: STORAGE_SUPABASE_URL
    token_env: STORAGE_SUPABASE_TOKEN
    bucket_name_env: STORAGE_SUPABASE_BUCKET_NAME
  # s3:
  #   endpoint_env: STORAGE_S3_ENDPOINT
  #   region_env: STORAGE_S3_REGION
  #   bucket_env: STORAGE_S3_BUCKET
  #   access_key_id_env: STORAGE_S3_ACCESS_KEY_ID
  #   secret_access_key_env: STORAGE_S3_SECRET_ACCESS_KEY
  #   use_ssl_env: STORAGE_S3_USE_SSL
  # local:
  #   upload_path_env: STORAGE_LOCAL_UPLOAD_PATH
  #   base_url_env: STORAGE_LOCAL_BASE_URL

# =============================================================================
# FCM
# =============================================================================
fcm:
  enabled: true
  credentials_path_env: FCM_CREDENTIALS_PATH
  save_to_database: true
  project_id_env: FCM_PROJECT_ID
  admin_topic_env: admin_default_stogne
  controller:
    enabled: true
    middleware: []
    base_path: /api
    SendFCM:
      enabled: true
      middleware: []
      path: /send-fcm
    SubscribeToTopic:
      enabled: true
      middleware: []
      path: /subscribe-to-topic
  web_handler:
    enabled: true
    middleware: []
    permissions: [post.view.user]
    context:
      needs_user: true
      needs_csrf: true
      needs_perms: true
      needs_dashbase: true
      needs_translations: true
      user_config:
        use_repo: true
        repo_name: userRepo
        method: GetByID
        get_all_method: GetAll
        get_user_by_token_method: GetUserByToken
    GetNotificationPage:
      enabled: true
      middleware: []
      permissions: [post.view.user]
      path: /get-notification-page
    SendFCM:
      enabled: true
      middleware: []
      permissions: [post.view.user]
      path: /send-fcm
    SubscribeToTopic:
      enabled: true
      middleware: []
      permissions: [post.view.user]
      path: /subscribe-to-topic

# =============================================================================
# SESSION
# =============================================================================
session:
