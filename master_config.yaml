    base_path: /api
    GetEmailsList:
      enabled: true
      middleware: []
      permissions:
      - post.view.user
      path: /get-emails-list
    GetEmailDetail:
      enabled: true
      middleware: []
      permissions:
      - post.view.user
      path: /get-email-detail/:id
    SendEmail:
      enabled: true
      middleware: []
      permissions:
      - post.view.user
