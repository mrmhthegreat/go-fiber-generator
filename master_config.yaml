    - room
    persist: false
    requires_auth: true
    rate_limit:
      enabled: true
      max_per_minute: 120
  - name: metric_update
    enabled: true
    handler_type: custom
    custom_handler: handleMetricUpdate
    broadcast_to:
    - all
    persist: false
    requires_auth: true
  - name: location_update
    enabled: true
    handler_type: custom
    custom_handler: handleLocationUpdate
    broadcast_to:
    - custom
